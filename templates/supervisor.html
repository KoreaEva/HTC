<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>감독자 모니터링</title>
    <style>
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --text: #c9d1d9;
            --border: #30363d;
            --accent: #58a6ff;
            --success: #79c0ff;
            --highlight: #1f6feb;
        }
        
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
        }

        .header {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            color: var(--text);
        }

        .header-right {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .course-info {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .course-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--success);
        }

        .training-key {
            font-size: 12px;
            color: #8b949e;
        }

        .logout-btn {
            background: #da3633;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #f85149;
        }

        .container {
            padding: 24px;
            max-width: 100%;
            width: 100%;
        }

        .content-wrapper {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 24px;
        }

        .monitoring-section {
            width: 100%;
        }

        .monitoring-section h2 {
            color: var(--text);
            margin-bottom: 20px;
            font-size: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        /* 메트릭 그리드 */
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .metric-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            text-align: center;
        }

        .metric-title {
            font-size: 12px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .metric-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--success);
        }

        /* 액션 바 */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .action-left h3 {
            color: var(--text);
            margin: 0;
            font-size: 16px;
        }

        .action-right {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .status-indicator {
            font-size: 12px;
            color: #8b949e;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-indicator.active {
            color: #3fb950;
        }

        .status-indicator.error {
            color: #f85149;
        }

        /* 컨트롤 박스 */
        .control-box {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .interval-input {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .interval-input label {
            font-size: 12px;
            color: #8b949e;
        }

        .interval-input input {
            width: 60px;
            padding: 6px 8px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--bg);
            color: var(--text);
            font-size: 12px;
        }

        /* 버튼 */
        .button {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--bg);
            color: var(--text);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .button:hover {
            background: var(--highlight);
            border-color: var(--accent);
            color: white;
        }

        .button.primary {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        .button.primary:hover {
            background: var(--success);
            border-color: var(--success);
        }

        .button.danger {
            border-color: #f85149;
            color: #f85149;
        }

        .button.danger:hover {
            background: rgba(248, 81, 73, 0.1);
        }

        /* 모니터링 콘솔 */
        .monitoring-console {
            background: #010409;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            font-family: "Courier New", "Courier", monospace;
            font-size: 13px;
            color: var(--text);
            line-height: 1.6;
            height: 600px;
            overflow-y: auto;
            position: relative;
        }

        .console-line {
            margin: 8px 0;
            padding: 6px;
            border-left: 3px solid transparent;
            border-radius: 2px;
        }

        .console-line span {
            display: inline;
        }

        .monitoring-console::-webkit-scrollbar {
            width: 8px;
        }

        .monitoring-console::-webkit-scrollbar-track {
            background: var(--bg);
        }

        .monitoring-console::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .monitoring-console::-webkit-scrollbar-thumb:hover {
            background: #444c56;
        }

        /* 로그인 페이지 */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .login-box h1 {
            color: var(--text);
            margin-top: 0;
            margin-bottom: 24px;
            text-align: center;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text);
            font-size: 14px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.1);
        }

        .button-submit {
            width: 100%;
            padding: 10px;
            margin-top: 16px;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .button-submit:hover {
            background: var(--success);
        }

        .error-message {
            color: #f85149;
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            display: none;
        }

        /* 반응형 디자인 */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }

            .header-right {
                width: 100%;
                justify-content: space-between;
            }

            .action-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .action-left,
            .action-right {
                width: 100%;
            }

            .action-right {
                flex-direction: column;
            }

            .control-box {
                flex-direction: column;
            }

            .interval-input {
                width: 100%;
            }

            .button {
                flex: 1;
            }

            .metric-grid {
                grid-template-columns: 1fr;
            }

            .monitoring-console {
                height: 400px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- 로그인 화면 -->
    <div id="loginPage" style="display: none;">
        <div class="login-container">
            <div class="login-box">
                <h1>감독자 로그인</h1>
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="trainingKey">과정 키</label>
                        <input type="text" id="trainingKey" required placeholder="과정 키를 입력하세요">
                    </div>
                    <div class="form-group">
                        <label for="supervisorName">이름</label>
                        <input type="text" id="supervisorName" required placeholder="이름을 입력하세요">
                    </div>
                    <button type="submit" class="button-submit">로그인</button>
                    <div id="loginError" class="error-message"></div>
                </form>
            </div>
        </div>
    </div>

    <!-- 모니터링 화면 -->
    <div id="monitoringPage" style="display: none;">
        <div class="header">
            <h1>📊 실시간 모니터링</h1>
            <div class="header-right">
                <div class="course-info">
                    <div class="course-name" id="courseName">-</div>
                    <div class="training-key" id="trainingKeyDisplay">-</div>
                </div>
                <button class="logout-btn" onclick="handleLogout()">로그아웃</button>
            </div>
        </div>

        <div class="container">
            <div class="content-wrapper">
                <div class="monitoring-section">
                    <!-- 메트릭 섹션 -->
                    <h2>📈 리소스 현황</h2>
                    <div class="metric-grid">
                        <div class="metric-card">
                            <div class="metric-title">전체 사용자</div>
                            <div class="metric-value" id="metricUserCount">0</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-title">전체 랩</div>
                            <div class="metric-value" id="metricLabCount">0</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-title">전체 콘텐츠</div>
                            <div class="metric-value" id="metricContentCount">0</div>
                        </div>
                    </div>

                    <!-- 액션 바 -->
                    <div class="action-bar">
                        <div class="action-left">
                            <h3>📋 활동 로그</h3>
                        </div>
                        <div class="action-right">
                            <div class="status-indicator active" id="connectionStatus">● 연결됨</div>
                            <div class="control-box">
                                <div class="interval-input">
                                    <label for="monitoringInterval">폴링 간격</label>
                                    <input type="number" id="monitoringInterval" min="1" max="300" value="5">
                                    <span style="font-size: 12px; color: #8b949e;">초</span>
                                </div>
                                <button class="button" onclick="applyMonitoringInterval()">적용</button>
                                <button class="button primary" onclick="startMonitoring()">시작</button>
                                <button class="button danger" onclick="stopMonitoring()">중지</button>
                                <button class="button" onclick="clearConsole()">초기화</button>
                            </div>
                        </div>
                    </div>

                    <!-- 모니터링 콘솔 -->
                    <div class="monitoring-console" id="monitoringConsole">
                        <div class="console-line" style="color: #8b949e;">대기 중...: 사용자 활동이 발생하면 여기에 표시됩니다.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let trainingKey = null;
        let supervisorName = null;
        let courseName = null;
        let monitoringIntervalId = null;
        let monitoringPollingSeconds = 5;
        let monitoringLastId = null;
        let isMonitoring = false;

        // 페이지 로드 시 세션 확인
        window.addEventListener('load', () => {
            const stored = {
                training_key: localStorage.getItem('supervisor_training_key'),
                supervisor_name: localStorage.getItem('supervisor_name'),
                course_name: localStorage.getItem('supervisor_course_name')
            };

            if (stored.training_key && stored.supervisor_name) {
                trainingKey = stored.training_key;
                supervisorName = stored.supervisor_name;
                courseName = stored.course_name;
                showMonitoringPage();
            } else {
                showLoginPage();
            }
        });

        // 로그인 처리
        async function handleLogin(event) {
            event.preventDefault();
            const trainingKeyInput = document.getElementById('trainingKey').value.trim();
            const supervisorNameInput = document.getElementById('supervisorName').value.trim();
            const loginError = document.getElementById('loginError');

            if (!trainingKeyInput || !supervisorNameInput) {
                loginError.textContent = '과정 키와 이름을 입력해주세요.';
                loginError.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('/api/supervisor/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        training_key: trainingKeyInput,
                        supervisor_name: supervisorNameInput
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    trainingKey = data.training_key;
                    supervisorName = data.supervisor_name;
                    courseName = data.course_name;

                    localStorage.setItem('supervisor_training_key', trainingKey);
                    localStorage.setItem('supervisor_name', supervisorName);
                    localStorage.setItem('supervisor_course_name', courseName);

                    showMonitoringPage();
                } else {
                    loginError.textContent = data.detail || '로그인에 실패했습니다.';
                    loginError.style.display = 'block';
                }
            } catch (error) {
                loginError.textContent = '로그인 중 오류가 발생했습니다.';
                loginError.style.display = 'block';
                console.error('Login error:', error);
            }
        }

        // 화면 전환
        function showLoginPage() {
            document.getElementById('loginPage').style.display = 'block';
            document.getElementById('monitoringPage').style.display = 'none';
        }

        function showMonitoringPage() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('monitoringPage').style.display = 'block';
            document.getElementById('courseName').textContent = courseName || '-';
            document.getElementById('trainingKeyDisplay').textContent = `과정키: ${trainingKey}`;
            document.getElementById('monitoringInterval').value = '5';
        }

        // 모니터링 컨트롤
        function setMonitoringStatus(text, isActive = false) {
            const statusEl = document.getElementById('connectionStatus');
            if (isActive) {
                statusEl.className = 'status-indicator active';
                statusEl.textContent = `● ${text}`;
            } else if (text.includes('오류') || text.includes('Error')) {
                statusEl.className = 'status-indicator error';
                statusEl.textContent = `● ${text}`;
            } else {
                statusEl.className = 'status-indicator';
                statusEl.textContent = `● ${text}`;
            }
        }

        function applyMonitoringInterval() {
            const sec = parseInt(document.getElementById('monitoringInterval').value, 10);
            if (!Number.isInteger(sec) || sec < 1 || sec > 300) {
                alert('폴링 간격은 1~300초 사이로 입력해주세요.');
                document.getElementById('monitoringInterval').value = String(monitoringPollingSeconds);
                return;
            }
            monitoringPollingSeconds = sec;
            if (isMonitoring) {
                stopMonitoring();
                startMonitoring();
            }
        }

        function startMonitoring() {
            if (!trainingKey || !supervisorName) {
                alert('로그인 정보가 없습니다.');
                return;
            }

            if (monitoringIntervalId) {
                clearInterval(monitoringIntervalId);
            }

            monitoringLastId = null;
            clearConsole();
            isMonitoring = true;
            setMonitoringStatus(`폴링 중 (${monitoringPollingSeconds}초)`, true);

            loadMonitoringEvents(true);
            monitoringIntervalId = setInterval(() => loadMonitoringEvents(false), monitoringPollingSeconds * 1000);
        }

        function stopMonitoring() {
            if (monitoringIntervalId) {
                clearInterval(monitoringIntervalId);
                monitoringIntervalId = null;
            }
            isMonitoring = false;
            setMonitoringStatus('중지됨', false);
        }

        function clearConsole() {
            const consoleEl = document.getElementById('monitoringConsole');
            consoleEl.innerHTML = '<div class="console-line" style="color: #8b949e;">콘솔을 초기화했습니다.</div>';
            monitoringLastId = null;
        }

        async function loadMonitoringEvents(reset = false) {
            if (!trainingKey || !supervisorName) {
                setMonitoringStatus('오류: 인증 정보 없음', false);
                return;
            }

            try {
                const params = new URLSearchParams({
                    training_key: trainingKey,
                    supervisor_name: supervisorName,
                    limit: reset ? '50' : '100'
                });

                if (!reset && monitoringLastId) {
                    params.append('since_id', String(monitoringLastId));
                }

                const response = await fetch(`/api/supervisor/monitoring/events?${params.toString()}`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.detail || '이벤트 조회 실패');
                }

                // 메트릭 업데이트
                document.getElementById('metricUserCount').textContent = data.stats.user_count;
                document.getElementById('metricLabCount').textContent = data.stats.lab_count;
                document.getElementById('metricContentCount').textContent = data.stats.content_count;

                // 이벤트 처리
                const events = Array.isArray(data.events) ? data.events : [];
                if (events.length > 0) {
                    monitoringLastId = data.last_id || monitoringLastId;

                    const orderedEvents = [...events].reverse();
                    orderedEvents.forEach((event) => {
                        const line = formatMonitoringEvent(event);
                        addConsoleMessage(line.timestamp, line.icon, line.message, line.color);
                    });
                }

                setMonitoringStatus(`폴링 중 (${monitoringPollingSeconds}초)`, true);
            } catch (error) {
                setMonitoringStatus(`오류: ${error.message}`, false);
                addConsoleMessage(new Date().toLocaleTimeString('ko-KR'), '❌', `조회 실패: ${error.message}`, '#f85149');
                console.error('Load monitoring error:', error);
            }
        }

        function formatMonitoringEvent(event) {
            const timestamp = event.create_date || new Date().toLocaleTimeString('ko-KR');
            const details = event.details || {};
            const userName = event.user_name || details.member_name || '-';
            const targetName = event.target_name || details.lab_name || details.subject || details.content_subject || '';

            let message = event.description || event.event_type;
            let icon = '📋';
            let color = '#00ff00';

            switch (event.event_type) {
                case 'user_register':
                    icon = '👤';
                    color = '#79c0ff';
                    message = `${userName} 등록`;
                    break;
                case 'user_login':
                    icon = '🔐';
                    color = '#79c0ff';
                    message = `${userName} 로그인`;
                    break;
                case 'user_logout':
                    icon = '🔓';
                    color = '#8b949e';
                    message = `${userName} 로그아웃`;
                    break;
                case 'lab_add':
                    icon = '➕';
                    color = '#79c0ff';
                    message = `랩 "${targetName}" 생성`;
                    break;
                case 'lab_edit':
                    icon = '✏️';
                    color = '#d29922';
                    message = `랩 "${targetName}" 수정`;
                    break;
                case 'lab_delete':
                    icon = '🗑️';
                    color = '#f85149';
                    message = `랩 "${targetName}" 삭제`;
                    break;
                case 'lab_view':
                    icon = '👁️';
                    color = '#79c0ff';
                    message = `${userName}님이 ${targetName || '랩'} 열람`;
                    break;
                case 'content_add':
                    icon = '📄';
                    color = '#79c0ff';
                    message = `콘텐츠 "${targetName}" 생성`;
                    break;
                case 'content_edit':
                    icon = '📝';
                    color = '#d29922';
                    message = `콘텐츠 "${targetName}" 수정`;
                    break;
                case 'content_delete':
                    icon = '🗑️';
                    color = '#f85149';
                    message = `콘텐츠 "${targetName}" 삭제`;
                    break;
                case 'content_view':
                    icon = '📖';
                    color = '#79c0ff';
                    message = `${userName}님이 "${targetName}" 조회`;
                    break;
                default:
                    icon = '📋';
                    color = '#8b949e';
                    message = event.description || event.event_type;
            }

            return { timestamp, icon, message, color };
        }

        function addConsoleMessage(timestamp, icon, message, color) {
            const consoleEl = document.getElementById('monitoringConsole');

            // "대기 중" 메시지 제거
            if (consoleEl.innerHTML.includes('대기 중') || consoleEl.innerHTML.includes('초기화')) {
                consoleEl.innerHTML = '';
            }

            const line = document.createElement('div');
            line.className = 'console-line';
            line.innerHTML = `<span style="color: ${color}">${icon} [${timestamp}] ${message}</span>`;
            consoleEl.insertBefore(line, consoleEl.firstChild);

            // 메시지 수 제한
            while (consoleEl.children.length > 100) {
                consoleEl.removeChild(consoleEl.lastChild);
            }
        }

        // 로그아웃
        function handleLogout() {
            localStorage.removeItem('supervisor_training_key');
            localStorage.removeItem('supervisor_name');
            localStorage.removeItem('supervisor_course_name');
            stopMonitoring();
            document.getElementById('loginForm').reset();
            showLoginPage();
        }
    </script>
</body>
</html>
