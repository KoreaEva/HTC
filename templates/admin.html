<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 포털</title>
    <style>
        :root {
            --bg: #f7f8fb;
            --panel: #ffffff;
            --muted: #6b7280;
            --accent: #2563eb;
            --text: #1f2937;
            --border: #e5e7eb;
            --hover: #f1f5f9;
            --shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; width:100%; max-width:none; margin:0; padding:20px 24px; background:var(--bg); color:var(--text); box-sizing:border-box; }
        
        /* 모바일 반응형 스타일 */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .header { flex-direction: column; gap: 15px; align-items: flex-start; }
            .admin-section { padding: 15px; }
            .user-list th, .user-list td { padding: 8px 6px; font-size: 0.9em; }
            .button { padding: 8px 16px; font-size: 13px; margin: 3px; }
            .welcome { font-size: 1.3em; }
        }
        
        @media (max-width: 480px) {
            body { padding: 5px; }
            .admin-section { padding: 12px; }
            .user-list th, .user-list td { padding: 6px 4px; font-size: 0.8em; }
            .button { padding: 6px 12px; font-size: 12px; margin: 2px; }
            .welcome { font-size: 1.2em; }
        }
        
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
        .welcome { font-size:1.5em; font-weight:600; color:var(--accent); }
        .logout-btn { background:#ef4444; color:white; border:none; padding:10px 20px; border-radius:6px; cursor:pointer; font-weight:600; }
        .logout-btn:hover { background:#dc2626; }
        
        /* 섹션 스타일 */
        .admin-section { 
            margin-bottom:30px; 
            padding:20px; 
            background:var(--panel); 
            border:1px solid var(--border); 
            border-radius:12px; 
            box-shadow: var(--shadow);
        }
        .admin-section h2 { 
            color:var(--accent); 
            margin-bottom:15px; 
            font-size:1.3em;
        }
        
        /* 테이블 스타일 */
        .user-list {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: var(--panel);
            border-radius: 8px;
            overflow: hidden;
        }
        .user-list th, .user-list td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .user-list th {
            background-color: #eff6ff;
            color: var(--text);
            font-weight: 600;
        }
        .user-list tr:hover {
            background-color: var(--hover);
        }
        .user-list tr:last-child td {
            border-bottom: none;
        }
        
        /* 버튼 스타일 */
        .button {
            background-color: #16a34a;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 5px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .button:hover {
            background-color: #15803d;
            transform: translateY(-1px);
        }
        .button.danger {
            background-color: #ef4444;
        }
        .button.danger:hover {
            background-color: #dc2626;
        }
        .button.primary {
            background-color: var(--accent);
        }
        .button.primary:hover {
            background-color: #1d4ed8;
        }
        .button.secondary {
            background-color: #6c757d;
        }
        .button.secondary:hover {
            background-color: #5a6268;
        }
        .icon-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .icon-btn {
            width: 28px;
            height: 28px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--panel);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            line-height: 1;
            padding: 0;
        }
        .icon-btn:hover {
            background: var(--hover);
            border-color: var(--accent);
        }
        .icon-btn.delete {
            color: #dc2626;
        }
        
        /* 과정 링크 스타일 */
        .course-link {
            color: #16a34a;
            text-decoration: none;
            font-weight: 600;
        }
        .course-link:hover {
            text-decoration: underline;
        }
        
        /* 상태 표시 */
        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
        }
        
        /* 토글 스위치 스타일 */
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }
        
        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        input:checked + .toggle-slider {
            background-color: #4CAF50;
        }
        
        input:checked + .toggle-slider:before {
            transform: translateX(26px);
        }
        
        .toggle-label {
            margin-left: 8px;
            font-size: 0.9em;
            color: var(--text);
        }

        /* 상태 토글 버튼 */
        .status-toggle-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .status-toggle-btn.active {
            background-color: #16a34a;
            color: white;
        }

        .status-toggle-btn.active:hover {
            background-color: #15803d;
            transform: translateY(-1px);
        }

        .status-toggle-btn.deactive {
            background-color: #d1d5db;
            color: #374151;
        }

        .status-toggle-btn.deactive:hover {
            background-color: #9ca3af;
            transform: translateY(-1px);
        }
            font-size: 0.8em;
            font-weight: 600;
        }
        .status-ready { background: #F57C00; color: white; }
        .status-active { background: #388E3C; color: white; }
        .status-completed { background: #1976D2; color: white; }
        .status-pending { background: #7B1FA2; color: white; }
        
        /* 로그인 탭 스타일 */
        .login-tab-btn.active {
            color: var(--accent) !important;
            border-bottom-color: var(--accent) !important;
        }

    </style>
</head>
<body>
    <div id="loginContainer" style="display:flex; align-items:center; justify-content:center; min-height:85vh;">
        <div style="background:var(--panel); padding:36px; border-radius:12px; box-shadow:var(--shadow); width:100%; max-width:420px; border:1px solid var(--border);">
            <h1 style="text-align:center; color:var(--accent); margin-bottom:16px; font-size:1.8em;">관리자 로그인</h1>
            
            <!-- 로그인 유형 선택 탭 -->
            <div style="display:flex; gap:8px; margin-bottom:20px; border-bottom:2px solid var(--border); padding-bottom:8px;">
                <button type="button" id="adminLoginTab" class="login-tab-btn active" onclick="switchLoginMode('admin')" style="flex:1; padding:10px; border:none; background:none; cursor:pointer; font-weight:600; color:var(--muted); border-bottom:3px solid transparent; transition:all 0.3s;">관리자</button>
                <button type="button" id="supervisorLoginTab" class="login-tab-btn" onclick="switchLoginMode('supervisor')" style="flex:1; padding:10px; border:none; background:none; cursor:pointer; font-weight:600; color:var(--muted); border-bottom:3px solid transparent; transition:all 0.3s;">감독자</button>
            </div>
            
            <!-- 관리자 로그인 폼 -->
            <form id="loginForm" style="display:flex; flex-direction:column; gap:14px;">
                <div id="adminLoginFields">
                    <div>
                        <label style="display:block; margin-bottom:8px; font-weight:600; color:var(--text);">아이디</label>
                        <input type="text" id="username" required style="width:100%; padding:12px; border:1px solid var(--border); border-radius:6px; font-size:15px; box-sizing:border-box;">
                    </div>
                    <div style="margin-top:14px;">
                        <label style="display:block; margin-bottom:8px; font-weight:600; color:var(--text);">비밀번호</label>
                        <input type="password" id="password" required style="width:100%; padding:12px; border:1px solid var(--border); border-radius:6px; font-size:15px; box-sizing:border-box;">
                    </div>
                </div>
                
                <!-- 감독자 로그인 폼 -->
                <div id="supervisorLoginFields" style="display:none;">
                    <div>
                        <label style="display:block; margin-bottom:8px; font-weight:600; color:var(--text);">과정 키</label>
                        <input type="text" id="trainingKey" style="width:100%; padding:12px; border:1px solid var(--border); border-radius:6px; font-size:15px; box-sizing:border-box;">
                    </div>
                    <div style="margin-top:14px;">
                        <label style="display:block; margin-bottom:8px; font-weight:600; color:var(--text);">이름</label>
                        <input type="text" id="supervisorName" style="width:100%; padding:12px; border:1px solid var(--border); border-radius:6px; font-size:15px; box-sizing:border-box;">
                    </div>
                </div>
                
                <button type="submit" class="button primary" style="width:100%; margin:4px 0 0 0;">Login</button>
                <div id="loginError" style="color:#ef4444; text-align:center; display:none; font-size:14px;"></div>
            </form>
        </div>
    </div>

    <div id="adminContainer" style="display:none;">
    <div class="header">
        <div class="welcome">관리자 포털</div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <div class="admin-section" id="courseManagementSection">
        <h2>Course Management</h2>
        <p style="color: var(--muted); margin-bottom: 10px;">과정명을 클릭하면 해당 과정의 사용자 관리 / 랩 관리 / 모니터링 화면으로 이동합니다.</p>
        <button class="button" onclick="showAddCourseModal()">Add Course</button>
        <table class="user-list" style="margin-top:10px;">
            <thead>
                <tr>
                    <th>과정키</th>
                    <th>과정명</th>
                    <th>최대인원</th>
                    <th>생성일</th>
                    <th>상태</th>
                    <th>관리</th>
                </tr>
            </thead>
            <tbody id="courseTableBody">
                <!-- 과정 목록이 여기에 동적으로 추가됩니다 -->
            </tbody>
        </table>
    </div>

    <div id="courseModal" style="display:none; position:fixed; left:0; top:0; width:100vw; height:100vh; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:var(--panel); padding:40px 30px 30px 30px; border-radius:16px; min-width:350px; max-width:95vw; margin:100px auto; box-shadow:var(--shadow); position:relative; border:1px solid var(--border);">
            <h2 id="courseModalTitle" style="margin-bottom:24px; color:var(--accent); text-align:center; font-size:1.5em;">코스 추가/수정</h2>
            <form id="courseForm">
                <input type="hidden" id="modalTrainingKey">
                <div class="form-group" style="margin-bottom:18px;">
                    <label style="font-size:15px; margin-bottom:6px; color:var(--text); font-weight:600;">코스명</label>
                    <input type="text" id="modalCourseName" required style="font-size:16px; padding:12px; border-radius:6px; border:1px solid var(--border); background:var(--panel); color:var(--text); width:100%; box-sizing:border-box;">
                </div>

                <div class="form-group" style="margin-bottom:18px;">
                    <label style="font-size:15px; margin-bottom:6px; color:var(--text); font-weight:600;">최대인원</label>
                    <input type="number" id="modalMaxMember" min="1" style="font-size:16px; padding:12px; border-radius:6px; border:1px solid var(--border); background:var(--panel); color:var(--text); width:100%; box-sizing:border-box;">
                </div>
                <div class="form-group" style="margin-bottom:18px;">
                    <div style="display: flex; align-items: center; justify-content: space-between;">
                        <label style="font-size:15px; color:var(--text); font-weight:600;">상태</label>
                        <div style="display: flex; align-items: center;">
                            <label class="toggle-switch">
                                <input type="checkbox" id="modalStatusToggle">
                                <span class="toggle-slider"></span>
                            </label>
                            <span class="toggle-label" id="modalStatusLabel">비활성</span>
                        </div>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:24px;">
                    <div style="display: flex; align-items: center; justify-content: space-between;">
                        <label style="font-size:15px; color:var(--text); font-weight:600;">공개 여부</label>
                        <div style="display: flex; align-items: center;">
                            <label class="toggle-switch">
                                <input type="checkbox" id="modalPublicToggle">
                                <span class="toggle-slider"></span>
                            </label>
                            <span class="toggle-label" id="modalPublicLabel">비공개</span>
                            <span style="margin-left: 10px; font-size: 12px; color: var(--muted);">(공개 시 로그인 없이 접근 가능)</span>
                        </div>
                    </div>
                </div>
                <div style="margin-top:20px; text-align:center;">
                    <button type="submit" class="button" style="min-width:100px; margin-right:10px;">Save</button>
                    <button type="button" class="button secondary" onclick="closeCourseModal()" style="min-width:100px;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 과정 복사 모달 -->
    <div id="copyModal" style="display:none; position:fixed; left:0; top:0; width:100vw; height:100vh; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:var(--panel); padding:40px 30px 30px 30px; border-radius:16px; min-width:400px; max-width:95vw; margin:100px auto; box-shadow:var(--shadow); position:relative; border:1px solid var(--border);">
            <h2 style="margin-bottom:24px; color:var(--accent); text-align:center; font-size:1.5em;">과정 복사</h2>
            <form id="copyForm">
                <input type="hidden" id="copySourceTrainingKey">
                <div class="form-group" style="margin-bottom:18px;">
                    <label style="font-size:15px; margin-bottom:6px; color:var(--text); font-weight:600;">원본 과정</label>
                    <input type="text" id="copySourceCourseName" readonly style="font-size:16px; padding:12px; border-radius:6px; border:1px solid var(--border); background:#f3f4f6; color:var(--muted); width:100%; box-sizing:border-box;">
                </div>
                <div class="form-group" style="margin-bottom:18px;">
                    <label style="font-size:15px; margin-bottom:6px; color:var(--text); font-weight:600;">새 과정명</label>
                    <input type="text" id="copyNewCourseName" required style="font-size:16px; padding:12px; border-radius:6px; border:1px solid var(--border); background:var(--panel); color:var(--text); width:100%; box-sizing:border-box;">
                </div>
                <div class="form-group" style="margin-bottom:18px;">
                    <label style="font-size:15px; margin-bottom:6px; color:var(--text); font-weight:600;">최대인원</label>
                    <input type="number" id="copyMaxMember" min="1" style="font-size:16px; padding:12px; border-radius:6px; border:1px solid var(--border); background:var(--panel); color:var(--text); width:100%; box-sizing:border-box;">
                </div>
                <div class="form-group" style="margin-bottom:18px;">
                    <div style="display: flex; align-items: center; justify-content: space-between;">
                        <label style="font-size:15px; color:var(--text); font-weight:600;">상태</label>
                        <div style="display: flex; align-items: center;">
                            <label class="toggle-switch">
                                <input type="checkbox" id="copyStatusToggle">
                                <span class="toggle-slider"></span>
                            </label>
                            <span class="toggle-label" id="copyStatusLabel">비활성</span>
                        </div>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:24px;">
                    <div style="display: flex; align-items: center; justify-content: space-between;">
                        <label style="font-size:15px; color:var(--text); font-weight:600;">공개 여부</label>
                        <div style="display: flex; align-items: center;">
                            <label class="toggle-switch">
                                <input type="checkbox" id="copyPublicToggle">
                                <span class="toggle-slider"></span>
                            </label>
                            <span class="toggle-label" id="copyPublicLabel">비공개</span>
                        </div>
                    </div>
                </div>
                <div style="margin-top:20px; text-align:center;">
                    <button type="submit" class="button" style="min-width:100px; margin-right:10px;">Copy</button>
                    <button type="button" class="button secondary" onclick="closeCopyModal()" style="min-width:100px;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 0.0.0.0 접속 시 자동으로 localhost로 리다이렉트
        if (window.location.hostname === '0.0.0.0') {
            window.location.href = window.location.href.replace('0.0.0.0', 'localhost');
        }

        let adminTrainingKey = '';
        let monitoringInterval = null;
        let currentPollingInterval = 30000;
        let lastEventCount = 0;

        function updateMonitoringStatus(message, isRunning = false) {
            const statusEl = document.getElementById('monitoringStatus');
            if (!statusEl) {
                return;
            }
            statusEl.textContent = message;
            statusEl.style.color = isRunning ? '#4ade80' : '#9ca3af';
        }

        function clearMonitoringLog() {
            const consoleEl = document.getElementById('monitoringConsole');
            if (!consoleEl) {
                return;
            }
            consoleEl.innerHTML = '';
        }

        async function startMonitoring(trainingKey, pollingSeconds = 30) {
            if (!trainingKey) {
                updateMonitoringStatus('과정키를 입력해주세요', false);
                return;
            }

            adminTrainingKey = trainingKey;
            currentPollingInterval = pollingSeconds * 1000;

            if (monitoringInterval) {
                clearInterval(monitoringInterval);
            }

            clearMonitoringLog();
            updateMonitoringStatus(`${pollingSeconds}초마다 업데이트 중...`, true);

            await loadMonitoringEvents();
            monitoringInterval = setInterval(loadMonitoringEvents, currentPollingInterval);

            console.log(`✅ 모니터링 시작: 과정키=${trainingKey || '전체'}, 풀링간격=${pollingSeconds}초`);
        }
        
        // 모니터링 이벤트 로드 함수
        async function loadMonitoringEvents() {
            try {
                if (!adminTrainingKey) {
                    updateMonitoringStatus('과정키를 입력해주세요', false);
                    return;
                }
                
                let url = `/api/admin/monitoring/events?training_key=${adminTrainingKey}&limit=50`;
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                if (data.success && Array.isArray(data.events)) {
                    const consoleEl = document.getElementById('monitoringConsole');
                    
                    // 마지막 업데이트 시간 표시
                    const now = new Date();
                    const timeStr = now.toLocaleTimeString('ko-KR');
                    
                    // 통계 정보
                    const stats = data.stats;
                    
                    // 이벤트 카운트 변화 확인
                    const eventCountChanged = data.events.length !== lastEventCount;
                    lastEventCount = data.events.length;
                    const changeIndicator = eventCountChanged ? '🔄' : '✓';
                    
                    let html = `<div style="color: #888; margin-bottom: 10px; border-bottom: 1px solid #333; padding-bottom: 8px;">
                        ${changeIndicator} [${timeStr}] 업데이트 완료 | 이벤트: <span style="color: #00ff00;">${data.events.length}개</span> | 
                        풀링간격: <span style="color: #ffff00;">${currentPollingInterval/1000}초</span>
                        <br/>
                        <div style="margin-top: 6px; color: #aaa; font-size: 11px;">
                            📊 통계: 사용자 <span style="color: #88ff88;">${stats.user_count}</span>명 | 
                            랩 <span style="color: #ff88ff;">${stats.lab_count}</span>개 | 
                            콘텐츠 <span style="color: #88ccff;">${stats.content_count}</span>개
                        </div>
                    </div>`;
                    
                    if (data.events.length === 0) {
                        html += '<div style="color: #888; margin-top: 20px; padding: 20px; text-align: center; border: 1px dashed #555; border-radius: 6px;">아직 이벤트가 없습니다. <br/>사용자 활동이 발생하면 여기에 표시됩니다.</div>';
                    }
                    
                    // 이벤트 표시 (이미 DESC 순서로 정렬됨)
                    data.events.forEach(event => {
                        const timestamp = new Date(event.create_date).toLocaleTimeString('ko-KR');
                        const eventDate = new Date(event.create_date).toLocaleDateString('ko-KR', {month: '2-digit', day: '2-digit'});
                        
                        const eventIcons = {
                            'user_login': '🔐',
                            'user_register': '👤',
                            'lab_add': '➕',
                            'lab_edit': '✏️',
                            'lab_delete': '🗑️',
                            'content_add': '📝',
                            'content_edit': '✏️',
                            'content_delete': '🗑️',
                            'content_view': '👁️'
                        };
                        
                        const eventColors = {
                            'auth': '#4ade80',
                            'user': '#fbbf24',
                            'lab': '#f472b6',
                            'content': '#60a5fa'
                        };
                        
                        const icon = eventIcons[event.event_type] || '📋';
                        const color = eventColors[event.event_category] || '#888';
                        
                        let userInfo = '';
                        if (event.user_name) {
                            userInfo = `<br/>   └ 사용자: <span style="color: #88ff88;">${event.user_name}</span>`;
                        }
                        
                        let targetInfo = '';
                        if (event.target_name) {
                            targetInfo = `<br/>   └ ${event.target_type}: <span style="color: #88ccff;">${event.target_name}</span>`;
                        }
                        
                        html += `
                            <div style="color: ${color}; margin: 5px 0; padding: 10px; border-left: 3px solid ${color}; background: rgba(${parseInt(color.slice(1,3), 16)}, ${parseInt(color.slice(3,5), 16)}, ${parseInt(color.slice(5,7), 16)}, 0.08); border-radius: 4px;">
                                ${icon} <span style="color: #ffff00;">[${eventDate} ${timestamp}]</span> | 과정: <span style="color: #ff88ff;">${event.training_key}</span>
                                ${userInfo}
                                ${targetInfo}
                                <br/>   └ ${event.description || event.event_type}
                            </div>
                        `;
                    });
                    
                    consoleEl.innerHTML = html;
                    consoleEl.scrollTop = 0;
                    
                    updateMonitoringStatus(`마지막 업데이트: ${timeStr} (${data.events.length}개 이벤트)`, true);
                } else {
                    console.error('이벤트 데이터 형식 오류:', data);
                    updateMonitoringStatus('데이터 형식 오류', true);
                }
            } catch (error) {
                console.error('모니터링 이벤트 로드 오류:', error);
                const consoleEl = document.getElementById('monitoringConsole');
                consoleEl.innerHTML += `
                    <div style="color: #ff4444; margin: 10px 0; padding: 10px; border: 1px solid #ff4444; border-radius: 4px; background: rgba(255,68,68,0.1);">
                        ❌ 오류 발생: ${error.message}
                        <br/>   └ 서버 연결을 확인하세요.
                    </div>
                `;
                updateMonitoringStatus(`오류: ${error.message}`, true);
            }
        }

        // 모니터링 중지
        function stopMonitoring() {
            if (monitoringInterval) {
                clearInterval(monitoringInterval);
                monitoringInterval = null;
                console.log('⏸️ 모니터링 중지됨');
            }
            const consoleEl = document.getElementById('monitoringConsole');
            if (consoleEl) {
                consoleEl.innerHTML += '<div style="color: #ff8800; margin-top: 10px; padding: 10px; border: 1px solid #ff8800; border-radius: 4px; background: rgba(255,136,0,0.1);">⏸️ 모니터링이 중지되었습니다</div>';
            }
            updateMonitoringStatus('중지됨', false);
        }

        // 로그아웃 함수
        function logout() {
            localStorage.removeItem('admin_logged_in');
            localStorage.removeItem('admin_id');
            localStorage.removeItem('admin_role');
            localStorage.removeItem('admin_training_key');
            localStorage.removeItem('admin_course_name');
            document.getElementById('adminContainer').style.display = 'none';
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('loginForm').reset();
        }

        // 코스 상태값 변환
        function statusToText(status) {
            switch(status) {
                case 10: return '준비중';
                case 20: return '실행중';
                case 30: return '완료';
                default: return status;
            }
        }
        
        // 상태에 따른 CSS 클래스 반환
        function getStatusClass(status) {
            switch(status) {
                case 10: return 'status-ready';
                case 20: return 'status-active';
                case 30: return 'status-completed';
                default: return 'status-ready';
            }
        }

        // 코스 목록 가져오기
        async function loadCourses() {
            try {
                const response = await fetch('/api/admin/courses');
                const data = await response.json();
                const tableBody = document.getElementById('courseTableBody');
                tableBody.innerHTML = '';
                data.forEach(course => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <span>${course.training_key}</span>
                                <button class="icon-btn" onclick="copyTrainingKey('${course.training_key}')" title="과정 키 복사" aria-label="과정 키 복사">📋</button>
                            </div>
                        </td>
                        <td><a href="#" onclick="goLabPage('${course.training_key}')" class="course-link">${course.course_name}</a></td>
                        <td>${course.max_member || ''}</td>
                        <td>${course.create_date || ''}</td>
                        <td>
                            <button class="status-toggle-btn ${course.training_status === 20 ? 'active' : 'deactive'}" onclick="toggleCourseStatus('${course.training_key}')">
                                ${course.training_status === 20 ? 'Active' : 'Deactive'}
                            </button>
                        </td>
                        <td>
                            <div class="icon-actions">
                                <button class="icon-btn" onclick="editCourse('${course.training_key}')" title="수정" aria-label="수정">✏️</button>
                                <button class="icon-btn" onclick="copyCourse('${course.training_key}', '${course.course_name}')" title="복사" aria-label="복사">📄</button>
                                <button class="icon-btn delete" onclick="deleteCourse('${course.training_key}')" title="삭제" aria-label="삭제">🗑️</button>
                            </div>
                        </td>
                    `;
                    tableBody.appendChild(row);
                });
            } catch (error) {
            }
        }

        // 과정 키 복사 함수
        async function copyTrainingKey(trainingKey) {
            try {
                await navigator.clipboard.writeText(trainingKey);
                alert('과정 키가 클립보드에 복사되었습니다!');
            } catch (err) {
                // 클립보드 API가 지원되지 않는 경우 대체 방법 사용
                const textArea = document.createElement('textarea');
                textArea.value = trainingKey;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                alert('과정 키가 클립보드에 복사되었습니다!');
            }
        }

        // 코스 추가/수정 모달 열기
        function showAddCourseModal() {
            document.getElementById('courseModalTitle').textContent = '코스 추가';
            document.getElementById('modalTrainingKey').value = '';
            document.getElementById('modalCourseName').value = '';
            document.getElementById('modalMaxMember').value = '';
            document.getElementById('modalStatusToggle').checked = false;
            document.getElementById('modalStatusLabel').textContent = '비활성';
            document.getElementById('modalPublicToggle').checked = false;
            document.getElementById('modalPublicLabel').textContent = '비공개';
            document.getElementById('courseModal').style.display = 'flex';
        }
        function closeCourseModal() {
            document.getElementById('courseModal').style.display = 'none';
        }
        // 코스 수정 모달 열기
        async function editCourse(trainingKey) {
            try {
                const response = await fetch(`/api/admin/courses/${trainingKey}`);
                const course = await response.json();
                document.getElementById('courseModalTitle').textContent = '과정 수정';
                document.getElementById('modalTrainingKey').value = course.training_key;
                document.getElementById('modalCourseName').value = course.course_name;
                document.getElementById('modalMaxMember').value = course.max_member || '';
                document.getElementById('modalStatusToggle').checked = course.training_status === 20;
                document.getElementById('modalStatusLabel').textContent = course.training_status === 20 ? '활성' : '비활성';
                document.getElementById('modalPublicToggle').checked = course.is_public === 1;
                document.getElementById('modalPublicLabel').textContent = course.is_public === 1 ? '공개' : '비공개';
                document.getElementById('courseModal').style.display = 'flex';
            } catch (error) {
                alert('코스 정보를 불러오지 못했습니다.');
            }
        }
        // 코스 공개 여부 토글
        async function toggleCoursePublic(trainingKey, isPublic) {
            try {
                const newPublic = isPublic ? 1 : 0; // 1: 공개, 0: 비공개
                
                const response = await fetch(`/api/admin/courses/${trainingKey}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        is_public: newPublic
                    })
                });
                
                if (response.ok) {
                    loadCourses(); // 과정 목록 새로고침
                } else {
                    alert('공개 여부 변경에 실패했습니다.');
                    loadCourses(); // 실패 시에도 목록 새로고침하여 원래 상태로 복원
                }
            } catch (error) {
                alert('공개 여부 변경 중 오류가 발생했습니다.');
                loadCourses(); // 오류 시에도 목록 새로고침
            }
        }
        
        // 코스 상태 토글
        async function toggleCourseStatus(trainingKey) {
            const button = event.target.closest('button');
            const isCurrentlyActive = button.classList.contains('active');
            const originalClass = button.className;
            const originalText = button.textContent;
            
            try {
                // 현재 상태 반전: Active면 Deactive로, Deactive면 Active로
                const newStatus = isCurrentlyActive ? 10 : 20; // 20: 활성, 10: 비활성
                const newStateClass = isCurrentlyActive ? 'deactive' : 'active';
                const newStateText = isCurrentlyActive ? 'Deactive' : 'Active';
                
                // UI 즉시 업데이트
                button.classList.remove('active', 'deactive');
                button.classList.add(newStateClass);
                button.textContent = newStateText;
                
                // 현재 과정 정보를 먼저 가져와서 기존 데이터 유지
                const courseResponse = await fetch(`/api/admin/courses/${trainingKey}`);
                const courseData = await courseResponse.json();
                
                const response = await fetch(`/api/admin/courses/${trainingKey}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        course_name: courseData.course_name,
                        max_member: courseData.max_member,
                        training_status: newStatus
                    })
                });
                
                if (response.ok) {
                    // 성공 - UI 업데이트 유지
                } else {
                    // 실패 시 원래 상태로 되돌리기
                    button.className = originalClass;
                    button.textContent = originalText;
                    alert('상태 변경에 실패했습니다.');
                }
            } catch (error) {
                // 오류 발생 시에도 원래 상태로 되돌리기
                button.className = originalClass;
                button.textContent = originalText;
                alert('상태 변경 중 오류가 발생했습니다.');
            }
        }
        
        // 코스 삭제
        async function deleteCourse(trainingKey) {
            if (confirm('정말로 이 코스를 삭제하시겠습니까?')) {
                try {
                    const response = await fetch(`/api/admin/courses/${trainingKey}`, { method: 'DELETE' });
                    if (response.ok) {
                        loadCourses();
                    } else {
                        alert('코스 삭제에 실패했습니다.');
                    }
                } catch (error) {
                    alert('코스 삭제 중 오류가 발생했습니다.');
                }
            }
        }
        // 코스 추가/수정 폼 제출
        document.getElementById('courseForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const trainingKey = document.getElementById('modalTrainingKey').value;
            const courseName = document.getElementById('modalCourseName').value;
            const maxMember = document.getElementById('modalMaxMember').value;
            const isActive = document.getElementById('modalStatusToggle').checked;
            const status = isActive ? 20 : 10; // 20: 활성, 10: 비활성
            const isPublic = document.getElementById('modalPublicToggle').checked;
            const publicStatus = isPublic ? 1 : 0; // 1: 공개, 0: 비공개
            const payload = {
                course_name: courseName,
                max_member: maxMember,
                training_status: parseInt(status),
                is_public: parseInt(publicStatus)
            };
            let url = '/api/admin/courses';
            let method = 'POST';
            if (trainingKey) {
                url += `/${trainingKey}`;
                method = 'PUT';
            }
            try {
                const response = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (response.ok) {
                    closeCourseModal();
                    loadCourses();
                } else {
                    alert('저장에 실패했습니다.');
                }
            } catch (error) {
                alert('저장 중 오류가 발생했습니다.');
            }
        });
        // 모달 토글 스위치 라벨 업데이트
        document.getElementById('modalStatusToggle').addEventListener('change', function() {
            const label = document.getElementById('modalStatusLabel');
            label.textContent = this.checked ? '활성' : '비활성';
        });
        
        document.getElementById('modalPublicToggle').addEventListener('change', function() {
            const label = document.getElementById('modalPublicLabel');
            label.textContent = this.checked ? '공개' : '비공개';
        });
        
        // 로그인 모드 전환 함수
        let currentLoginMode = 'admin';
        
        function switchLoginMode(mode) {
            currentLoginMode = mode;
            const adminTab = document.getElementById('adminLoginTab');
            const supervisorTab = document.getElementById('supervisorLoginTab');
            const adminFields = document.getElementById('adminLoginFields');
            const supervisorFields = document.getElementById('supervisorLoginFields');
            const loginError = document.getElementById('loginError');
            
            loginError.style.display = 'none';
            
            if (mode === 'admin') {
                adminTab.classList.add('active');
                supervisorTab.classList.remove('active');
                adminFields.style.display = 'block';
                supervisorFields.style.display = 'none';
                document.getElementById('username').required = true;
                document.getElementById('password').required = true;
                document.getElementById('trainingKey').required = false;
                document.getElementById('supervisorName').required = false;
            } else {
                supervisorTab.classList.add('active');
                adminTab.classList.remove('active');
                supervisorFields.style.display = 'block';
                adminFields.style.display = 'none';
                document.getElementById('username').required = false;
                document.getElementById('password').required = false;
                document.getElementById('trainingKey').required = true;
                document.getElementById('supervisorName').required = true;
            }
        }
        
        // 로그인 처리 및 초기 화면 처리
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const loginError = document.getElementById('loginError');
            loginError.style.display = 'none';

            try {
                let response, data;
                
                if (currentLoginMode === 'admin') {
                    const username = document.getElementById('username').value.trim();
                    const password = document.getElementById('password').value.trim();
                    
                    response = await fetch('/api/admin/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    data = await response.json();

                    if (response.ok) {
                        localStorage.setItem('admin_logged_in', 'true');
                        localStorage.setItem('admin_id', data.admin_id);
                        localStorage.setItem('admin_role', 'admin');
                        localStorage.removeItem('admin_training_key');
                        document.getElementById('loginContainer').style.display = 'none';
                        document.getElementById('adminContainer').style.display = 'block';
                        loadCourses();
                    } else {
                        loginError.textContent = data.detail || '로그인에 실패했습니다.';
                        loginError.style.display = 'block';
                    }
                } else {
                    // 감독자 로그인
                    const trainingKey = document.getElementById('trainingKey').value.trim();
                    const supervisorName = document.getElementById('supervisorName').value.trim();
                    
                    response = await fetch('/api/supervisor/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ training_key: trainingKey, supervisor_name: supervisorName })
                    });
                    data = await response.json();

                    if (response.ok) {
                        localStorage.setItem('admin_logged_in', 'true');
                        localStorage.setItem('admin_id', data.supervisor_name);
                        localStorage.setItem('admin_role', 'supervisor');
                        localStorage.setItem('admin_training_key', data.training_key);
                        localStorage.setItem('admin_course_name', data.course_name);
                        
                        // 감독자용 저장소에도 정보 저장 (supervisor.html에서 사용)
                        localStorage.setItem('supervisor_training_key', data.training_key);
                        localStorage.setItem('supervisor_name', data.supervisor_name);
                        localStorage.setItem('supervisor_course_name', data.course_name);
                        
                        // 감독자는 모니터링 페이지로 이동
                        window.location.href = `/supervisor/monitoring`;
                    } else {
                        loginError.textContent = data.detail || '로그인에 실패했습니다.';
                        loginError.style.display = 'block';
                    }
                }
            } catch (error) {
                loginError.textContent = '로그인 중 오류가 발생했습니다.';
                loginError.style.display = 'block';
            }
        });

        window.addEventListener('load', () => {
            const isLoggedIn = localStorage.getItem('admin_logged_in') === 'true';
            if (isLoggedIn) {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('adminContainer').style.display = 'block';
                loadCourses();
            } else {
                document.getElementById('loginContainer').style.display = 'flex';
                document.getElementById('adminContainer').style.display = 'none';
            }
        });

        // 랩 관리 페이지 이동
        function goLabPage(trainingKey) {
            // training_key를 URL 인코딩하여 전달
            window.location.href = `/admin/lab?training_key=${encodeURIComponent(trainingKey)}`;
        }

        // 과정 복사 모달 열기
        async function copyCourse(trainingKey, courseName) {
            try {
                // 원본 과정 정보 가져오기
                const response = await fetch(`/api/admin/courses/${trainingKey}`);
                const course = await response.json();
                
                document.getElementById('copySourceTrainingKey').value = trainingKey;
                document.getElementById('copySourceCourseName').value = courseName;
                document.getElementById('copyNewCourseName').value = `${courseName} (복사본)`;
                document.getElementById('copyMaxMember').value = course.max_member || '';
                document.getElementById('copyStatusToggle').checked = false;
                document.getElementById('copyStatusLabel').textContent = '비활성';
                document.getElementById('copyPublicToggle').checked = false;
                document.getElementById('copyPublicLabel').textContent = '비공개';
                document.getElementById('copyModal').style.display = 'flex';
            } catch (error) {
                alert('과정 정보를 불러오지 못했습니다.');
            }
        }

        // 복사 모달 닫기
        function closeCopyModal() {
            document.getElementById('copyModal').style.display = 'none';
        }

        // 복사 모달 토글 스위치 라벨 업데이트
        document.getElementById('copyStatusToggle').addEventListener('change', function() {
            const label = document.getElementById('copyStatusLabel');
            label.textContent = this.checked ? '활성' : '비활성';
        });
        
        document.getElementById('copyPublicToggle').addEventListener('change', function() {
            const label = document.getElementById('copyPublicLabel');
            label.textContent = this.checked ? '공개' : '비공개';
        });

        // 복사 폼 제출
        document.getElementById('copyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const sourceTrainingKey = document.getElementById('copySourceTrainingKey').value;
            const newCourseName = document.getElementById('copyNewCourseName').value;
            const maxMember = document.getElementById('copyMaxMember').value;
            const isActive = document.getElementById('copyStatusToggle').checked;
            const status = isActive ? 20 : 10; // 20: 활성, 10: 비활성
            const isPublic = document.getElementById('copyPublicToggle').checked;
            const publicStatus = isPublic ? 1 : 0; // 1: 공개, 0: 비공개
            
            const payload = {
                new_course_name: newCourseName,
                max_member: maxMember,
                training_status: parseInt(status),
                is_public: parseInt(publicStatus)
            };
            
            try {
                const response = await fetch(`/api/admin/courses/${sourceTrainingKey}/copy`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (response.ok) {
                    const result = await response.json();
                    closeCopyModal();
                    alert(`과정이 성공적으로 복사되었습니다!\n새 과정키: ${result.new_training_key}\n복사된 랩: ${result.copied_labs}개\n복사된 콘텐츠: ${result.total_contents}개`);
                    loadCourses();
                } else {
                    const error = await response.json();
                    alert(`복사 실패: ${error.detail}`);
                }
            } catch (error) {
                alert('복사 중 오류가 발생했습니다.');
            }
        });
    </script>
    </div>
