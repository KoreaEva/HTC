<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>랩 콘텐츠 보기</title>
    <style>
        :root {
            --bg: #f7f8fb;
            --panel: #ffffff;
            --sidebar: #f4f6fa;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #e5e7eb;
            --accent: #2563eb;
            --accent-soft: #e8f0ff;
            --hover: #eef2f7;
            --code-bg: #f6f8fa;
            --shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0; /* 기본 마진 제거 */
            padding: 0;
        }
        
        /* 모바일 반응형 스타일 */
        @media (max-width: 768px) {
            .container { flex-direction: column; margin: 10px auto; }
            .sidebar { width: 100%; height: auto; position: static; border-right: none; border-bottom: 1px solid #eee; padding: 20px; }
            .main-content { padding: 20px; }
            .breadcrumbs { padding: 15px 20px; }
            .markdown-body { font-size: 1em; }
        }
        
        @media (max-width: 480px) {
            .container { margin: 5px auto; }
            .sidebar { padding: 15px; }
            .main-content { padding: 15px; }
            .breadcrumbs { padding: 10px 15px; }
            .markdown-body { font-size: 0.95em; }
        }
        
        .breadcrumbs {
            padding: 16px 40px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            font-size: 0.95em;
            color: var(--muted);
        }
        .breadcrumbs a {
            text-decoration: none;
            color: var(--accent);
            font-weight: 500;
        }
        .breadcrumbs a:hover { text-decoration: underline; }
        .container {
            max-width: 1100px;
            margin: 20px auto 40px auto; /* 상단 여백 추가 */
            background: var(--panel);
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            padding: 0;

            min-height: 600px;
        }
        .sidebar {
            width: 300px;
            border-right: 1px solid var(--border);
            padding: 24px 0 24px 24px;
            background: var(--sidebar);
            position: sticky; /* 스크롤 시 고정 */
            top: 0; /* 뷰포트 상단에 고정 */
            height: 100vh; /* 뷰포트 전체 높이 */
            overflow-y: auto; /* 내용이 길면 스크롤바 생성 */
            box-sizing: border-box; /* 패딩을 너비에 포함 */
        }
        .sidebar h2 { font-size: 1.05em; margin-bottom: 14px; color: var(--text); font-weight: 600; }
        .content-list { list-style: none; padding: 0; margin: 0; }
        .content-list li { padding: 10px 12px; cursor: pointer; border-radius: 8px; color: var(--text); margin-bottom: 6px; }

<body>
    <div class="breadcrumbs">
        <a href="/portal">홈</a>
        <span id="breadcrumbCourse"></span>
        <span id="breadcrumbLab"></span>
    </div>
    <div class="container">
        <div class="sidebar">
            <button class="back-btn button" onclick="window.history.back()">← Back</button>
            <h2>콘텐츠 목록</h2>
            <ul class="content-list" id="contentList"></ul>
        </div>
        <div class="main-content">
            <h2 id="contentTitle">콘텐츠 보기</h2>
            <div id="contentBody" class="markdown-body" style="margin-top:20px;"></div>
        </div>
    </div>

    <div id="testCenterModal" class="test-center-modal" onclick="handleTestCenterBackdropClick(event)">
        <div class="test-center-modal-card">
            <div class="test-center-modal-header">
                <div id="testCenterModalMeta" class="test-center-meta" style="margin:0;"></div>
                <button type="button" class="test-center-close-btn" onclick="closeTestCenterModal()">닫기</button>
            </div>
            <div id="testCenterModalBody"></div>
        </div>
    </div>

    <script>
        function getQueryParam(name) {
            const url = new URL(window.location.href);
            return url.searchParams.get(name);
        }
        const trainingKey = getQueryParam('training_key');
        const labId = getQueryParam('lab_id');
        const memberId = getQueryParam('member_id'); // Assuming member_id is also passed as a query parameter
        let contents = [];
        let selectedIdx = -1; // 초기 선택 인덱스를 -1로 설정
        let testCenterState = {
            questions: [],
            index: 0,
            meta: '',
            responses: [],
            contentId: null,
            generatedTestId: null,
            startedAt: null,
            submitted: false,
            completed: false,
            completedAt: null,
        };

        function getTestCompletedMessage(completedAt) {
            return completedAt
                ? `이미 완료한 테스트입니다.\n완료 시각: ${completedAt}`
                : '이미 완료한 테스트입니다.';
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function normalizeChoiceToken(value) {
            return String(value || '')
                .trim()
                .toUpperCase()
                .replace(/\.$/, '');
        }

        function normalizeAnswerTokens(answerValue) {
            const raw = String(answerValue || '').trim();
            if (!raw) {
                return [];
            }

            let normalized = [];
            if (raw.startsWith('[') && raw.endsWith(']')) {
                try {
                    const parsed = JSON.parse(raw);
                    if (Array.isArray(parsed)) {
                        normalized = parsed
                            .map(token => normalizeChoiceToken(token))
                            .filter(token => token !== '');
                    }
                } catch (error) {
                    // Fallback to delimiter parsing below.
                }
            }

            if (!normalized.length) {
                normalized = raw
                    .replace(/，/g, ',')
                    .replace(/[\[\]"']/g, ' ')
                    .split(/[\s,;|/]+/)
                    .map(normalizeChoiceToken)
                    .filter(token => token !== '');
            }

            return Array.from(new Set(normalized));
        }

        function normalizeYesNo(value) {
            const token = String(value || '').trim().toUpperCase();
            if (['Y', 'YES', 'O', 'TRUE', '1'].includes(token)) return 'YES';
            if (['N', 'NO', 'X', 'FALSE', '0'].includes(token)) return 'NO';
            return token;
        }

        function getExpectedChoiceAnswerKeys(question) {
            const options = (question && question.options && typeof question.options === 'object') ? question.options : {};
            const expectedTokens = normalizeAnswerTokens(question && question.answer ? question.answer : '');
            if (!expectedTokens.length) {
                return [];
            }

            const keyTokenMap = new Map();
            const valueTokenMap = new Map();
            Object.keys(options).forEach(rawKey => {
                const keyToken = normalizeChoiceToken(rawKey);
                const valueToken = normalizeChoiceToken(options[rawKey]);
                if (keyToken) {
                    keyTokenMap.set(keyToken, keyToken);
                }
                if (valueToken && !valueTokenMap.has(valueToken)) {
                    valueTokenMap.set(valueToken, keyToken);
                }
            });

            const mapped = expectedTokens
                .map(token => keyTokenMap.get(token) || valueTokenMap.get(token) || token)
                .filter(Boolean);

            return Array.from(new Set(mapped));
        }

        function highlightCorrectChoiceOptions(question) {
            const expectedKeys = getExpectedChoiceAnswerKeys(question);
            const expectedSet = new Set(expectedKeys);
            const inputs = Array.from(document.querySelectorAll('input[data-answer-input="choice"]'));

            inputs.forEach(input => {
                const optionEl = input.closest('label');
                if (!optionEl) {
                    return;
                }
                optionEl.classList.remove('choice-correct-highlight');
                const key = normalizeChoiceToken(input.value || '');
                if (expectedSet.has(key)) {
                    optionEl.classList.add('choice-correct-highlight');
                }
            });
        }

        function initMatchingDragDrop(containerEl, question) {
            const questionType = String(question.question_type || 'multiple_choice').toLowerCase();
            if (questionType !== 'matching' || !containerEl) {
                return;
            }

            const options = Array.isArray(question.options) ? question.options : [];
            const optionCards = Array.from(containerEl.querySelectorAll('.matching-option-card'));
            const dropZones = Array.from(containerEl.querySelectorAll('.matching-drop-zone'));
            let selectedOptionIndex = null;

            const clearSelection = () => {
                selectedOptionIndex = null;
                optionCards.forEach(card => card.classList.remove('selected'));
            };

            const clearDuplicateAssignments = (optionIndex, exceptZone) => {
                dropZones.forEach(zone => {
                    if (zone === exceptZone) {
                        return;
                    }
                    const input = zone.querySelector('input[data-answer-input="matching"]');
                    const valueEl = zone.querySelector('.matching-drop-value');
                    if (input && String(input.value) === String(optionIndex)) {
                        input.value = '';
                        zone.classList.remove('filled');
                        if (valueEl) {
                            valueEl.textContent = '여기에 드롭';
                        }
                    }
                });
            };

            const assignOption = (zone, optionIndex) => {
                const normalized = Number(optionIndex);
                if (!normalized || normalized < 1 || normalized > options.length) {
                    return;
                }
                const input = zone.querySelector('input[data-answer-input="matching"]');
                const valueEl = zone.querySelector('.matching-drop-value');
                if (!input || !valueEl) {
                    return;
                }
                clearDuplicateAssignments(normalized, zone);
                input.value = String(normalized);
                valueEl.textContent = `${normalized}. ${options[normalized - 1] || ''}`;
                zone.classList.add('filled');
            };

            optionCards.forEach(card => {
                const optionIndex = Number(card.getAttribute('data-match-option-index'));
                card.setAttribute('draggable', 'true');

                card.addEventListener('dragstart', event => {
                    if (event.dataTransfer) {
                        event.dataTransfer.setData('text/plain', String(optionIndex));
                        event.dataTransfer.effectAllowed = 'move';
                    }
                });

                card.addEventListener('click', () => {
                    const wasSelected = selectedOptionIndex === optionIndex;
                    clearSelection();
                    if (!wasSelected) {
                        selectedOptionIndex = optionIndex;
                        card.classList.add('selected');
                    }
                });
            });

            dropZones.forEach(zone => {
                const input = zone.querySelector('input[data-answer-input="matching"]');
                const valueEl = zone.querySelector('.matching-drop-value');
                if (input && valueEl && input.value) {
                    const preset = Number(input.value);
                    if (preset && options[preset - 1]) {
                        valueEl.textContent = `${preset}. ${options[preset - 1]}`;
                        zone.classList.add('filled');
                    }
                }

                zone.addEventListener('dragover', event => {
                    event.preventDefault();
                    zone.classList.add('drag-over');
                });

                zone.addEventListener('dragleave', () => {
                    zone.classList.remove('drag-over');
                });

                zone.addEventListener('drop', event => {
                    event.preventDefault();
                    zone.classList.remove('drag-over');
                    const dropped = event.dataTransfer ? Number(event.dataTransfer.getData('text/plain')) : NaN;
                    assignOption(zone, dropped);
                    clearSelection();
                });

                zone.addEventListener('click', () => {
                    if (selectedOptionIndex) {
                        assignOption(zone, selectedOptionIndex);
                        clearSelection();
                        return;
                    }
                    const zoneInput = zone.querySelector('input[data-answer-input="matching"]');
                    if (!zoneInput || !zoneInput.value) {
                        return;
                    }
                    zoneInput.value = '';
                    zone.classList.remove('filled');
                    if (valueEl) {
                        valueEl.textContent = '여기에 드롭';
                    }
                });
            });
        }

        function unorderedEquals(left, right) {
            if (left.length !== right.length) {
                return false;
            }
            const leftSorted = [...left].sort();
            const rightSorted = [...right].sort();
            for (let idx = 0; idx < leftSorted.length; idx += 1) {
                if (leftSorted[idx] !== rightSorted[idx]) {
                    return false;
                }
            }
            return true;
        }

        function readCurrentResponse(question) {
            const questionType = String(question.question_type || 'multiple_choice').toLowerCase();

            if (questionType === 'yes_no') {
                const items = Array.isArray(question.items) ? question.items : [];
                return {
                    type: 'yes_no',
                    answers: items.map((_, idx) => {
                        const selected = document.querySelector(`input[data-answer-input="yesno"][data-item-index="${idx}"]:checked`);
                        return selected ? normalizeYesNo(selected.value) : null;
                    }),
                };
            }

            if (questionType === 'matching') {
                const items = Array.isArray(question.items) ? question.items : [];
                return {
                    type: 'matching',
                    answers: items.map((_, idx) => {
                        const selected = document.querySelector(`input[data-answer-input="matching"][data-item-index="${idx}"]`);
                        const value = selected ? String(selected.value || '').trim() : '';
                        return value || null;
                    }),
                };
            }

            const selectedAnswers = Array.from(document.querySelectorAll('input[data-answer-input="choice"]:checked'))
                .map(node => normalizeChoiceToken(node.value || ''))
                .filter(Boolean);
            return {
                type: 'choice',
                answers: Array.from(new Set(selectedAnswers)),
            };
        }

        function applyStoredResponse(question, response) {
            if (!response) {
                return;
            }
            const questionType = String(question.question_type || 'multiple_choice').toLowerCase();

            if (questionType === 'yes_no') {
                const answers = Array.isArray(response.answers) ? response.answers : [];
                answers.forEach((answer, idx) => {
                    if (!answer) {
                        return;
                    }
                    const selector = `input[data-answer-input="yesno"][data-item-index="${idx}"][value="${answer}"]`;
                    const radio = document.querySelector(selector);
                    if (radio) {
                        radio.checked = true;
                    }
                });
                return;
            }

            if (questionType === 'matching') {
                const answers = Array.isArray(response.answers) ? response.answers : [];
                const options = Array.isArray(question.options) ? question.options : [];
                answers.forEach((answer, idx) => {
                    const input = document.querySelector(`input[data-answer-input="matching"][data-item-index="${idx}"]`);
                    const zone = input ? input.closest('.matching-drop-zone') : null;
                    const valueEl = zone ? zone.querySelector('.matching-drop-value') : null;
                    if (!input || !zone || !valueEl) {
                        return;
                    }
                    if (!answer) {
                        input.value = '';
                        zone.classList.remove('filled');
                        valueEl.textContent = '여기에 드롭';
                        return;
                    }
                    input.value = String(answer);
                    const optionIndex = Number(answer);
                    valueEl.textContent = optionIndex > 0 && optionIndex <= options.length
                        ? `${optionIndex}. ${options[optionIndex - 1] || ''}`
                        : String(answer);
                    zone.classList.add('filled');
                });
                return;
            }

            const selectedSet = new Set((Array.isArray(response.answers) ? response.answers : []).map(normalizeChoiceToken));
            Array.from(document.querySelectorAll('input[data-answer-input="choice"]')).forEach(input => {
                const key = normalizeChoiceToken(input.value || '');
                input.checked = selectedSet.has(key);
            });
        }

        function isResponseAnswered(question, response) {
            if (!response) {
                return false;
            }
            const questionType = String(question.question_type || 'multiple_choice').toLowerCase();

            if (questionType === 'yes_no' || questionType === 'matching') {
                const answers = Array.isArray(response.answers) ? response.answers : [];
                return answers.length > 0 && answers.every(item => item != null && String(item).trim() !== '');
            }

            return Array.isArray(response.answers) && response.answers.length > 0;
        }

        function isResponseCorrect(question, response) {
            if (!isResponseAnswered(question, response)) {
                return false;
            }

            const questionType = String(question.question_type || 'multiple_choice').toLowerCase();

            if (questionType === 'yes_no') {
                const items = Array.isArray(question.items) ? question.items : [];
                const answers = Array.isArray(response.answers) ? response.answers : [];
                if (items.length !== answers.length) {
                    return false;
                }
                for (let idx = 0; idx < items.length; idx += 1) {
                    const expected = normalizeYesNo(items[idx].answer || '');
                    if (!expected || normalizeYesNo(answers[idx]) !== expected) {
                        return false;
                    }
                }
                return true;
            }

            if (questionType === 'matching') {
                const items = Array.isArray(question.items) ? question.items : [];
                const options = Array.isArray(question.options) ? question.options : [];
                const answers = Array.isArray(response.answers) ? response.answers : [];
                if (items.length !== answers.length) {
                    return false;
                }
                for (let idx = 0; idx < items.length; idx += 1) {
                    const expectedRaw = String(items[idx].answer || '').trim();
                    let expected = expectedRaw;
                    if (expectedRaw && Number.isNaN(Number(expectedRaw))) {
                        const mappedIndex = options.findIndex(option => normalizeChoiceToken(option || '') === normalizeChoiceToken(expectedRaw));
                        if (mappedIndex >= 0) {
                            expected = String(mappedIndex + 1);
                        }
                    }
                    if (!expected || String(answers[idx]).trim() !== expected) {
                        return false;
                    }
                }
                return true;
            }

            const expectedAnswers = getExpectedChoiceAnswerKeys(question);
            if (!expectedAnswers.length) {
                return false;
            }
            const selectedAnswers = Array.isArray(response.answers)
                ? response.answers.map(normalizeChoiceToken).filter(Boolean)
                : [];
            return unorderedEquals(selectedAnswers, expectedAnswers);
        }

        function storeCurrentResponse(question, index) {
            testCenterState.responses[index] = readCurrentResponse(question);
        }

                                    <div class="matching-drop-zone" data-match-item-index="${idx}">

                                        <span class="matching-drop-value">여기에 드롭</span>

        function buildTestCenterSummary() {
            const questions = Array.isArray(testCenterState.questions) ? testCenterState.questions : [];
            const totalQuestions = questions.length;
            let answeredQuestions = 0;
            let solvedQuestions = 0;
            const unansweredIndexes = [];

            questions.forEach((question, idx) => {
                const response = testCenterState.responses[idx];
                if (isResponseAnswered(question, response)) {
                    answeredQuestions += 1;
                    if (isResponseCorrect(question, response)) {
                        solvedQuestions += 1;
                    }
                } else {
                    unansweredIndexes.push(idx + 1);
                }
            });

            const scorePercent = totalQuestions > 0 ? (solvedQuestions / totalQuestions) * 100 : 0;
            return {
                totalQuestions,
                answeredQuestions,
                solvedQuestions,
                unansweredIndexes,
                scorePercent,
            };
        }

        async function submitTestCenterResult(summary) {
            if (testCenterState.submitted) {
                alert(getTestCompletedMessage(testCenterState.completedAt));
                return;
            }

            const payload = {
                training_key: trainingKey,
                member_id: memberId,
                lab_id: Number(labId),
                content_id: Number(testCenterState.contentId),
                generated_test_id: testCenterState.generatedTestId ? Number(testCenterState.generatedTestId) : null,
                started_at: testCenterState.startedAt || new Date().toISOString(),
                total_questions: summary.totalQuestions,
                answered_questions: summary.answeredQuestions,
                solved_questions: summary.solvedQuestions,
                score_percent: Number(summary.scorePercent.toFixed(2)),
                detail: {
                    responses: testCenterState.responses,
                },
            };

            try {
                const response = await fetch('/api/portal/test-center/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const raw = await response.text();
                let data = null;
                try {
                    data = raw ? JSON.parse(raw) : null;
                } catch (e) {
                    data = null;
                }
                if (!response.ok) {
                    const detailMessage = typeof data.detail === 'string'
                        ? data.detail
                        : (data && data.detail && data.detail.message ? data.detail.message : null);
                    throw new Error(detailMessage || raw || '점수 저장에 실패했습니다.');
                }

                testCenterState.submitted = true;
                testCenterState.completed = true;
                testCenterState.completedAt = null;
                alert('테스트 결과가 저장되었습니다.');
                closeTestCenterModal();
            } catch (error) {
                alert(error.message || '점수 저장 중 오류가 발생했습니다.');
            }
        }

        function showTestCenterSummary() {
            const summary = buildTestCenterSummary();
            const modalBody = document.getElementById('testCenterModalBody');
            if (!modalBody) {
                return;
            }

            const unansweredCount = Math.max(0, summary.totalQuestions - summary.answeredQuestions);
            modalBody.innerHTML = `
                <div class="test-center-wrap">
                    <div class="test-question-card">
                        <div class="test-question-title">풀이 현황 요약</div>
                        <div style="line-height:1.9; color:#1f2937; font-size:15px;">

                    </div>

                        <div class="test-nav-info">확인 후 테스트를 완료하세요.</div>

                            <button class="button secondary" id="summaryBackBtn">문제로 돌아가기</button>
                            <button class="button" id="summarySubmitBtn" style="background:#0f766e;">테스트 완료</button>
                        </div>
                    </div>
                </div>
            `;

            const backBtn = document.getElementById('summaryBackBtn');
            const submitBtn = document.getElementById('summarySubmitBtn');
            if (backBtn) {
                backBtn.onclick = () => updateTestCenterView();

            if (submitBtn) {

        function updateTestCenterView() {
            const modalBody = document.getElementById('testCenterModalBody');
            const modalMeta = document.getElementById('testCenterModalMeta');
            const questions = testCenterState.questions || [];
            if (!modalBody || !modalMeta) {
                return;
            }

            modalMeta.textContent = testCenterState.meta || '';
            if (!questions.length) {
                modalBody.innerHTML = '<div class="test-center-wrap"><p style="color:var(--muted);">표시할 문제가 없습니다.</p></div>';
                return;
            }

            const currentIndex = Math.max(0, Math.min(testCenterState.index, questions.length - 1));
            testCenterState.index = currentIndex;
            const currentQuestion = questions[currentIndex];
            const isLastQuestion = currentIndex >= questions.length - 1;

            modalBody.innerHTML = `
                <div class="test-center-wrap">
                    <div class="test-question-card">${renderTestCenterQuestion(currentQuestion)}</div>
                    <div class="test-nav">
                        <div class="test-nav-info">문제 ${currentIndex + 1} / ${questions.length}</div>
                        <div style="display:flex; gap:8px;">
                            <button class="button" id="testPrevBtn" ${currentIndex <= 0 ? 'disabled' : ''}>이전</button>
                            <button class="button test-next-btn ${isLastQuestion ? 'disabled' : 'enabled'}" id="testNextBtn" ${isLastQuestion ? 'disabled' : ''}>다음</button>
                            <button class="button" id="testFinishBtn" style="background:#0f766e; ${isLastQuestion ? '' : 'display:none;'}">종합 보기</button>
                        </div>
                    </div>
                </div>
            `;
            initMatchingDragDrop(modalBody, currentQuestion);
            applyStoredResponse(currentQuestion, testCenterState.responses[currentIndex]);

            const prevBtn = document.getElementById('testPrevBtn');
            const nextBtn = document.getElementById('testNextBtn');
            const finishBtn = document.getElementById('testFinishBtn');

            if (nextBtn) {
                const nextEnabled = !isLastQuestion;
                nextBtn.disabled = !nextEnabled;
                nextBtn.classList.toggle('enabled', nextEnabled);
                nextBtn.classList.toggle('disabled', !nextEnabled);
            }

            if (prevBtn) {
                prevBtn.onclick = () => {
                    storeCurrentResponse(currentQuestion, currentIndex);
                    if (testCenterState.index > 0) {
                        testCenterState.index -= 1;
                        updateTestCenterView();
                    }
                };
            }
            if (nextBtn) {
                nextBtn.onclick = () => {
                    storeCurrentResponse(currentQuestion, currentIndex);
                    if (testCenterState.index < questions.length - 1) {
                        testCenterState.index += 1;
                        updateTestCenterView();
                    }
                };
            }
            if (finishBtn) {
                finishBtn.onclick = () => {
                    storeCurrentResponse(currentQuestion, currentIndex);
                    showTestCenterSummary();
                };
            }
        }

        function openTestCenterModal() {
            if (testCenterState.completed || testCenterState.submitted) {
                alert(getTestCompletedMessage(testCenterState.completedAt));

            if (!testCenterState.startedAt) {

        async function renderGeneratedTestCenter(parsed, content) {
            const bodyDiv = document.getElementById('contentBody');
            let questions = Array.isArray(parsed.questions) ? parsed.questions : [];
            const expectedCount = Number(parsed.question_count || 0);

            // New payloads keep lab_content lightweight and fetch question list on demand.
            if (parsed.generated_test_id && (!questions.length || (expectedCount > 0 && questions.length < expectedCount))) {
                try {
                    const response = await fetch(`/api/admin/generated-tests/${parsed.generated_test_id}`);
                    const data = await response.json();
                    if (response.ok && Array.isArray(data.questions)) {
                        questions = data.questions.map(question => {
                            const questionType = String(question.question_type || 'multiple_choice').toLowerCase();
                            const base = {
                                id: question.id,
                                question_number: question.question_number,
                                question_type: questionType,
                                question_title: question.question_title || '',
                                question_text: question.question_text || '',
                                question_category_name: question.question_category_name || 'None',
                                image_urls: Array.isArray(question.image_urls) ? question.image_urls : [],
                                answer: question.answer || ''
                            };

                            if (questionType === 'yes_no') {
                                base.items = (Array.isArray(question.items) ? question.items : []).map(item => ({
                                    id: item.id,
                                    text: item.text || '',
                                    answer: item.answer || ''
                                }));
                            } else if (questionType === 'matching') {
                                base.options = Array.isArray(question.options) ? question.options : [];
                                base.items = (Array.isArray(question.items) ? question.items : []).map(item => ({
                                    id: item.id,
                                    text: item.text || '',
                                    answer: item.answer || ''
                                }));
                            } else {
                                base.options = (question.options && typeof question.options === 'object') ? question.options : {};
                            }

                            return base;
                        });
                    }
                } catch (error) {
                    // Keep fallback message below.
                }
            }

            if (expectedCount > 0 && questions.length < expectedCount) {
                bodyDiv.innerHTML = '<div class="test-center-wrap"><p style="color:#dc2626;">문제 데이터를 모두 불러오지 못했습니다. 새로고침 후 다시 시도해 주세요.</p></div>';
                return;
            }

            const contentSubject = (content && content.lab_content_subject) || parsed.generated_name || '테스트';
            const totalCount = expectedCount > 0 ? expectedCount : questions.length;
            const meta = `${parsed.generated_name || contentSubject || '테스트'} | ${parsed.test_category_name || ''} | 총 ${totalCount}문항`;
            testCenterState = {
                questions,
                index: 0,
                meta,
                responses: questions.map(() => null),
                contentId: content ? Number(content.content_id) : null,
                generatedTestId: parsed.generated_test_id ? Number(parsed.generated_test_id) : null,
                startedAt: null,
                submitted: false,
                completed: false,
                completedAt: null,
            };

            if (testCenterState.contentId != null && trainingKey && labId && memberId) {
                try {
                    const completionRes = await fetch(`/api/portal/test-center/completion?training_key=${encodeURIComponent(trainingKey)}&member_id=${encodeURIComponent(memberId)}&lab_id=${encodeURIComponent(labId)}&content_id=${encodeURIComponent(testCenterState.contentId)}`);
                    const completionData = await completionRes.json();
                    if (completionRes.ok && completionData.completed) {
                        testCenterState.completed = true;
                        testCenterState.submitted = true;
                        testCenterState.completedAt = completionData.completed_at || null;
                    }
                } catch (error) {
                    // If status check fails, keep test accessible and rely on submit API protection.
                }
            }

            if (!questions.length) {
                bodyDiv.innerHTML = '<div class="test-center-wrap"><p style="color:var(--muted);">문제 데이터를 불러오지 못했습니다.</p></div>';
                return;
            }

            bodyDiv.innerHTML = `
                <div class="test-center-landing">
                    <div class="test-center-meta" style="margin-bottom:14px;">${meta}</div>
                    <button type="button" class="test-center-start-btn" onclick="openTestCenterModal()" ${testCenterState.completed ? 'disabled style="opacity:0.6; cursor:not-allowed;"' : ''}>${testCenterState.completed ? '이미 완료한 테스트' : '테스트 시작'}</button>
                    ${testCenterState.completed ? `<div style="margin-top:10px; color:var(--muted); font-size:13px;">${escapeHtml(getTestCompletedMessage(testCenterState.completedAt)).replace(/\n/g, '<br>')}</div>` : ''}
                </div>
            `;
        }

        // Function to load user info and then titles and contents
        async function fetchUserInfoAndLoadContents() {
            if (!trainingKey || !labId || !memberId) { 
                alert('트레이닝 키, 랩 ID, 그리고 멤버 ID가 필요합니다.');
                window.location.href = '/portal'; // Or appropriate fallback
                return;
            }

            try {
                // Fetch user info to get member_id (and verify if needed, though memberId is already from URL)
                const userInfoRes = await fetch(`/api/portal-info?training_key=${trainingKey}&member_id=${memberId}`);
                if (!userInfoRes.ok) {
                    const errorData = await userInfoRes.json();
                    throw new Error(errorData.detail || '사용자 정보를 불러오는데 실패했습니다.');
                }
                // const userInfo = await userInfoRes.json(); // If you need to use userInfo data beyond just memberId

                // Fetch course name
                const courseRes = await fetch(`/api/admin/courses/${trainingKey}`);
                let courseName = '알 수 없는 과정';
                if (courseRes.ok) {
                    const courseData = await courseRes.json();
                    courseName = courseData.course_name;
                }

                // Fetch lab name
                const labRes = await fetch(`/api/admin/labs/${labId}?training_key=${trainingKey}`);
                let labName = '알 수 없는 랩';
                if (labRes.ok) {
                    const labData = await labRes.json();
                    labName = labData.lab_name;
                }

                // Update breadcrumbs
                document.getElementById('breadcrumbCourse').innerHTML = ` &gt; <a href="/portal" style="text-decoration: none; color: #007bff;">${courseName}</a>`;
                document.getElementById('breadcrumbLab').innerHTML = ` &gt; ${labName}`;

                // Load contents for the lab
                const res = await fetch(`/api/admin/lab_contents?training_key=${trainingKey}&lab_id=${labId}`);
                contents = await res.json();
                
                // view_number로 정렬
                contents.sort((a, b) => a.view_number - b.view_number);
                
                const list = document.getElementById('contentList');
                list.innerHTML = '';
                contents.forEach((c, idx) => {
                    const li = document.createElement('li');
                    li.textContent = c.lab_content_subject;
                    
                    // 콘텐츠 상태가 1(활성화)인 경우에만 클릭 가능하게 설정
                    if (c.lab_content_status === 1) {
                        li.onclick = () => selectContent(idx);
                    } else {
                        li.classList.add('disabled-content');
                    }
                    list.appendChild(li);
                });
                
                // 첫 번째 활성화된 콘텐츠를 자동으로 선택하거나, 활성화된 콘텐츠가 없으면 비웁니다.
                const firstActiveContentIdx = contents.findIndex(c => c.lab_content_status === 1);
                if (firstActiveContentIdx !== -1) {
                    // selectContent(firstActiveContentIdx); // 자동 선택 제거
                    list.children[firstActiveContentIdx].classList.add('initial-selection'); // 초기 선택 표시용 클래스 추가
                    document.getElementById('contentTitle').textContent = "콘텐츠를 선택해주세요.";
                    document.getElementById('contentBody').innerHTML = '<p style="color:#555;">왼쪽 목록에서 콘텐츠를 선택해주세요.</p>';
                } else {
                    document.getElementById('contentTitle').textContent = "콘텐츠를 찾을 수 없습니다.";
                    document.getElementById('contentBody').innerHTML = '<p style="color:#555;">현재 활성화된 콘텐츠가 없습니다.</p>';
                }
            } catch (error) {
                alert(`페이지 로드 실패: ${error.message}`);
            }
        }

        async function selectContent(idx) {
            const content = contents[idx];

            // 활성화되지 않은 콘텐츠는 선택할 수 없음
            if (content.lab_content_status !== 1) {
                document.getElementById('contentTitle').textContent = "비활성화된 콘텐츠";
                document.getElementById('contentBody').innerHTML = '<p style="color:red;">이 콘텐츠는 현재 활성화되어 있지 않아 볼 수 없습니다.</p>';
                return;
            }

            selectedIdx = idx;
            document.querySelectorAll('.content-list li').forEach((li, i) => {
                li.classList.toggle('selected', i === idx);
            });
            document.getElementById('contentTitle').textContent = content.lab_content_subject;
            const bodyDiv = document.getElementById('contentBody');
            
            // 콘텐츠 타입에 따라 다르게 처리
            const contentText = content.lab_content || '(내용 없음)';
            
            if (content.lab_content_type === 0) {
                // 타입 0: URL 기반 마크다운 처리
                if (contentText.startsWith('http://') || contentText.startsWith('https://')) {
                    try {
                        const res = await fetch(`/api/proxy-markdown?url=${encodeURIComponent(contentText)}`);
                        if (res.ok) {
                            const md = await res.text();
                            bodyDiv.innerHTML = marked.parse(md);
                            
                            // 코드 블록에 문법 강조 적용
                            if (window.hljs) {
                                bodyDiv.querySelectorAll('pre code').forEach((block) => {
                                    hljs.highlightElement(block);
                                });
                            }
                        } else {
                            const errorText = await res.text();
                            bodyDiv.innerHTML = `<span style="color:red">마크다운 콘텐츠를 불러올 수 없습니다: ${errorText}</span>`;
                        }
                    } catch (e) {
                        bodyDiv.innerHTML = `<span style="color:red">마크다운 콘텐츠를 불러오는 중 오류 발생: ${e.message}</span>`;
                    }
                } else {
                    bodyDiv.innerHTML = '<span style="color:red">유효하지 않은 마크다운 URL입니다.</span>';
                }
            } else if (content.lab_content_type === 2) {
                // 타입 2: Text(Markdown) 처리 - 직접 입력된 마크다운 텍스트
                bodyDiv.innerHTML = marked.parse(contentText);
                
                // 코드 블록에 문법 강조 적용
                if (window.hljs) {
                    bodyDiv.querySelectorAll('pre code').forEach((block) => {
                        hljs.highlightElement(block);
                    });
                }
            } else if (content.lab_content_type === 1) {
                // 타입 1: 웹페이지 링크 버튼
                if (contentText.startsWith('http://') || contentText.startsWith('https://')) {
                    bodyDiv.innerHTML = `
                        <div class="external-link">
                            <div>
                                <p class="desc">이 콘텐츠는 외부 웹페이지입니다.</p>
                                <p class="sub">아래 버튼을 클릭하여 웹페이지를 확인하세요.</p>
                            </div>
                            <a href="${contentText}" target="_blank" class="external-link-btn">🌐 웹페이지 열기</a>
                            <div class="external-link-url">
                                <p>링크: <a href="${contentText}" target="_blank">${contentText}</a></p>
                            </div>
                        </div>
                    `;
                } else {
                    bodyDiv.innerHTML = '<span style="color:red">웹페이지 URL이 아닙니다.</span>';
                }
            } else if (content.lab_content_type === 3) {
                // 타입 3: 코드 - Copy code 버튼 포함
                const escapedCode = contentText
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
                
                bodyDiv.innerHTML = `
                    <div class="code-block-wrapper">
                        <div class="code-header">
                            <span class="code-language">💻 Code</span>
                            <button type="button" class="copy-code-btn" onclick="copyCodeToClipboard(event)">Copy code</button>
                        </div>
                        <pre><code class="language-python">${escapedCode}</code></pre>
                    </div>
                `;
                
                // Apply syntax highlighting
                const codeBlock = bodyDiv.querySelector('code');
                if (codeBlock && window.hljs) {
                    hljs.highlightElement(codeBlock);
                }
            } else if (content.lab_content_type === 4) {
                // 타입 4: 테스트 센터 JSON 콘텐츠
                try {
                    const parsed = JSON.parse(contentText);
                    if (parsed && parsed.content_kind === 'generated_test_center') {
                        await renderGeneratedTestCenter(parsed, content);
                    } else {
                        bodyDiv.innerHTML = `<pre style="background: #f6f8fa; padding: 16px; border-radius: 6px; overflow-x: auto;">${contentText}</pre>`;
                    }
                } catch (error) {
                    bodyDiv.innerHTML = `<pre style="background: #f6f8fa; padding: 16px; border-radius: 6px; overflow-x: auto;">${contentText}</pre>`;
                }
            } else if (content.lab_content_type === 5) {
                // 타입 5: 과제 (파일 업로드)
                let assignmentDesc = '';
                try {
                    const parsed = JSON.parse(contentText);
                    if (parsed && parsed.url) {
                        assignmentDesc = `<div style="margin-bottom:12px;">
                            <a href="${parsed.url}" target="_blank" style="color:#2563eb; text-decoration:underline; font-weight:600;">&#128196; 과제 내용 파일 다운로드</a>
                            <span style="color:#64748b; font-size:13px; margin-left:8px;">${parsed.file_name || ''}</span>
                        </div>`;
                    }
                } catch { assignmentDesc = ''; }
                bodyDiv.innerHTML = `
                    <div style="padding:20px; background:#f0f9ff; border:1.5px solid #bae6fd; border-radius:12px;">
                        <div style="font-size:18px; font-weight:700; color:#0369a1; margin-bottom:12px;">&#128203; 과제 제출</div>
                        ${assignmentDesc}
                        <div style="margin-bottom:12px; color:#334155; font-size:14px;">과제 파일을 선택하여 제출하세요.</div>
                        <input type="file" id="assignmentSubmitFile" style="display:block; margin-bottom:10px;">
                        <button id="assignmentSubmitBtn" onclick="submitAssignmentFile(${content.content_id})"
                            style="background:#0369a1; color:#fff; border:none; border-radius:8px; padding:10px 22px; font-weight:700; cursor:pointer; font-size:15px;">
                            제출하기
                        </button>
                        <div id="assignmentSubmitMsg" style="margin-top:10px; font-size:13px;"></div>
                        <div id="assignmentSubmitPreview" style="margin-top:12px;"></div>
                    </div>
                `;
                await loadLatestAssignmentSubmission(content.content_id);
            } else {
                // 기타 타입: 기본 텍스트 처리
                bodyDiv.innerHTML = `<pre style="background: #f6f8fa; padding: 16px; border-radius: 6px; overflow-x: auto;">${contentText}</pre>`;
            }

            // Log the content view
            try {
                const logData = {
                    training_key: trainingKey,
                    member_id: memberId, 
                    lab_id: parseInt(labId),
                    content_id: content.content_id
                };
                const logRes = await fetch('/api/portal/log_content_view', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(logData)
                });
                if (!logRes.ok) {
                    const errorData = await logRes.json();
                } else {
                }
            } catch (error) {
            }
        }

        async function loadLatestAssignmentSubmission(contentId) {
            const msgEl = document.getElementById('assignmentSubmitMsg');
            const previewEl = document.getElementById('assignmentSubmitPreview');
            const normalizedLabId = Number.parseInt(String(labId || '').trim(), 10);
            const lookupMemberId = String(memberId || '').trim();
            const lookupMemberName = String(getQueryParam('member_name') || memberId || '').trim();
            if (!Number.isInteger(normalizedLabId) || !trainingKey || (!lookupMemberId && !lookupMemberName)) {
                return;
            }

            try {
                const qs = new URLSearchParams({
                    training_key: String(trainingKey),
                    lab_id: String(normalizedLabId),
                    content_id: String(contentId),
                    member_id: lookupMemberId,
                    member_name: lookupMemberName,
                });
                const resp = await fetch(`/api/portal/assignment/latest?${qs.toString()}`);
                if (!resp.ok) return;
                const data = await resp.json();
                if (!data || !data.submitted) return;

                if (msgEl) {
                    msgEl.style.color = '#166534';
                    msgEl.textContent = '과제가 제출되었습니다.';
                }
                renderSubmittedAssignmentPreview(previewEl, data.file_name, data.file_url || data.url);
            } catch (e) {
                // 최신 제출 조회 실패는 제출 UI 사용을 막지 않도록 무시
            }
        }
        
        function renderSubmittedAssignmentPreview(containerEl, fileName, fileUrl) {
            if (!containerEl) return;
            const safeName = String(fileName || '-');
            const safeUrl = String(fileUrl || '');
            const ext = safeName.toLowerCase().split('.').pop();
            let previewHtml = '<div style="color:#64748b;">미리보기를 지원하지 않는 형식입니다. 다운로드 후 확인해주세요.</div>';

            if (['png', 'jpg', 'jpeg', 'gif', 'webp', 'bmp'].includes(ext)) {
                previewHtml = `<img src="${safeUrl}" alt="preview" style="max-width:100%; border:1px solid #e5e7eb; border-radius:8px;">`;
            } else if (ext === 'pdf') {
                previewHtml = `<iframe src="${safeUrl}" style="width:100%; height:56vh; border:1px solid #e5e7eb; border-radius:8px;"></iframe>`;
            } else if (['doc', 'docx', 'ppt', 'pptx'].includes(ext)) {
                const officeSrc = `https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(safeUrl)}`;
                previewHtml = `<iframe src="${officeSrc}" style="width:100%; height:56vh; border:1px solid #e5e7eb; border-radius:8px;"></iframe>`;
            } else if (['txt', 'text', 'md', 'csv', 'log', 'json', 'xml', 'yaml', 'yml', 'ini', 'conf', 'sql'].includes(ext)) {
                previewHtml = `<iframe src="${safeUrl}" style="width:100%; height:56vh; border:1px solid #e5e7eb; border-radius:8px;"></iframe>`;
            }

            const uniqueId = `${Date.now()}_${Math.random().toString(36).slice(2)}`;
            const previewBtnId = `assignmentPreviewBtn_${uniqueId}`;
            const previewBodyId = `assignmentPreviewBody_${uniqueId}`;

            containerEl.innerHTML = `
                <div style="margin-bottom:8px; font-size:14px; color:#0f172a;">
                    <strong>제출된 파일:</strong> ${escapeHtml(safeName)}
                    <button id="${previewBtnId}" type="button" style="margin-left:8px; background:#0ea5e9; color:#fff; border:none; border-radius:6px; padding:6px 10px; font-size:12px; font-weight:700; cursor:pointer;">미리보기</button>
                    <a href="${escapeHtml(safeUrl)}" target="_blank" style="margin-left:8px; color:#2563eb; text-decoration:underline;">새 창에서 열기</a>
                </div>
                <div id="${previewBodyId}" style="display:none; margin-top:8px;">${previewHtml}</div>
            `;

            const previewBtn = document.getElementById(previewBtnId);
            const previewBody = document.getElementById(previewBodyId);
            if (previewBtn && previewBody) {
                previewBtn.addEventListener('click', () => {
                    const isOpen = previewBody.style.display !== 'none';
                    previewBody.style.display = isOpen ? 'none' : 'block';
                    previewBtn.textContent = isOpen ? '미리보기' : '미리보기 닫기';
                });
            }
        }

        // 과제 파일 제출 함수 (portal_lab_content)
        async function submitAssignmentFile(contentId) {
            const fileInput = document.getElementById('assignmentSubmitFile');
            const msgEl = document.getElementById('assignmentSubmitMsg');
            const previewEl = document.getElementById('assignmentSubmitPreview');
            if (!fileInput || !fileInput.files || fileInput.files.length === 0) {
                if (msgEl) msgEl.textContent = '제출할 파일을 선택해주세요.';
                return;
            }
            const memberName = getQueryParam('member_name') || memberId || 'unknown';
            const normalizedLabId = Number.parseInt(String(labId || '').trim(), 10);
            if (!Number.isInteger(normalizedLabId)) {
                const reason = `lab_id가 올바르지 않습니다. 현재값: ${String(labId)}`;
                if (msgEl) {
                    msgEl.style.color = '#dc2626';
                    msgEl.textContent = `오류: ${reason}`;
                }
                return;
            }
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('training_key', trainingKey);
            formData.append('lab_id', String(normalizedLabId));
            formData.append('content_id', contentId);
            formData.append('member_id', memberId || '');
            formData.append('member_name', memberName);
            const btn = document.getElementById('assignmentSubmitBtn');
            if (btn) btn.disabled = true;
            if (msgEl) msgEl.textContent = '제출 중...';
            try {
                async function postSubmit(forceReplace) {
                    const fd = new FormData();
                    fd.append('file', fileInput.files[0]);
                    fd.append('training_key', trainingKey);
                    fd.append('lab_id', String(normalizedLabId));
                    fd.append('content_id', contentId);
                    fd.append('member_id', memberId || '');
                    fd.append('member_name', memberName);
                    fd.append('force_replace', forceReplace ? '1' : '0');
                    const resp = await fetch('/api/portal/assignment/submit', { method: 'POST', body: fd });
                    const text = await resp.text();
                    let data;
                    try { data = JSON.parse(text); } catch { data = {}; }
                    return { resp, data, text };
                }

                let { resp, data, text } = await postSubmit(false);
                if (resp.status === 409) {
                    const detail = (data && data.detail) ? data.detail : '이미 과제가 제출되었습니다. 다시 업로드 하시겠습니까?';
                    const ok = confirm(detail);
                    if (!ok) {
                        if (msgEl) { msgEl.style.color = '#b45309'; msgEl.textContent = '재업로드가 취소되었습니다.'; }
                        if (btn) btn.disabled = false;
                        return;
                    }
                    ({ resp, data, text } = await postSubmit(true));
                }

                if (!resp.ok) {
                    let detail = data.detail || data.message || text || '제출 실패';
                    if (detail && typeof detail === 'object') detail = JSON.stringify(detail);
                    throw new Error(`HTTP ${resp.status} ${resp.statusText} | ${detail}`);
                }
                if (msgEl) { msgEl.style.color = '#166534'; msgEl.textContent = `✅ 제출 완료: ${data.file_name}`; }
                renderSubmittedAssignmentPreview(previewEl, data.file_name, data.url);
            } catch (err) {
                const message = err && err.message ? err.message : String(err);
                if (msgEl) { msgEl.style.color = '#dc2626'; msgEl.textContent = `오류: ${message}`; }
                if (btn) btn.disabled = false;
            }
        }

        // 코드 복사 함수
        function copyCodeToClipboard(event) {
            event.preventDefault();
            event.stopPropagation();
            
            const button = event.currentTarget;
            
            try {
                const codeBlockWrapper = button.closest('.code-block-wrapper');
                if (!codeBlockWrapper) {
                    throw new Error('Code block wrapper not found');
                }
                
                const codeElement = codeBlockWrapper.querySelector('code');
                if (!codeElement) {
                    throw new Error('Code element not found');
                }
                
                const code = codeElement.textContent;
                
                if (!code || code.trim() === '') {
                    throw new Error('Code is empty');
                }
                
                navigator.clipboard.writeText(code).then(() => {
                    button.textContent = '✓ Copied!';
                    button.classList.add('copied');
                    
                    setTimeout(() => {
                        button.textContent = 'Copy code';
                        button.classList.remove('copied');
                    }, 2000);
                }).catch(err => {
                    try {
                        const textArea = document.createElement('textarea');
                        textArea.value = code;
                        document.body.appendChild(textArea);
                        textArea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textArea);
                        
                        button.textContent = '✓ Copied!';
                        button.classList.add('copied');
                        setTimeout(() => {
                            button.textContent = 'Copy code';
                            button.classList.remove('copied');
                        }, 2000);
                    } catch (fallbackErr) {
                        button.textContent = '✗ Failed';
                        setTimeout(() => {
                            button.textContent = 'Copy code';
                        }, 2000);
                    }
                });
            } catch (error) {
                button.textContent = '✗ Failed';
                setTimeout(() => {
                    button.textContent = 'Copy code';
                }, 2000);
            }
        }
        
        fetchUserInfoAndLoadContents(); // 페이지 로드시 사용자 정보 및 제목과 콘텐츠를 함께 불러옵니다.
    </script>
