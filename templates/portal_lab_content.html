<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>랩 콘텐츠 보기</title>
    <style>
        :root {
            --bg: #f7f8fb;
            --panel: #ffffff;
            --sidebar: #f4f6fa;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #e5e7eb;
            --accent: #2563eb;
            --accent-soft: #e8f0ff;
            --hover: #eef2f7;
            --code-bg: #f6f8fa;
            --shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0; /* 기본 마진 제거 */
            padding: 0;
        }
        
        /* 모바일 반응형 스타일 */
        @media (max-width: 768px) {
            .container { flex-direction: column; margin: 10px auto; }
            .sidebar { width: 100%; height: auto; position: static; border-right: none; border-bottom: 1px solid #eee; padding: 20px; }
            .main-content { padding: 20px; }
            .breadcrumbs { padding: 15px 20px; }
            .markdown-body { font-size: 1em; }
        }
        
        @media (max-width: 480px) {
            .container { margin: 5px auto; }
            .sidebar { padding: 15px; }
            .main-content { padding: 15px; }
            .breadcrumbs { padding: 10px 15px; }
            .markdown-body { font-size: 0.95em; }
        }
        
        .breadcrumbs {
            padding: 16px 40px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            font-size: 0.95em;
            color: var(--muted);
        }
        .breadcrumbs a {
            text-decoration: none;
            color: var(--accent);
            font-weight: 500;
        }
        .breadcrumbs a:hover { text-decoration: underline; }
        .container {
            max-width: 1100px;
            margin: 20px auto 40px auto; /* 상단 여백 추가 */
            background: var(--panel);
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            padding: 0;
            display: flex;
            min-height: 600px;
        }
        .sidebar {
            width: 300px;
            border-right: 1px solid var(--border);
            padding: 24px 0 24px 24px;
            background: var(--sidebar);
            position: sticky; /* 스크롤 시 고정 */
            top: 0; /* 뷰포트 상단에 고정 */
            height: 100vh; /* 뷰포트 전체 높이 */
            overflow-y: auto; /* 내용이 길면 스크롤바 생성 */
            box-sizing: border-box; /* 패딩을 너비에 포함 */
        }
        .sidebar h2 { font-size: 1.05em; margin-bottom: 14px; color: var(--text); font-weight: 600; }
        .content-list { list-style: none; padding: 0; margin: 0; }
        .content-list li { padding: 10px 12px; cursor: pointer; border-radius: 8px; color: var(--text); margin-bottom: 6px; }
        .content-list li.selected { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
        .content-list li:hover { background: var(--hover); }
        .content-list li.disabled-content {
            color: var(--muted); /* 비활성화된 콘텐츠 색상 */
            cursor: not-allowed; /* 클릭 불가능 커서 */
            background-color: #f3f4f6; /* 배경색 변경 */
        }
        .content-list li.disabled-content:hover { background-color: #f3f4f6; }
        .main-content { flex: 1; padding: 36px 40px; min-width: 0; background: var(--panel); }
        .markdown-body { 
            font-size: 1.05em; 
            line-height: 1.75; 
            color: var(--text); 
            max-width: 100%;
        }
        .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4, .markdown-body h5, .markdown-body h6 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
        }
        .markdown-body h1 { font-size: 2em; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
        .markdown-body h2 { font-size: 1.5em; border-bottom: 1px solid #eaecef; padding-bottom: 0.3em; }
        .markdown-body h3 { font-size: 1.25em; }
        .markdown-body p { margin-bottom: 16px; }
        .markdown-body ul, .markdown-body ol { padding-left: 2em; margin-bottom: 16px; }
        .markdown-body li { margin-bottom: 0.25em; }
        .markdown-body blockquote { 
            padding: 0 1em; 
            color: var(--muted); 
            border-left: 0.25em solid #dfe2e5; 
            margin: 0 0 16px 0;
        }
        .markdown-body pre { 
            background: var(--code-bg); 
            padding: 16px; 
            border-radius: 6px; 
            overflow-x: auto;
            margin-bottom: 16px;
        }
        .markdown-body code { 
            background: var(--code-bg); 
            padding: 0.2em 0.4em; 
            border-radius: 3px; 
            font-size: 85%;
        }
        .markdown-body pre code {
            background: none;
            padding: 0;
            border-radius: 0;
        }
        .markdown-body table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 16px;
        }
        .markdown-body table th,
        .markdown-body table td {
            padding: 6px 13px;
            border: 1px solid #dfe2e5;
        }
        .markdown-body table th {
            background-color: var(--code-bg);
            font-weight: 600;
        }
        .markdown-body img {
            max-width: 100%;
            height: auto;
        }
        .markdown-body a {
            color: var(--accent);
            text-decoration: none;
        }
        .markdown-body a:hover {
            text-decoration: underline;
        }
        .button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.92em;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
        }
        .button:hover { background: #1e4ed8; }
        .back-btn { margin-bottom: 16px; }
        .external-link { text-align: center; padding: 36px 20px; }
        .external-link .desc { font-size: 1.02em; color: var(--text); margin-bottom: 8px; }
        .external-link .sub { color: var(--muted); margin-bottom: 24px; }
        .external-link .external-link-btn {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1em;
            transition: background-color 0.2s ease;
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.2);
        }
        .external-link .external-link-btn:hover { background: #1e4ed8; }
        .external-link .external-link-url {
            margin-top: 16px;
            font-size: 0.9em;
            color: var(--muted);
        }
        .external-link .external-link-url a {
            color: var(--accent);
            text-decoration: underline;
        }
        /* 코드 블럭 헤더 스타일 */
        .code-header {
            background: #2d333b;
            padding: 10px 16px;
            border-radius: 6px 6px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .code-language {
            color: #adbac7;
            font-size: 0.85em;
            font-weight: 600;
        }
        .copy-code-btn {
            background: #373e47;
            color: #adbac7;
            border: 1px solid #444c56;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .copy-code-btn:hover {
            background: #444c56;
            color: #ffffff;
        }
        .copy-code-btn.copied {
            background: #238636;
            color: #ffffff;
            border-color: #238636;
        }
        .code-block-wrapper {
            margin: 16px 0;
            border-radius: 8px;
            background: #22272e;
        }
        .code-header {
            background: #2d333b;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .code-language {
            color: #adbac7;
            font-size: 0.85em;
            font-weight: 600;
        }
        .code-block-wrapper pre {
            margin: 0;
            padding: 0;
            background: #22272e;
            overflow-x: auto;
        }
        .code-block-wrapper code {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
            line-height: 1.5;
            display: block;
            white-space: pre;
        }
        .hljs {
            background: #22272e !important;
            padding: 16px !important;
            margin: 0 !important;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        // 마크다운 파서 설정
        marked.setOptions({
            breaks: true,  // 줄바꿈을 <br>로 변환
            gfm: true,     // GitHub Flavored Markdown 지원
            sanitize: false // HTML 태그 허용 (XSS 방지는 서버에서 처리)
        });
    </script>
</head>
<body>
    <div class="breadcrumbs">
        <a href="/portal">홈</a>
        <span id="breadcrumbCourse"></span>
        <span id="breadcrumbLab"></span>
    </div>
    <div class="container">
        <div class="sidebar">
            <button class="back-btn button" onclick="window.history.back()">← Back</button>
            <h2>콘텐츠 목록</h2>
            <ul class="content-list" id="contentList"></ul>
        </div>
        <div class="main-content">
            <h2 id="contentTitle">콘텐츠 보기</h2>
            <div id="contentBody" class="markdown-body" style="margin-top:20px;"></div>
        </div>
    </div>
    <script>
        function getQueryParam(name) {
            const url = new URL(window.location.href);
            return url.searchParams.get(name);
        }
        const trainingKey = getQueryParam('training_key');
        const labId = getQueryParam('lab_id');
        const memberId = getQueryParam('member_id'); // Assuming member_id is also passed as a query parameter
        let contents = [];
        let selectedIdx = -1; // 초기 선택 인덱스를 -1로 설정

        // Function to load user info and then titles and contents
        async function fetchUserInfoAndLoadContents() {
            if (!trainingKey || !labId || !memberId) { 
                alert('트레이닝 키, 랩 ID, 그리고 멤버 ID가 필요합니다.');
                window.location.href = '/portal'; // Or appropriate fallback
                return;
            }

            try {
                // Fetch user info to get member_id (and verify if needed, though memberId is already from URL)
                const userInfoRes = await fetch(`/api/portal-info?training_key=${trainingKey}&member_id=${memberId}`);
                if (!userInfoRes.ok) {
                    const errorData = await userInfoRes.json();
                    throw new Error(errorData.detail || '사용자 정보를 불러오는데 실패했습니다.');
                }
                // const userInfo = await userInfoRes.json(); // If you need to use userInfo data beyond just memberId

                // Fetch course name
                const courseRes = await fetch(`/api/admin/courses/${trainingKey}`);
                let courseName = '알 수 없는 과정';
                if (courseRes.ok) {
                    const courseData = await courseRes.json();
                    courseName = courseData.course_name;
                }

                // Fetch lab name
                const labRes = await fetch(`/api/admin/labs/${labId}?training_key=${trainingKey}`);
                let labName = '알 수 없는 랩';
                if (labRes.ok) {
                    const labData = await labRes.json();
                    labName = labData.lab_name;
                }

                // Update breadcrumbs
                document.getElementById('breadcrumbCourse').innerHTML = ` &gt; <a href="/portal" style="text-decoration: none; color: #007bff;">${courseName}</a>`;
                document.getElementById('breadcrumbLab').innerHTML = ` &gt; ${labName}`;

                // Load contents for the lab
                const res = await fetch(`/api/admin/lab_contents?training_key=${trainingKey}&lab_id=${labId}`);
                contents = await res.json();
                
                // view_number로 정렬
                contents.sort((a, b) => a.view_number - b.view_number);
                
                const list = document.getElementById('contentList');
                list.innerHTML = '';
                contents.forEach((c, idx) => {
                    const li = document.createElement('li');
                    li.textContent = c.lab_content_subject;
                    
                    // 콘텐츠 상태가 1(활성화)인 경우에만 클릭 가능하게 설정
                    if (c.lab_content_status === 1) {
                        li.onclick = () => selectContent(idx);
                    } else {
                        li.classList.add('disabled-content');
                    }
                    list.appendChild(li);
                });
                
                // 첫 번째 활성화된 콘텐츠를 자동으로 선택하거나, 활성화된 콘텐츠가 없으면 비웁니다.
                const firstActiveContentIdx = contents.findIndex(c => c.lab_content_status === 1);
                if (firstActiveContentIdx !== -1) {
                    // selectContent(firstActiveContentIdx); // 자동 선택 제거
                    list.children[firstActiveContentIdx].classList.add('initial-selection'); // 초기 선택 표시용 클래스 추가
                    document.getElementById('contentTitle').textContent = "콘텐츠를 선택해주세요.";
                    document.getElementById('contentBody').innerHTML = '<p style="color:#555;">왼쪽 목록에서 콘텐츠를 선택해주세요.</p>';
                } else {
                    document.getElementById('contentTitle').textContent = "콘텐츠를 찾을 수 없습니다.";
                    document.getElementById('contentBody').innerHTML = '<p style="color:#555;">현재 활성화된 콘텐츠가 없습니다.</p>';
                }
            } catch (error) {
                alert(`페이지 로드 실패: ${error.message}`);
            }
        }

        async function selectContent(idx) {
            const content = contents[idx];

            // 활성화되지 않은 콘텐츠는 선택할 수 없음
            if (content.lab_content_status !== 1) {
                document.getElementById('contentTitle').textContent = "비활성화된 콘텐츠";
                document.getElementById('contentBody').innerHTML = '<p style="color:red;">이 콘텐츠는 현재 활성화되어 있지 않아 볼 수 없습니다.</p>';
                return;
            }

            selectedIdx = idx;
            document.querySelectorAll('.content-list li').forEach((li, i) => {
                li.classList.toggle('selected', i === idx);
            });
            document.getElementById('contentTitle').textContent = content.lab_content_subject;
            const bodyDiv = document.getElementById('contentBody');
            
            // 콘텐츠 타입에 따라 다르게 처리
            const contentText = content.lab_content || '(내용 없음)';
            
            if (content.lab_content_type === 0) {
                // 타입 0: URL 기반 마크다운 처리
                if (contentText.startsWith('http://') || contentText.startsWith('https://')) {
                    try {
                        const res = await fetch(`/api/proxy-markdown?url=${encodeURIComponent(contentText)}`);
                        if (res.ok) {
                            const md = await res.text();
                            bodyDiv.innerHTML = marked.parse(md);
                        } else {
                            bodyDiv.innerHTML = '<span style="color:red">마크다운 콘텐츠를 불러올 수 없습니다.</span>';
                        }
                    } catch (e) {
                        bodyDiv.innerHTML = '<span style="color:red">마크다운 콘텐츠를 불러오는 중 오류 발생.</span>';
                    }
                } else {
                    bodyDiv.innerHTML = '<span style="color:red">유효하지 않은 마크다운 URL입니다.</span>';
                }
            } else if (content.lab_content_type === 2) {
                // 타입 2: Text(Markdown) 처리 - 직접 입력된 마크다운 텍스트
                bodyDiv.innerHTML = marked.parse(contentText);
            } else if (content.lab_content_type === 1) {
                // 타입 1: 웹페이지 링크 버튼
                if (contentText.startsWith('http://') || contentText.startsWith('https://')) {
                    bodyDiv.innerHTML = `
                        <div class="external-link">
                            <div>
                                <p class="desc">이 콘텐츠는 외부 웹페이지입니다.</p>
                                <p class="sub">아래 버튼을 클릭하여 웹페이지를 확인하세요.</p>
                            </div>
                            <a href="${contentText}" target="_blank" class="external-link-btn">🌐 웹페이지 열기</a>
                            <div class="external-link-url">
                                <p>링크: <a href="${contentText}" target="_blank">${contentText}</a></p>
                            </div>
                        </div>
                    `;
                } else {
                    bodyDiv.innerHTML = '<span style="color:red">웹페이지 URL이 아닙니다.</span>';
                }
            } else if (content.lab_content_type === 3) {
                // 타입 3: 코드 - Copy code 버튼 포함
                const escapedCode = contentText
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
                
                bodyDiv.innerHTML = `
                    <div class="code-block-wrapper">
                        <div class="code-header">
                            <span class="code-language">💻 Code</span>
                            <button type="button" class="copy-code-btn" onclick="copyCodeToClipboard(event)">Copy code</button>
                        </div>
                        <pre><code class="language-python">${escapedCode}</code></pre>
                    </div>
                `;
                
                // Apply syntax highlighting
                const codeBlock = bodyDiv.querySelector('code');
                if (codeBlock && window.hljs) {
                    hljs.highlightElement(codeBlock);
                }
            } else {
                // 기타 타입: 기본 텍스트 처리
                bodyDiv.innerHTML = `<pre style="background: #f6f8fa; padding: 16px; border-radius: 6px; overflow-x: auto;">${contentText}</pre>`;
            }

            // Log the content view
            try {
                const logData = {
                    training_key: trainingKey,
                    member_id: memberId, 
                    lab_id: parseInt(labId),
                    content_id: content.content_id
                };
                const logRes = await fetch('/api/portal/log_content_view', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(logData)
                });
                if (!logRes.ok) {
                    const errorData = await logRes.json();
                } else {
                }
            } catch (error) {
            }
        }
        
        // 코드 복사 함수
        function copyCodeToClipboard(event) {
            event.preventDefault();
            event.stopPropagation();
            
            const button = event.currentTarget;
            
            try {
                const codeBlockWrapper = button.closest('.code-block-wrapper');
                if (!codeBlockWrapper) {
                    throw new Error('Code block wrapper not found');
                }
                
                const codeElement = codeBlockWrapper.querySelector('code');
                if (!codeElement) {
                    throw new Error('Code element not found');
                }
                
                const code = codeElement.textContent;
                
                if (!code || code.trim() === '') {
                    throw new Error('Code is empty');
                }
                
                navigator.clipboard.writeText(code).then(() => {
                    button.textContent = '✓ Copied!';
                    button.classList.add('copied');
                    
                    setTimeout(() => {
                        button.textContent = 'Copy code';
                        button.classList.remove('copied');
                    }, 2000);
                }).catch(err => {
                    try {
                        const textArea = document.createElement('textarea');
                        textArea.value = code;
                        document.body.appendChild(textArea);
                        textArea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textArea);
                        
                        button.textContent = '✓ Copied!';
                        button.classList.add('copied');
                        setTimeout(() => {
                            button.textContent = 'Copy code';
                            button.classList.remove('copied');
                        }, 2000);
                    } catch (fallbackErr) {
                        button.textContent = '✗ Failed';
                        setTimeout(() => {
                            button.textContent = 'Copy code';
                        }, 2000);
                    }
                });
            } catch (error) {
                button.textContent = '✗ Failed';
                setTimeout(() => {
                    button.textContent = 'Copy code';
                }, 2000);
            }
        }
        
        fetchUserInfoAndLoadContents(); // 페이지 로드시 사용자 정보 및 제목과 콘텐츠를 함께 불러옵니다.
    </script>
</body>
</html>
