<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --bg: #f7f8fb;
            --panel: #ffffff;
            --sidebar: #f4f6fa;
            --text: #1f2937;
            --muted: #6b7280;
            --border: #e5e7eb;
            --accent: #2563eb;
            --accent-soft: #e8f0ff;
            --hover: #eef2f7;
            --code-bg: #f6f8fa;
            --shadow: 0 10px 24px rgba(15, 23, 42, 0.08);

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0; /* 기본 마진 제거 */

        @media (max-width: 768px) {
            .container { flex-direction: column; margin: 10px auto; }
            .sidebar { width: 100%; height: auto; position: static; border-right: none; border-bottom: 1px solid #eee; padding: 20px; }
            .main-content { padding: 20px; }
            .breadcrumbs { padding: 15px 20px; }
            .markdown-body { font-size: 1em; }

        @media (max-width: 480px) {
            .container { margin: 5px auto; }

            .main-content { padding: 15px; }
            .breadcrumbs { padding: 10px 15px; }

            font-size: 0.95em;

        .breadcrumbs a {
            text-decoration: none;

            font-weight: 500;
        }
        .breadcrumbs a:hover { text-decoration: underline; }

            max-width: 1100px;

            background: var(--panel);

<body>
    <div class="breadcrumbs">
        <a href="/portal">홈</a>
        <span id="breadcrumbCourse"></span>
        <span id="breadcrumbLab"></span>
    </div>
    <div class="container">
        <div class="sidebar">
            <button class="back-btn button" onclick="window.history.back()">← Back</button>
            <h2>콘텐츠 목록</h2>
            <ul class="content-list" id="contentList"></ul>
        </div>
        <div class="main-content">
            <h2 id="contentTitle">콘텐츠 보기</h2>
            <div id="contentBody" class="markdown-body" style="margin-top:20px;"></div>
        </div>
    </div>

    <div id="testCenterModal" class="test-center-modal" onclick="handleTestCenterBackdropClick(event)">
        <div class="test-center-modal-card">
            <div class="test-center-modal-header">
                <div id="testCenterModalMeta" class="test-center-meta" style="margin:0;"></div>
                <button type="button" class="test-center-close-btn" onclick="closeTestCenterModal()">닫기</button>
            </div>
            <div id="testCenterModalBody"></div>
        </div>
    </div>

    <script>
        function getQueryParam(name) {
            const url = new URL(window.location.href);
            return url.searchParams.get(name);
        }
        const trainingKey = getQueryParam('training_key');
        const labId = getQueryParam('lab_id');
        const memberId = getQueryParam('member_id'); // Assuming member_id is also passed as a query parameter
        let contents = [];
        let selectedIdx = -1; // 초기 선택 인덱스를 -1로 설정
        let testCenterState = { questions: [], index: 0, meta: '', solved: [] };

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function normalizeChoiceToken(value) {
            return String(value || '')
                .trim()
                .toUpperCase()
                .replace(/\.$/, '');
        }

        function normalizeAnswerTokens(answerValue) {
            const raw = String(answerValue || '').trim();
            if (!raw) {
                return [];
            }

            let normalized = [];
            if (raw.startsWith('[') && raw.endsWith(']')) {
                try {
                    const parsed = JSON.parse(raw);
                    if (Array.isArray(parsed)) {
                        normalized = parsed
                            .map(token => normalizeChoiceToken(token))
                            .filter(token => token !== '');
                    }
                } catch (error) {
                    // Fallback to delimiter parsing below.
                }
            }

            if (!normalized.length) {
                normalized = raw
                    .replace(/，/g, ',')
                    .replace(/[\[\]"']/g, ' ')
                    .split(/[\s,;|/]+/)
                    .map(normalizeChoiceToken)
                    .filter(token => token !== '');
            }

            return Array.from(new Set(normalized));
        }

        function normalizeYesNo(value) {
            const token = String(value || '').trim().toUpperCase();
            if (['Y', 'YES', 'O', 'TRUE', '1'].includes(token)) return 'YES';
            if (['N', 'NO', 'X', 'FALSE', '0'].includes(token)) return 'NO';
            return token;
        }

        function getExpectedChoiceAnswerKeys(question) {
            const options = (question && question.options && typeof question.options === 'object') ? question.options : {};
            const expectedTokens = normalizeAnswerTokens(question && question.answer ? question.answer : '');
            if (!expectedTokens.length) {
                return [];
            }

            const keyTokenMap = new Map();
            const valueTokenMap = new Map();
            Object.keys(options).forEach(rawKey => {
                const keyToken = normalizeChoiceToken(rawKey);
                const valueToken = normalizeChoiceToken(options[rawKey]);
                if (keyToken) {
                    keyTokenMap.set(keyToken, keyToken);
                }
                if (valueToken && !valueTokenMap.has(valueToken)) {
                    valueTokenMap.set(valueToken, keyToken);
                }
            });

            const mapped = expectedTokens
                .map(token => keyTokenMap.get(token) || valueTokenMap.get(token) || token)
                .filter(Boolean);

            return Array.from(new Set(mapped));
        }

        function highlightCorrectChoiceOptions(question) {
            const expectedKeys = getExpectedChoiceAnswerKeys(question);
            const expectedSet = new Set(expectedKeys);
            const inputs = Array.from(document.querySelectorAll('input[data-answer-input="choice"]'));

            inputs.forEach(input => {
                const optionEl = input.closest('label');
                if (!optionEl) {
                    return;
                }
                optionEl.classList.remove('choice-correct-highlight');
                const key = normalizeChoiceToken(input.value || '');
                if (expectedSet.has(key)) {
                    optionEl.classList.add('choice-correct-highlight');
                }
            });
        }

        function initMatchingDragDrop(containerEl, question) {
            const questionType = String(question.question_type || 'multiple_choice').toLowerCase();
            if (questionType !== 'matching' || !containerEl) {
                return;
            }

            const options = Array.isArray(question.options) ? question.options : [];
            const optionCards = Array.from(containerEl.querySelectorAll('.matching-option-card'));
            const dropZones = Array.from(containerEl.querySelectorAll('.matching-drop-zone'));
            let selectedOptionIndex = null;

            const clearSelection = () => {
                selectedOptionIndex = null;
                optionCards.forEach(card => card.classList.remove('selected'));
            };

            const clearDuplicateAssignments = (optionIndex, exceptZone) => {
                dropZones.forEach(zone => {
                    if (zone === exceptZone) {
                        return;
                    }
                    const input = zone.querySelector('input[data-answer-input="matching"]');
                    const valueEl = zone.querySelector('.matching-drop-value');
                    if (input && String(input.value) === String(optionIndex)) {
                        input.value = '';
                        zone.classList.remove('filled');
                        if (valueEl) {
                            valueEl.textContent = '여기에 드롭';
                        }
                    }
                });
            };

            const assignOption = (zone, optionIndex) => {
                const normalized = Number(optionIndex);
                if (!normalized || normalized < 1 || normalized > options.length) {
                    return;
                }
                const input = zone.querySelector('input[data-answer-input="matching"]');
                const valueEl = zone.querySelector('.matching-drop-value');
                if (!input || !valueEl) {
                    return;
                }
                clearDuplicateAssignments(normalized, zone);
                input.value = String(normalized);
                valueEl.textContent = `${normalized}. ${options[normalized - 1] || ''}`;
                zone.classList.add('filled');
            };

            optionCards.forEach(card => {
                const optionIndex = Number(card.getAttribute('data-match-option-index'));
                card.setAttribute('draggable', 'true');

                card.addEventListener('dragstart', event => {
                    if (event.dataTransfer) {
                        event.dataTransfer.setData('text/plain', String(optionIndex));
                        event.dataTransfer.effectAllowed = 'move';
                    }
                });

                card.addEventListener('click', () => {
                    const wasSelected = selectedOptionIndex === optionIndex;
                    clearSelection();
                    if (!wasSelected) {
                        selectedOptionIndex = optionIndex;
                        card.classList.add('selected');
                    }
                });
            });

            dropZones.forEach(zone => {
                const input = zone.querySelector('input[data-answer-input="matching"]');
                const valueEl = zone.querySelector('.matching-drop-value');
                if (input && valueEl && input.value) {
                    const preset = Number(input.value);
                    if (preset && options[preset - 1]) {
                        valueEl.textContent = `${preset}. ${options[preset - 1]}`;
                        zone.classList.add('filled');
                    }
                }

                zone.addEventListener('dragover', event => {
                    event.preventDefault();
                    zone.classList.add('drag-over');
                });

                zone.addEventListener('dragleave', () => {
                    zone.classList.remove('drag-over');
                });

                zone.addEventListener('drop', event => {
                    event.preventDefault();
                    zone.classList.remove('drag-over');
                    const dropped = event.dataTransfer ? Number(event.dataTransfer.getData('text/plain')) : NaN;
                    assignOption(zone, dropped);
                    clearSelection();
                });

                zone.addEventListener('click', () => {
                    if (selectedOptionIndex) {
                        assignOption(zone, selectedOptionIndex);
                        clearSelection();
                        return;
                    }
                    const zoneInput = zone.querySelector('input[data-answer-input="matching"]');
                    if (!zoneInput || !zoneInput.value) {
                        return;
                    }
                    zoneInput.value = '';
                    zone.classList.remove('filled');
                    if (valueEl) {
                        valueEl.textContent = '여기에 드롭';
                    }
                });
            });
        }

        function unorderedEquals(left, right) {
            if (left.length !== right.length) {
                return false;
            }
            const leftSorted = [...left].sort();
            const rightSorted = [...right].sort();
            for (let idx = 0; idx < leftSorted.length; idx += 1) {
                if (leftSorted[idx] !== rightSorted[idx]) {
                    return false;
                }
            }
            return true;
        }

            const questionText = question.question_text || question.question_title || '';

            let bodyHtml = '';

            if (questionType === 'yes_no') {

            } else if (questionType === 'matching') {

                bodyHtml = `
                    <div class="matching-board">
                        <div class="matching-column">
                            <div class="matching-column-title">보기 (드래그 또는 클릭 선택)</div>

                            `).join('') || '<div style="color:var(--muted); font-size:13px;">보기가 없습니다.</div>'}

                                    <div class="matching-drop-zone" data-match-item-index="${idx}">

                        </div>

                `;

                const keys = Object.keys(options);
                bodyHtml = keys.map(key => `
                    <label class="test-option" style="cursor:pointer;">
                        <input type="${isMultiAnswer ? 'checkbox' : 'radio'}" name="test_choice" value="${escapeHtml(key)}" data-answer-input="choice" style="transform:scale(1.12); margin-right:8px;">

        function isCurrentQuestionCorrect(question) {
            const questionType = String(question.question_type || 'multiple_choice').toLowerCase();

            if (questionType === 'yes_no') {
                const items = Array.isArray(question.items) ? question.items : [];
                if (!items.length) return false;
                for (let idx = 0; idx < items.length; idx += 1) {
                    const selected = document.querySelector(`input[data-answer-input="yesno"][data-item-index="${idx}"]:checked`);
                    if (!selected) return false;
                    const expected = normalizeYesNo(items[idx].answer || '');
                    if (!expected || normalizeYesNo(selected.value) !== expected) return false;
                }
                return true;
            }

            if (questionType === 'matching') {
                const items = Array.isArray(question.items) ? question.items : [];
                const options = Array.isArray(question.options) ? question.options : [];
                if (!items.length) return false;
                for (let idx = 0; idx < items.length; idx += 1) {
                    const selected = document.querySelector(`input[data-answer-input="matching"][data-item-index="${idx}"]`);
                    if (!selected || !selected.value) return false;
                    const expectedRaw = String(items[idx].answer || '').trim();
                    let expected = expectedRaw;
                    if (expectedRaw && Number.isNaN(Number(expectedRaw))) {
                        const mappedIndex = options.findIndex(option => normalizeChoiceToken(option || '') === normalizeChoiceToken(expectedRaw));
                        if (mappedIndex >= 0) {
                            expected = String(mappedIndex + 1);
                        }
                    }
                    if (!expected || String(selected.value).trim() !== expected) return false;
                }
                return true;
            }

            const expectedAnswers = getExpectedChoiceAnswerKeys(question);
            if (!expectedAnswers.length) return false;
            const selectedAnswers = Array.from(document.querySelectorAll('input[data-answer-input="choice"]:checked'))
                .map(node => normalizeChoiceToken(node.value || ''))
                .filter(Boolean);
            return unorderedEquals(selectedAnswers, expectedAnswers);
        }

        function updateTestCenterView() {
            const modalBody = document.getElementById('testCenterModalBody');
            const modalMeta = document.getElementById('testCenterModalMeta');
            const questions = testCenterState.questions || [];
            if (!modalBody || !modalMeta) {
                return;
            }

            modalMeta.textContent = testCenterState.meta || '';
            if (!questions.length) {
                modalBody.innerHTML = '<div class="test-center-wrap"><p style="color:var(--muted);">표시할 문제가 없습니다.</p></div>';
                return;
            }

            const currentIndex = Math.max(0, Math.min(testCenterState.index, questions.length - 1));
            testCenterState.index = currentIndex;
            const currentQuestion = questions[currentIndex];

            modalBody.innerHTML = `
                <div class="test-center-wrap">
                    <div class="test-question-card">${renderTestCenterQuestion(currentQuestion)}</div>
                    <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; margin-top:14px; flex-wrap:wrap;">
                        <button class="button" id="testCheckBtn" style="background:#0f766e;">정답 확인</button>
                        <div id="testCheckMsg" style="font-size:14px; font-weight:700; color:var(--muted);"></div>
                    </div>
                    <div class="test-nav">
                        <div class="test-nav-info">문제 ${currentIndex + 1} / ${questions.length}</div>
                        <div style="display:flex; gap:8px;">
                            <button class="button" id="testPrevBtn" ${currentIndex <= 0 ? 'disabled' : ''}>이전</button>
                            <button class="button test-next-btn ${currentIndex >= questions.length - 1 ? 'disabled' : 'enabled'}" id="testNextBtn" ${currentIndex >= questions.length - 1 ? 'disabled' : ''}>다음</button>
                        </div>
                    </div>
                </div>
            `;
            initMatchingDragDrop(modalBody, currentQuestion);

            const prevBtn = document.getElementById('testPrevBtn');
            const nextBtn = document.getElementById('testNextBtn');
            const checkBtn = document.getElementById('testCheckBtn');
            const checkMsg = document.getElementById('testCheckMsg');

            if (nextBtn) {
                const nextEnabled = currentIndex < questions.length - 1;
                nextBtn.disabled = !nextEnabled;
                nextBtn.classList.toggle('enabled', nextEnabled);
                nextBtn.classList.toggle('disabled', !nextEnabled);
            }

            if (prevBtn) {
                prevBtn.onclick = () => {
                    if (testCenterState.index > 0) {
                        testCenterState.index -= 1;
                        updateTestCenterView();
                    }
                };
            }
            if (nextBtn) {
                nextBtn.onclick = () => {
                    if (testCenterState.index < questions.length - 1) {
                        testCenterState.index += 1;
                        updateTestCenterView();
                    }
                };
            }
            if (checkBtn) {
                checkBtn.onclick = () => {
                    const ok = isCurrentQuestionCorrect(currentQuestion);
                    if (ok) {
                        testCenterState.solved[currentIndex] = true;
                        if (checkMsg) {
                            checkMsg.textContent = '정답입니다! 다음 문제로 이동할 수 있습니다.';
                            checkMsg.style.color = '#0f766e';
                        }
                        highlightCorrectChoiceOptions(currentQuestion);
                        if (nextBtn) {
                            const nextEnabled = currentIndex < questions.length - 1;
                            nextBtn.disabled = !nextEnabled;
                            nextBtn.classList.toggle('enabled', nextEnabled);
                            nextBtn.classList.toggle('disabled', !nextEnabled);
                        }
                        showCorrectCelebrationPopup();
                    } else if (checkMsg) {
                        checkMsg.textContent = '오답입니다. 다음 문제로 계속 진행할 수 있습니다.';
                        checkMsg.style.color = '#dc2626';
                    }
                };
            }
        }

        async function renderGeneratedTestCenter(parsed, contentSubject) {
            const bodyDiv = document.getElementById('contentBody');
            let questions = Array.isArray(parsed.questions) ? parsed.questions : [];

            // New payloads keep lab_content lightweight and fetch question list on demand.
            if (!questions.length && parsed.generated_test_id) {
                try {
                    const response = await fetch(`/api/admin/generated-tests/${parsed.generated_test_id}`);
                    const data = await response.json();
                    if (response.ok && Array.isArray(data.questions)) {
                        questions = data.questions.map(question => {
                            const questionType = String(question.question_type || 'multiple_choice').toLowerCase();
                            const base = {
                                id: question.id,
                                question_number: question.question_number,
                                question_type: questionType,
                                question_title: question.question_title || '',
                                question_text: question.question_text || '',
                                question_category_name: question.question_category_name || 'None',
                                image_urls: Array.isArray(question.image_urls) ? question.image_urls : [],
                                answer: question.answer || ''
                            };

                            if (questionType === 'yes_no') {
                                base.items = (Array.isArray(question.items) ? question.items : []).map(item => ({
                                    id: item.id,
                                    text: item.text || '',
                                    answer: item.answer || ''
                                }));
                            } else if (questionType === 'matching') {
                                base.options = Array.isArray(question.options) ? question.options : [];
                                base.items = (Array.isArray(question.items) ? question.items : []).map(item => ({
                                    id: item.id,
                                    text: item.text || '',
                                    answer: item.answer || ''
                                }));
                            } else {
                                base.options = (question.options && typeof question.options === 'object') ? question.options : {};
                            }

                            return base;
                        });
                    }
                } catch (error) {
                    // Keep fallback message below.
                }
            }

            const totalCount = parsed.question_count || questions.length;
            const meta = `${parsed.generated_name || contentSubject || '테스트'} | ${parsed.test_category_name || ''} | 총 ${totalCount}문항`;
            testCenterState = { questions, index: 0, meta, solved: questions.map(() => false) };

            if (!questions.length) {
                bodyDiv.innerHTML = '<div class="test-center-wrap"><p style="color:var(--muted);">문제 데이터를 불러오지 못했습니다.</p></div>';
                return;
            }

            bodyDiv.innerHTML = `
                <div class="test-center-landing">
                    <div class="test-center-meta" style="margin-bottom:14px;">${meta}</div>
                    <button type="button" class="test-center-start-btn" onclick="openTestCenterModal()">테스트 시작</button>
                </div>
            `;
        }

        // Function to load user info and then titles and contents
        async function fetchUserInfoAndLoadContents() {
            if (!trainingKey || !labId || !memberId) { 
                alert('트레이닝 키, 랩 ID, 그리고 멤버 ID가 필요합니다.');
                window.location.href = '/portal'; // Or appropriate fallback
                return;
            }

            try {
                // Fetch user info to get member_id (and verify if needed, though memberId is already from URL)
                const userInfoRes = await fetch(`/api/portal-info?training_key=${trainingKey}&member_id=${memberId}`);
                if (!userInfoRes.ok) {
                    const errorData = await userInfoRes.json();
                    throw new Error(errorData.detail || '사용자 정보를 불러오는데 실패했습니다.');
                }
                // const userInfo = await userInfoRes.json(); // If you need to use userInfo data beyond just memberId

                // Fetch course name
                const courseRes = await fetch(`/api/admin/courses/${trainingKey}`);
                let courseName = '알 수 없는 과정';
                if (courseRes.ok) {
                    const courseData = await courseRes.json();
                    courseName = courseData.course_name;
                }

                // Fetch lab name
                const labRes = await fetch(`/api/admin/labs/${labId}?training_key=${trainingKey}`);
                let labName = '알 수 없는 랩';
                if (labRes.ok) {
                    const labData = await labRes.json();
                    labName = labData.lab_name;
                }

                // Update breadcrumbs
                document.getElementById('breadcrumbCourse').innerHTML = ` &gt; <a href="/portal" style="text-decoration: none; color: #007bff;">${courseName}</a>`;
                document.getElementById('breadcrumbLab').innerHTML = ` &gt; ${labName}`;

                // Load contents for the lab
                const res = await fetch(`/api/admin/lab_contents?training_key=${trainingKey}&lab_id=${labId}`);
                contents = await res.json();
                
                // view_number로 정렬
                contents.sort((a, b) => a.view_number - b.view_number);
                
                const list = document.getElementById('contentList');
                list.innerHTML = '';
                contents.forEach((c, idx) => {
                    const li = document.createElement('li');
                    li.textContent = c.lab_content_subject;
                    
                    // 콘텐츠 상태가 1(활성화)인 경우에만 클릭 가능하게 설정
                    if (c.lab_content_status === 1) {
                        li.onclick = () => selectContent(idx);
                    } else {
                        li.classList.add('disabled-content');
                    }
                    list.appendChild(li);
                });
                
                // 첫 번째 활성화된 콘텐츠를 자동으로 선택하거나, 활성화된 콘텐츠가 없으면 비웁니다.
                const firstActiveContentIdx = contents.findIndex(c => c.lab_content_status === 1);
                if (firstActiveContentIdx !== -1) {
                    // selectContent(firstActiveContentIdx); // 자동 선택 제거
                    list.children[firstActiveContentIdx].classList.add('initial-selection'); // 초기 선택 표시용 클래스 추가
                    document.getElementById('contentTitle').textContent = "콘텐츠를 선택해주세요.";
                    document.getElementById('contentBody').innerHTML = '<p style="color:#555;">왼쪽 목록에서 콘텐츠를 선택해주세요.</p>';
                } else {
                    document.getElementById('contentTitle').textContent = "콘텐츠를 찾을 수 없습니다.";
                    document.getElementById('contentBody').innerHTML = '<p style="color:#555;">현재 활성화된 콘텐츠가 없습니다.</p>';
                }
            } catch (error) {
                alert(`페이지 로드 실패: ${error.message}`);
            }
        }

        async function selectContent(idx) {
            const content = contents[idx];

            // 활성화되지 않은 콘텐츠는 선택할 수 없음
            if (content.lab_content_status !== 1) {
                document.getElementById('contentTitle').textContent = "비활성화된 콘텐츠";
                document.getElementById('contentBody').innerHTML = '<p style="color:red;">이 콘텐츠는 현재 활성화되어 있지 않아 볼 수 없습니다.</p>';
                return;
            }

            selectedIdx = idx;
            document.querySelectorAll('.content-list li').forEach((li, i) => {
                li.classList.toggle('selected', i === idx);
            });
            document.getElementById('contentTitle').textContent = content.lab_content_subject;
            const bodyDiv = document.getElementById('contentBody');
            
            // 콘텐츠 타입에 따라 다르게 처리
            const contentText = content.lab_content || '(내용 없음)';
            
            if (content.lab_content_type === 0) {
                // 타입 0: URL 기반 마크다운 처리
                if (contentText.startsWith('http://') || contentText.startsWith('https://')) {
                    try {
                        const res = await fetch(`/api/proxy-markdown?url=${encodeURIComponent(contentText)}`);
                        if (res.ok) {
                            const md = await res.text();
                            bodyDiv.innerHTML = marked.parse(md);
                            
                            // 코드 블록에 문법 강조 적용
                            if (window.hljs) {
                                bodyDiv.querySelectorAll('pre code').forEach((block) => {
                                    hljs.highlightElement(block);
                                });
                            }
                        } else {
                            const errorText = await res.text();
                            bodyDiv.innerHTML = `<span style="color:red">마크다운 콘텐츠를 불러올 수 없습니다: ${errorText}</span>`;
                        }
                    } catch (e) {
                        bodyDiv.innerHTML = `<span style="color:red">마크다운 콘텐츠를 불러오는 중 오류 발생: ${e.message}</span>`;
                    }
                } else {
                    bodyDiv.innerHTML = '<span style="color:red">유효하지 않은 마크다운 URL입니다.</span>';
                }
            } else if (content.lab_content_type === 2) {
                // 타입 2: Text(Markdown) 처리 - 직접 입력된 마크다운 텍스트
                bodyDiv.innerHTML = marked.parse(contentText);
                
                // 코드 블록에 문법 강조 적용
                if (window.hljs) {
                    bodyDiv.querySelectorAll('pre code').forEach((block) => {
                        hljs.highlightElement(block);
                    });
                }
            } else if (content.lab_content_type === 1) {
                // 타입 1: 웹페이지 링크 버튼
                if (contentText.startsWith('http://') || contentText.startsWith('https://')) {
                    bodyDiv.innerHTML = `
                        <div class="external-link">
                            <div>
                                <p class="desc">이 콘텐츠는 외부 웹페이지입니다.</p>
                                <p class="sub">아래 버튼을 클릭하여 웹페이지를 확인하세요.</p>
                            </div>
                            <a href="${contentText}" target="_blank" class="external-link-btn">🌐 웹페이지 열기</a>
                            <div class="external-link-url">
                                <p>링크: <a href="${contentText}" target="_blank">${contentText}</a></p>
                            </div>
                        </div>
                    `;
                } else {
                    bodyDiv.innerHTML = '<span style="color:red">웹페이지 URL이 아닙니다.</span>';
                }
            } else if (content.lab_content_type === 3) {
                // 타입 3: 코드 - Copy code 버튼 포함
                const escapedCode = contentText
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
                
                bodyDiv.innerHTML = `
                    <div class="code-block-wrapper">
                        <div class="code-header">
                            <span class="code-language">💻 Code</span>
                            <button type="button" class="copy-code-btn" onclick="copyCodeToClipboard(event)">Copy code</button>
                        </div>
                        <pre><code class="language-python">${escapedCode}</code></pre>
                    </div>
                `;
                
                // Apply syntax highlighting
                const codeBlock = bodyDiv.querySelector('code');
                if (codeBlock && window.hljs) {
                    hljs.highlightElement(codeBlock);
                }
            } else if (content.lab_content_type === 4) {
                // 타입 4: 테스트 센터 JSON 콘텐츠
                try {
                    const parsed = JSON.parse(contentText);
                    if (parsed && parsed.content_kind === 'generated_test_center') {
                        await renderGeneratedTestCenter(parsed, content.lab_content_subject);
                    } else {
                        bodyDiv.innerHTML = `<pre style="background: #f6f8fa; padding: 16px; border-radius: 6px; overflow-x: auto;">${contentText}</pre>`;
                    }
                } catch (error) {

        // 코드 복사 함수
        function copyCodeToClipboard(event) {
            event.preventDefault();
            event.stopPropagation();
            
            const button = event.currentTarget;
            
            try {
                const codeBlockWrapper = button.closest('.code-block-wrapper');
                if (!codeBlockWrapper) {
                    throw new Error('Code block wrapper not found');
                }
                
                const codeElement = codeBlockWrapper.querySelector('code');
                if (!codeElement) {
                    throw new Error('Code element not found');
                }
                
                const code = codeElement.textContent;
                
                if (!code || code.trim() === '') {
                    throw new Error('Code is empty');
                }
                
                navigator.clipboard.writeText(code).then(() => {
                    button.textContent = '✓ Copied!';
                    button.classList.add('copied');
                    
                    setTimeout(() => {
                        button.textContent = 'Copy code';
                        button.classList.remove('copied');
                    }, 2000);
                }).catch(err => {
                    try {
                        const textArea = document.createElement('textarea');
                        textArea.value = code;
                        document.body.appendChild(textArea);
                        textArea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textArea);
                        
                        button.textContent = '✓ Copied!';
                        button.classList.add('copied');
                        setTimeout(() => {
                            button.textContent = 'Copy code';
                            button.classList.remove('copied');
                        }, 2000);
                    } catch (fallbackErr) {
                        button.textContent = '✗ Failed';
                        setTimeout(() => {
                            button.textContent = 'Copy code';
                        }, 2000);
                    }
                });
            } catch (error) {
                button.textContent = '✗ Failed';
                setTimeout(() => {
                    button.textContent = 'Copy code';
                }, 2000);
            }
        }
        
        fetchUserInfoAndLoadContents(); // 페이지 로드시 사용자 정보 및 제목과 콘텐츠를 함께 불러옵니다.
    </script>
