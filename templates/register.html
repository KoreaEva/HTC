<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        :root {
            --bg: #ffffff;
            --panel: #ffffff;
            --muted: rgba(30, 30, 30, 0.7);
            --accent: #07b53b;
            --accent-dark: #069030;
            --text: #1e1e1e;
            --border: rgba(0, 0, 0, 0.06);
            --hover: rgba(7, 181, 59, 0.05);
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        body { font-family: SFPro, Arial, "Noto Sans JP", "Noto Sans KR", sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background-color: var(--bg); color: var(--text); }
        .container { background-color: white; padding: 20px; border-radius: 12px; box-shadow: var(--shadow); border: 1px solid var(--border); }
        
        /* 모바일 반응형 스타일 */
        @media (max-width: 768px) {
            body { padding: 15px; }
            .container { padding: 15px; }
            .section { padding: 15px; }
            h1 { font-size: 1.8em; }
        }
        
        @media (max-width: 480px) {
            body { padding: 10px; }
            .container { padding: 12px; }
            .section { padding: 12px; }
            h1 { font-size: 1.6em; }
            button { padding: 8px 16px; }
        }
        .section { margin-bottom: 30px; padding: 20px; border: 1px solid var(--border); border-radius: 12px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 700; color: var(--text); }
        input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 12px; box-sizing: border-box; font-size: 16px; color: var(--text); background: var(--panel); transition: border-color 0.2s ease; }
        input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(7, 181, 59, 0.12); }
        button { background-color: var(--accent); color: white; padding: 12px 32px; border: none; border-radius: 50px; cursor: pointer; font-weight: 700; font-size: 16px; transition: background 0.2s ease; }
        button:hover { background-color: var(--accent-dark); }
        .error { color: #ef4444; margin-top: 5px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Register</h1>
        <div class="section">
            <form id="registerForm">
                <div class="form-group">
                    <label for="trainingKey">트레이닝 키</label>
                    <input type="text" id="trainingKey" required>
                </div>
                <button type="button" id="checkTrainingKeyBtn">Check Training Key</button>
                <div id="trainingKeyError" class="error"></div>

                <div id="registerFields" style="display:none; margin-top:20px;">
                    <div class="form-group">
                        <label for="registerName">이름</label>
                        <input type="text" id="registerName" required>
                    </div>
                    <button type="submit">Register</button>
                    <div id="registerError" class="error"></div>
                </div>
            </form>
            
            <!-- 가입 성공 화면 -->
            <div id="registerResult" style="display:none; margin-top:20px; text-align:center;">
                <h2 style="color:#4CAF50; margin-bottom:20px;">회원가입 성공!</h2>
                <p style="font-size:18px; color:var(--text); margin-bottom:8px;">
                    이름: <span id="resultName" style="font-weight:600; color:var(--accent); font-size:28px;"></span>
                </p>
                <p style="font-size:16px; color:var(--muted); margin-bottom:20px;">
                    일련번호:
                </p>
                <div style="font-size:72px; font-weight:bold; color:#ff0000; margin:32px 0; line-height:1.2;">
                    <span id="resultOrder"></span>
                </div>
                <div style="margin-top:30px; padding:15px; background-color:#e3f2fd; border-radius:8px; border:1px solid #2196f3;">
                    <p style="font-size:16px; color:#1976d2; margin:0;">
                        로그인할 때는 <strong style="font-size:20px; color:#d32f2f;" id="loginName"></strong> 으로 로그인하세요
                    </p>
                </div>
            </div>
            
            <div id="goLoginDiv" style="display:none; margin-top:20px; text-align:center;">
                <button onclick="window.location.href='/'">To Login Page</button>
            </div>
        </div>
    </div>
    <script>
        if (!document.cookie.includes('session_id=1')) { window.location.href = '/'; }
        const registerForm = document.getElementById('registerForm');
        const trainingKeyInput = document.getElementById('trainingKey');
        const trainingKeyError = document.getElementById('trainingKeyError');
        const registerFields = document.getElementById('registerFields');
        const checkTrainingKeyBtn = document.getElementById('checkTrainingKeyBtn');

        checkTrainingKeyBtn.addEventListener('click', async () => {
            trainingKeyError.textContent = '';
            registerFields.style.display = 'none';
            const trainingKey = trainingKeyInput.value.trim();
            if (!trainingKey) {
                trainingKeyError.textContent = '트레이닝 키를 입력해 주세요.';
                return;
            }
            try {
                const response = await fetch('/api/check-training-key', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ training_key: trainingKey })
                });
                const data = await response.json();
                if (response.ok) {
                    registerFields.style.display = '';
                } else {
                    trainingKeyError.textContent = data.detail || '유효하지 않은 트레이닝 키입니다.';
                }
            } catch (error) {
                trainingKeyError.textContent = '서버 오류가 발생했습니다.';
            }
        });

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const trainingKey = trainingKeyInput.value.trim();
            const memberName = document.getElementById('registerName').value;
            const errorDiv = document.getElementById('registerError');
            const registerResult = document.getElementById('registerResult');
            const goLoginDiv = document.getElementById('goLoginDiv');
            errorDiv.textContent = '';
            registerResult.style.display = 'none';
            goLoginDiv.style.display = 'none';
            if (!trainingKey) {
                trainingKeyError.textContent = '트레이닝 키를 입력해 주세요.';
                return;
            }
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        training_key: trainingKey,
                        username: memberName,
                        name: memberName
                    })
                });
                const data = await response.json();
                if (response.ok) {
                    if (data.warning) {
                        resultDiv.innerHTML = '<div style="background-color: #fff3cd; border: 1px solid #ffc107; border-radius: 4px; padding: 15px; margin-bottom: 15px;"><h3 style="color: #856404; margin-top: 0;">⚠️ 이름 중복 경고</h3><p style="color: #856404; margin: 8px 0;">입력하신 이름 <strong>' + memberName + '</strong>은(는) 이미 존재합니다.</p><p style="color: #856404; margin: 8px 0;">다음 이름으로 등록됩니다: <strong style="color: var(--accent);">' + data.registered_name + '</strong></p><p style="color: #856404; margin-bottom: 0;">이 이름으로 가입하시겠습니까?</p></div><button type="button" onclick="finalizeRegistration(\'' + data.member_id + '\', \'' + data.name + '\', ' + data.order + ', \'' + data.registered_name + '\')">Confirm</button><button type="button" onclick="resetRegistration()" style="background-color: #6c757d; margin-left: 10px;">Cancel</button>';
                    } else {
                        finalizeRegistration(data.member_id, data.name, data.order, data.registered_name);
                    }
                } else {
                    errorDiv.textContent = data.detail;
                }
            } catch (error) {
                errorDiv.textContent = '서버 오류가 발생했습니다.';
            }
        });
        
        function finalizeRegistration(memberId, name, order, registeredName) {
            const registerResult = document.getElementById('registerResult');
            const resultName = document.getElementById('resultName');
            const resultOrder = document.getElementById('resultOrder');
            const loginName = document.getElementById('loginName');
            const goLoginDiv = document.getElementById('goLoginDiv');
            
            // 첫 번째 줄: 이름만
            resultName.textContent = name;
            
            // 두 번째 줄: 숫자(일련번호)만
            resultOrder.textContent = order;
            
            // 로그인 시 사용할 이름
            loginName.textContent = registeredName;
            
            registerResult.style.display = 'block';
            goLoginDiv.style.display = 'block';
        }
        
        function resetRegistration() {
            const registerResult = document.getElementById('registerResult');
            const registerFields = document.getElementById('registerFields');
            const registerError = document.getElementById('registerError');
            const goLoginDiv = document.getElementById('goLoginDiv');
            registerResult.style.display = 'none';
            goLoginDiv.style.display = 'none';
            registerFields.style.display = 'none';
            registerError.textContent = '';
            document.getElementById('registerName').value = '';
            document.getElementById('trainingKey').value = '';
            document.getElementById('trainingKeyError').textContent = '';
        }
    </script>
</body>
</html>
