<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello AI HTC</title>
    <style>
        :root {
            --bg: #f7f8fb;
            --panel: #ffffff;
            --muted: #6b7280;
            --accent: #2563eb;
            --text: #1f2937;
            --border: #e5e7eb;
            --hover: #f1f5f9;
            --shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; max-width:1200px; margin:0 auto; padding:20px; background:var(--bg); color:var(--text); }
        
        /* 모바일 반응형 스타일 */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .controls { flex-direction: column; gap: 8px; }
            .controls select { width: 100%; }
            .schedule-table { font-size: 0.8em; }
            .schedule-table th, .schedule-table td { padding: 6px 4px; }
            .tab-button { padding: 8px 16px; font-size: 0.9em; }
            .login-container { margin: 20px auto; padding: 20px; }
            .course-card { padding: 15px; }
            .course-info { flex-direction: column; align-items: flex-start; gap: 8px; }
        }
        
        @media (max-width: 480px) {
            body { padding: 5px; }
            .schedule-table { font-size: 0.7em; }
            .schedule-table th, .schedule-table td { padding: 4px 2px; }
            .tab-button { padding: 6px 12px; font-size: 0.8em; }
            .course-card { padding: 12px; }
        }
        
        .controls { display:flex; justify-content:space-between; gap:10px; margin-bottom:12px; }
        select { background: var(--panel); color:var(--text); border:1px solid var(--border); padding:6px 8px; border-radius:6px; }
        .schedule-table { width:100%; border-collapse:collapse; margin-top:20px; font-size:0.9em; }
        .schedule-table th, .schedule-table td { border:1px solid var(--border); padding:10px; text-align:left; }
        .schedule-table th { background: #eff6ff; color:var(--text); font-weight:600; }
        .schedule-table td { background: var(--panel); color:var(--text); }
        .schedule-table tr:hover td { background: var(--hover); }
        .status-working { color:#FFD700; font-weight:600; }
        .status-working td { color:#FFD700; font-weight:600; }
        .status-planned { color:var(--text); }
        .status-planned td { color:var(--text); }
        .status-cancelled { color:#FF6B6B; text-decoration:line-through; }
        .status-cancelled td { color:#FF6B6B; text-decoration:line-through; }
        
        /* 탭 스타일 */
        .tab-container { display:flex; margin-bottom:20px; border-bottom:1px solid var(--border); }
        .tab-button { background:var(--panel); color:var(--text); border:none; padding:12px 24px; cursor:pointer; border-radius:8px 8px 0 0; margin-right:4px; border:1px solid var(--border); border-bottom:none; }
        .tab-button:hover { background: var(--hover); }
        .tab-button.active { background:var(--accent); color:#fff; border-color: var(--accent); }
        
        /* 탭 콘텐츠 */
        .tab-content { display:none; }
        .tab-content.active { display:block; }
        
        /* 로그인 폼 스타일 */
        .login-container { max-width:400px; margin:40px auto; padding:30px; background:var(--panel); border-radius:12px; border:1px solid var(--border); box-shadow: var(--shadow); }
        .login-form { display:flex; flex-direction:column; gap:20px; }
        .form-group { display:flex; flex-direction:column; gap:8px; }
        .form-group label { color:var(--text); font-weight:600; }
        .form-group input { background:var(--panel); color:var(--text); border:1px solid var(--border); padding:12px; border-radius:6px; font-size:14px; }
        .form-group input:focus { outline:none; border-color:var(--accent); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }
        .login-button { background:var(--accent); color:#fff; border:none; padding:12px; border-radius:6px; font-weight:600; cursor:pointer; font-size:14px; }
        .login-button:hover { background:#1d4ed8; }
        .register-button { background:#1565C0; color:white; border:none; padding:12px; border-radius:4px; font-weight:600; cursor:pointer; font-size:14px; }
        .register-button:hover { background:#1976D2; }
        
        /* 과정 목록 스타일 */
        .course-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .course-card:hover {
            background: var(--hover);
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        .course-title {
            font-size: 1.2em;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 10px;
        }
        .course-content {
            color: var(--text);
            margin-bottom: 10px;
            line-height: 1.5;
        }
        .course-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--muted);
            font-size: 0.9em;
        }
        .course-status {
            background: #4CAF50;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
        }
        
        /* 공개 과정 카드 스타일 */
        .public-course-card {
            background: linear-gradient(135deg, #ffffff, #f3f4f6);
            border: 2px solid #22c55e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .public-course-card::before {
            content: '🔓';
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 1.5em;
            opacity: 0.8;
        }
        .public-course-card:hover {
            background: linear-gradient(135deg, #f8fafc, #eef2f7);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(76, 175, 80, 0.3);
        }
        .public-course-title {
            font-size: 1.2em;
            font-weight: 600;
            color: #16a34a;
            margin-bottom: 10px;
        }
        .public-course-badge {
            background: #16a34a;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            margin-bottom: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <h1>Hello AI HTC</h1>
    
    <!-- 탭 네비게이션 -->
    <div class="tab-container">
        <button class="tab-button active" onclick="showTab('courses', this)">Active Courses</button>
        <button class="tab-button" onclick="showTab('training', this)">Training Center</button>
        <button class="tab-button" onclick="window.location.href='/admin'">Admin</button>
    </div>
    
    <!-- 활성화된 과정 탭 -->
    <div id="courses-tab" class="tab-content active">
        <div id="coursesList"></div>
    </div>
    
    <!-- Training Center 탭 -->
    <div id="training-tab" class="tab-content">
        <div class="login-container">
            <h2>Training Center 로그인</h2>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="trainingKey">트레이닝 키 (관리자는 비워둘 수 있음)</label>
                    <input type="text" id="trainingKey" name="trainingKey" placeholder="트레이닝 키를 입력하세요 (관리자는 비워둘 수 있음)">
                </div>
                <div class="form-group">
                    <label for="username">이름</label>
                    <input type="text" id="username" name="username" required placeholder="이름을 입력하세요">
                </div>
                <button type="submit" class="login-button">Login</button>
            </form>
            <div id="loginMessage" style="margin-top:15px; text-align:center; color:var(--muted);"></div>
            <div style="margin-top:20px; text-align:center;">
                <button type="button" class="register-button" onclick="showRegisterForm()">Sign Up</button>
            </div>
        </div>
    </div>



    <!-- 회원가입 모달 -->
    <div id="registerModal" style="display:none; position:fixed; left:0; top:0; width:100vw; height:100vh; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:var(--panel); padding:40px 30px 30px 30px; border-radius:16px; min-width:350px; max-width:95vw; margin:100px auto; box-shadow:var(--shadow); position:relative; border:1px solid var(--border);">
            <h2 id="registerModalTitle" style="margin-bottom:24px; color:var(--accent); text-align:center; font-size:1.5em;">Sign Up</h2>
            
            <!-- 트레이닝 키 확인 단계 -->
            <div id="trainingKeyStep">
                <div class="form-group" style="margin-bottom:18px;">
                    <label style="font-size:15px; margin-bottom:6px; color:var(--text); font-weight:600;">트레이닝 키</label>
                    <input type="text" id="registerTrainingKey" required style="font-size:16px; padding:12px; border-radius:6px; border:1px solid var(--border); background:var(--panel); color:var(--text); width:100%; box-sizing:border-box;" placeholder="트레이닝 키를 입력하세요">
                </div>
                <div style="margin-top:20px; text-align:center;">
                    <button type="button" class="login-button" onclick="checkTrainingKey()" style="min-width:100px; margin-right:10px;">Confirm</button>
                    <button type="button" class="register-button" onclick="closeRegisterModal()" style="min-width:100px;">Cancel</button>
                </div>
            </div>

            <!-- 회원가입 폼 단계 -->
            <div id="registerFormStep" style="display:none;">
                <form id="registerForm">
                    <div class="form-group" style="margin-bottom:24px;">
                        <label style="font-size:15px; margin-bottom:6px; color:var(--text); font-weight:600;">이름</label>
                        <input type="text" id="registerName" required style="font-size:16px; padding:12px; border-radius:6px; border:1px solid var(--border); background:var(--panel); color:var(--text); width:100%; box-sizing:border-box;" placeholder="이름을 입력하세요">
                    </div>
                    <div style="margin-top:20px; text-align:center;">
                        <button type="submit" class="login-button" style="min-width:100px; margin-right:10px;">Register</button>
                        <button type="button" class="register-button" onclick="closeRegisterModal()" style="min-width:100px; background:#6c757d;">Cancel</button>
                    </div>
                </form>
            </div>

            <!-- 이름 중복 경고 단계 -->
            <div id="registerDuplicateWarningStep" style="display:none;">
                <div style="text-align:center; margin-bottom:24px;">
                    <h3 style="color:#FF9800; margin-bottom:16px;">⚠️ 이름 중복 경고</h3>
                    <p style="color:var(--text); margin-bottom:8px;">입력하신 이름 '<span id="originalName" style="font-weight:600;"></span>'은(는) 이미 존재합니다.</p>
                    <p style="color:var(--text); margin-bottom:16px;">다음 이름으로 등록됩니다: '<span id="modifiedName" style="font-weight:600; color:var(--accent);"></span>'</p>
                    <p style="color:var(--muted); font-size:14px; margin-bottom:16px;">이 이름으로 가입하시겠습니까?</p>
                </div>
                <div style="text-align:center;">
                    <button type="button" class="login-button" onclick="confirmDuplicateRegistration()" style="min-width:100px; margin-right:10px;">Confirm</button>
                    <button type="button" class="register-button" onclick="cancelDuplicateRegistration()" style="min-width:100px; background:#6c757d;">Cancel</button>
                </div>
            </div>

            <!-- 가입 완료 단계 -->
            <div id="registerCompleteStep" style="display:none;">
                <div style="text-align:center; margin-bottom:24px;">
                    <h3 style="color:#4CAF50; margin-bottom:24px;">🎉 회원가입이 완료되었습니다!</h3>
                    <p style="color:var(--text); margin-bottom:8px; font-size:18px;">이름: <span id="completeName" style="font-weight:600; color:var(--accent); font-size:28px;"></span></p>
                    <p style="color:var(--muted); font-size:16px; margin-bottom:10px;">일련번호:</p>
                    <p style="color:#ff0000; font-size:72px; font-weight:bold; margin:32px 0; line-height:1.2;"><span id="completeOrder"></span></p>
                    <div style="margin-top:30px; padding:15px; background-color:#e3f2fd; border-radius:8px; border:1px solid #2196f3;">
                        <p style="font-size:16px; color:#1976d2; margin:0;">
                            로그인할 때는 <strong style="font-size:20px; color:#d32f2f;" id="completeLoginName"></strong> 으로 로그인하세요
                        </p>
                    </div>
                </div>
                <div style="text-align:center;">
                    <button type="button" class="login-button" onclick="closeRegisterModal()" style="min-width:100px;">Confirm</button>
                </div>
            </div>

            <div id="registerMessage" style="margin-top:15px; text-align:center; color:var(--muted);"></div>
        </div>
    </div>

    <script>
        // 0.0.0.0 접속 시 자동으로 localhost로 리다이렉트
        if (window.location.hostname === '0.0.0.0') {
            window.location.href = window.location.href.replace('0.0.0.0', 'localhost');
        }
        
        // 탭 전환 함수
        function showTab(tabName, buttonElement) {
            // 모든 탭 버튼에서 active 클래스 제거
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // 모든 탭 콘텐츠에서 active 클래스 제거
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            
            // 버튼 요소가 전달된 경우 해당 버튼 활성화, 아니면 탭명으로 찾기
            if (buttonElement) {
                buttonElement.classList.add('active');
            } else {
                // 버튼을 찾아서 활성화 (텍스트로 매칭)
                document.querySelectorAll('.tab-button').forEach(btn => {
                    if (tabName === 'courses' && btn.textContent.includes('Active Courses')) {
                        btn.classList.add('active');
                    } else if (tabName === 'training' && btn.textContent.includes('Training Center')) {
                        btn.classList.add('active');
                    }
                });
            }
            
            // 선택된 탭 콘텐츠에 active 클래스 추가
            const tabElement = document.getElementById(tabName + '-tab');
            if (tabElement) {
                tabElement.classList.add('active');
            }
        }


        
        function initializeSelects(){
            const yearSelect = document.getElementById('yearSelect');
            const monthSelect = document.getElementById('monthSelect');
            
            // 2025년 8월로 고정
            const opt = document.createElement('option'); 
            opt.value=2025; 
            opt.textContent='2025년'; 
            opt.selected=true; 
            yearSelect.appendChild(opt);
            
            const monthOpt = document.createElement('option'); 
            monthOpt.value=8; 
            monthOpt.textContent='8월'; 
            monthOpt.selected=true; 
            monthSelect.appendChild(monthOpt);
        }

        function parseEventDate(event){
            try {
                const parseKstDate = (value) => {
                    if(!value) return null;
                    const raw = String(value).trim().replace('T', ' ').replace(/\.\d+$/, '');
                    const match = raw.match(/^(\d{4})-(\d{2})-(\d{2})(?: (\d{2}):(\d{2})(?::(\d{2}))?)?$/);
                    if(match){
                        const year = Number(match[1]);
                        const month = Number(match[2]);
                        const day = Number(match[3]);
                        const hour = Number(match[4] || 0);
                        const minute = Number(match[5] || 0);
                        const second = Number(match[6] || 0);
                        return new Date(Date.UTC(year, month - 1, day, hour - 9, minute, second));
                    }
                    const parsed = new Date(value);
                    return Number.isNaN(parsed.getTime()) ? null : parsed;
                };

                // year 컬럼이 datetime 타입이므로 직접 사용
                if(event.year){
                    return parseKstDate(event.year);
                }
                if(event.start_datetime){
                    return parseKstDate(event.start_datetime);
                }
                return null;
            } catch (error) {
                return null;
            }
        }

        function formatTime(seconds) {
            if (!seconds || seconds === '') return '';
            
            // 숫자인 경우 초 단위로 처리
            if (typeof seconds === 'number' || !isNaN(parseInt(seconds))) {
                const totalSeconds = parseInt(seconds);
                const hours = Math.floor(totalSeconds / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);
                return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
            }
            
            // 이미 시간 형식인 경우 그대로 반환
            return seconds;
        }

        async function loadSchedule(){
            const year = document.getElementById('yearSelect').value;
            const month = document.getElementById('monthSelect').value;
            
            const resp = await fetch(`/api/events?year=${year}&month=${month}`);
            let events = await resp.json();

            // 공개 항목만 필터링하고 Done 상태 제외
            events = events.filter(ev => (ev.is_public == 1 || ev.is_public === true || ev.is_public === '1') && ev.status !== 'Done');
            
            // 날짜 순으로 정렬
            events.sort((a,b)=> (parseEventDate(a)||0) - (parseEventDate(b)||0));

            const scheduleContainer = document.getElementById('scheduleList');
            
            if(events.length === 0) {
                scheduleContainer.innerHTML = '<p style="text-align:center; color:var(--muted); margin-top:40px;">해당 월의 일정이 없습니다.</p>';
                return;
            }

            let table = `
                <table class="schedule-table">
                    <thead>
                        <tr>
                            <th>날짜</th>
                            <th>업무</th>
                            <th>고객</th>
                            <th>상태</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            events.forEach(ev=>{
                const dt = parseEventDate(ev);
                const dateStr = dt ? dt.toLocaleDateString('ko-KR', {year: 'numeric', month: '2-digit', day: '2-digit', timeZone: 'Asia/Seoul'}) : '';
                
                const title = ev.job_title || '';
                const client = ev.client || '';
                
                let statusClass = '';
                let statusText = ev.status || '';
                if(ev.status === 'Done') statusClass = 'status-done';
                else if(ev.status === 'Working') statusClass = 'status-working';
                else if(ev.status === 'Planned') statusClass = 'status-planned';
                else if(ev.status === 'Cancelled') statusClass = 'status-cancelled';

                table += `
                    <tr class="${statusClass}">
                        <td>${dateStr}</td>
                        <td>${title}</td>
                        <td>${client}</td>
                        <td>${statusText}</td>
                    </tr>
                `;
            });

            table += '</tbody></table>';
            scheduleContainer.innerHTML = table;
        }

        // 로그인 폼 제출 이벤트
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const trainingKey = document.getElementById('trainingKey').value;
            const username = document.getElementById('username').value;
            const messageDiv = document.getElementById('loginMessage');
            
            if (!username) {
                messageDiv.textContent = '아이디를 입력해주세요.';
                messageDiv.style.color = '#FF6B6B';
                return;
            }
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        training_key: trainingKey,
                        username: username
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    // 로그인 성공
                    const role = result.role;
                    
                    // role 값에 따라 다른 메시지와 이동 경로 설정
                    if (role >= 100) {
                        // 관리자 (role >= 100)
                        messageDiv.textContent = '로그인 성공! 관리자 포털로 이동합니다...';
                        messageDiv.style.color = '#4CAF50';
                        
                        // 로그인 정보를 세션에 저장
                        sessionStorage.setItem('loginInfo', JSON.stringify({
                            training_key: result.training_key || trainingKey,
                            member_id: result.member_id || username,
                            member_name: result.member_name || username,
                            role: role
                        }));
                        
                        // 잠시 후 관리자 포털로 이동
                        setTimeout(() => {
                            window.location.href = '/admin';
                        }, 1000);
                    } else {
                        // 일반 사용자 (role < 100)
                        messageDiv.textContent = '로그인 성공! 포털로 이동합니다...';
                        messageDiv.style.color = '#4CAF50';
                        
                        // 로그인 정보를 세션에 저장
                        sessionStorage.setItem('loginInfo', JSON.stringify({
                            training_key: result.training_key || trainingKey,
                            member_id: result.member_id || username,
                            member_name: result.member_name || username,
                            role: role
                        }));
                        
                        // 잠시 후 선택된 과정의 포털로 이동
                        setTimeout(() => {
                            window.location.href = `/training-portal?training_key=${result.training_key || trainingKey}`;
                        }, 1000);
                    }
                    
                } else {
                    // 로그인 실패
                    messageDiv.textContent = result.detail || '로그인에 실패했습니다.';
                    messageDiv.style.color = '#FF6B6B';
                }
                
            } catch (error) {
                messageDiv.textContent = '로그인 중 오류가 발생했습니다.';
                messageDiv.style.color = '#FF6B6B';
            }
        });
        
        // 회원가입 모달 관련 함수들
        function showRegisterForm() {
            document.getElementById('registerModal').style.display = 'flex';
            resetRegisterModal();
        }

        function closeRegisterModal() {
            document.getElementById('registerModal').style.display = 'none';
            resetRegisterModal();
        }

        function resetRegisterModal() {
            document.getElementById('trainingKeyStep').style.display = 'block';
            document.getElementById('registerFormStep').style.display = 'none';
            document.getElementById('registerDuplicateWarningStep').style.display = 'none';
            document.getElementById('registerCompleteStep').style.display = 'none';
            document.getElementById('registerTrainingKey').value = '';
            document.getElementById('registerName').value = '';
            document.getElementById('registerMessage').textContent = '';
            document.getElementById('registerMessage').style.color = 'var(--muted)';
        }

        // 중복 경고 후 확인
        let pendingRegistrationData = null;
        
        function confirmDuplicateRegistration() {
            document.getElementById('registerDuplicateWarningStep').style.display = 'none';
            document.getElementById('registerCompleteStep').style.display = 'block';
            document.getElementById('completeName').textContent = pendingRegistrationData.originalName;
            document.getElementById('completeOrder').textContent = pendingRegistrationData.order;
            document.getElementById('completeLoginName').textContent = pendingRegistrationData.registeredName;
        }
        
        function cancelDuplicateRegistration() {
            document.getElementById('registerDuplicateWarningStep').style.display = 'none';
            document.getElementById('registerFormStep').style.display = 'block';
            document.getElementById('registerTrainingKey').value = pendingRegistrationData?.trainingKey || '';
            document.getElementById('registerName').value = '';
        }
        async function checkTrainingKey() {
            const trainingKey = document.getElementById('registerTrainingKey').value;
            const messageDiv = document.getElementById('registerMessage');
            
            if (!trainingKey) {
                messageDiv.textContent = '트레이닝 키를 입력해주세요.';
                messageDiv.style.color = '#FF6B6B';
                return;
            }

            try {
                const response = await fetch('/api/check-training-key', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        training_key: trainingKey
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    // 트레이닝 키가 유효하면 회원가입 폼 표시
                    document.getElementById('trainingKeyStep').style.display = 'none';
                    document.getElementById('registerFormStep').style.display = 'block';
                    messageDiv.textContent = '';
                } else {
                    messageDiv.textContent = result.detail || '유효하지 않은 트레이닝 키입니다.';
                    messageDiv.style.color = '#FF6B6B';
                }
                
            } catch (error) {
                messageDiv.textContent = '트레이닝 키 확인 중 오류가 발생했습니다.';
                messageDiv.style.color = '#FF6B6B';
            }
        }

        // 회원가입 폼 제출
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const trainingKey = document.getElementById('registerTrainingKey').value;
            const name = document.getElementById('registerName').value;
            const messageDiv = document.getElementById('registerMessage');
            
            if (!name) {
                messageDiv.textContent = '이름을 입력해주세요.';
                messageDiv.style.color = '#FF6B6B';
                return;
            }

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        training_key: trainingKey,
                        username: name,
                        name: name
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    // 등록된 이름 저장
                    pendingRegistrationData = {
                        trainingKey: trainingKey,
                        originalName: result.name,
                        registeredName: result.registered_name,
                        order: result.order,
                        memberId: result.member_id
                    };
                    
                    if (result.warning) {
                        // 이름 중복 - 경고 화면 표시
                        document.getElementById('originalName').textContent = name;
                        document.getElementById('modifiedName').textContent = result.registered_name;
                        document.getElementById('registerFormStep').style.display = 'none';
                        document.getElementById('registerDuplicateWarningStep').style.display = 'block';
                    } else {
                        // 이름 중복 없음 - 바로 완료 화면
                        document.getElementById('registerFormStep').style.display = 'none';
                        document.getElementById('registerCompleteStep').style.display = 'block';
                        document.getElementById('completeName').textContent = result.name;
                        document.getElementById('completeOrder').textContent = result.order;
                        document.getElementById('completeLoginName').textContent = result.registered_name;
                    }
                    messageDiv.textContent = '';
                } else {
                    messageDiv.textContent = result.detail || '회원가입에 실패했습니다.';
                    messageDiv.style.color = '#FF6B6B';
                }
                
            } catch (error) {
                messageDiv.textContent = '회원가입 중 오류가 발생했습니다.';
                messageDiv.style.color = '#FF6B6B';
            }
        });

        // 과정 목록 로드 함수
        async function loadCourses() {
            try {
                const response = await fetch('/api/active-courses');
                
                // API 응답 상태 확인
                if (!response.ok) {
                    throw new Error(`API 오류: ${response.status} ${response.statusText}`);
                }
                
                const courses = await response.json();
                
                // 응답이 배열인지 확인
                if (!Array.isArray(courses)) {
                    console.error('API 응답이 배열이 아닙니다:', courses);
                    document.getElementById('coursesList').innerHTML = '<p style="text-align:center; color:#FF6B6B; margin-top:40px;">과정 목록 형식이 잘못되었습니다.</p>';
                    return;
                }
                
                const coursesContainer = document.getElementById('coursesList');
                
                if (courses.length === 0) {
                    coursesContainer.innerHTML = '<p style="text-align:center; color:var(--muted); margin-top:40px;">현재 활성화된 과정이 없습니다.</p>';
                    return;
                }
                
                let coursesHTML = '';
                courses.forEach(course => {
                    // 공개 과정인지 확인 (is_public 필드가 있으면 공개 과정)
                    if (course.is_public) {
                        // 공개 과정 - 로그인 없이 접근 가능
                        coursesHTML += `
                            <div class="public-course-card" onclick="openPublicCourse('${course.training_key}')">
                                <div class="public-course-badge">🔓 공개 과정</div>
                                <div class="public-course-title">${course.course_name}</div>
                                <div class="course-content">${course.course_content || '과정 설명이 없습니다.'}</div>
                                <div class="course-info">
                                    <span>최대 인원: ${course.max_member}명</span>
                                    <span style="background: #4CAF50; color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.8em;">무료 학습</span>
                                </div>
                            </div>
                        `;
                    } else {
                        // 일반 과정 - 로그인 필요
                        coursesHTML += `
                            <div class="course-card" onclick="selectCourse('${course.training_key}')">
                                <div class="course-title">${course.course_name}</div>
                                <div class="course-content">${course.course_content || '과정 설명이 없습니다.'}</div>
                                <div class="course-info">
                                    <span>최대 인원: ${course.max_member}명</span>
                                    <span class="course-status">활성</span>
                                </div>
                            </div>
                        `;
                    }
                });
                
                coursesContainer.innerHTML = coursesHTML;
            } catch (error) {
                console.error('과정 목록 로드 오류:', error);
                document.getElementById('coursesList').innerHTML = '<p style="text-align:center; color:#FF6B6B; margin-top:40px;">과정 목록을 불러오는 중 오류가 발생했습니다.<br><small style="color:var(--muted);">' + error.message + '</small></p>';
            }
        }
        
        // 과정 선택 함수
        function selectCourse(trainingKey) {
            // 선택된 과정의 training_key를 저장하고 로그인 탭으로 이동
            sessionStorage.setItem('selectedTrainingKey', trainingKey);
            showTab('training');
            
            // 트레이닝 키 입력 필드에 자동으로 설정하지 않음
            // document.getElementById('trainingKey').value = trainingKey;
        }
        
        // 공개 과정 열기 함수
        function openPublicCourse(trainingKey) {
            // 공개 과정은 로그인 없이 바로 포털로 이동
            window.location.href = `/public-training-portal?training_key=${trainingKey}`;
        }
        
        // 페이지 로드 시 실행
        document.addEventListener('DOMContentLoaded', ()=>{
            loadCourses();
        });
    </script>
</body>
</html>
