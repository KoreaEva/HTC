            async function loadTrainingLatestAssignmentSubmission(contentId, memberId, labIdParam) {
                const msgEl = document.getElementById(`trainingAssignmentMsg_${contentId}`);
                const previewEl = document.getElementById(`trainingAssignmentPreview_${contentId}`);
                const loginInfo = getLoginInfo();
                const tKey = loginInfo ? loginInfo.training_key : '';
                const lookupMemberId = String(memberId || '').trim();
                const lookupMemberName = String((loginInfo && loginInfo.member_name) ? loginInfo.member_name : memberId || '').trim();

                const candidateLabIds = [
                    labIdParam,
                    window.selectedLabId,
                    loginInfo ? loginInfo.currentLabId : '',
                    loginInfo ? loginInfo.lab_id : ''
                ];
                let tLab = '';
                for (const candidate of candidateLabIds) {
                    const text = String(candidate ?? '').trim();
                    if (!text || text === 'undefined' || text === 'null') continue;
                    const parsed = Number.parseInt(text, 10);
                    if (Number.isInteger(parsed)) {
                        tLab = String(parsed);
                        break;
                    }
                }

                if (!tKey || !tLab || (!lookupMemberId && !lookupMemberName)) return;

                try {
                    const qs = new URLSearchParams({
                        training_key: String(tKey),
                        lab_id: String(tLab),
                        content_id: String(contentId),
                        member_id: lookupMemberId,
                        member_name: lookupMemberName,
                    });
                    const resp = await fetch(`/api/portal/assignment/latest?${qs.toString()}`);
                    if (!resp.ok) return;
                    const data = await resp.json();
                    if (!data || !data.submitted) return;

                    if (msgEl) {
                        msgEl.style.color = '#166534';
                        msgEl.textContent = '과제가 제출되었습니다.';
                    }
                    renderTrainingSubmittedAssignmentPreview(previewEl, data.file_name, data.file_url || data.url);
                } catch (e) {
                    // 최신 제출 조회 실패는 제출 UI 사용을 막지 않도록 무시
                }
            }
            } catch (error) {
                document.getElementById('contentViewer').innerHTML = `
                    <p style="text-align:center; color:#FF6B6B;">콘텐츠를 불러오는데 실패했습니다.</p>
                `;
            }
        }
        
        function renderTrainingSubmittedAssignmentPreview(containerEl, fileName, fileUrl) {
            if (!containerEl) return;
            const safeName = String(fileName || '-');
            const safeUrl = String(fileUrl || '');
            const ext = safeName.toLowerCase().split('.').pop();
            let previewHtml = '<div style="color:#64748b;">미리보기를 지원하지 않는 형식입니다. 다운로드 후 확인해주세요.</div>';

            if (['png', 'jpg', 'jpeg', 'gif', 'webp', 'bmp'].includes(ext)) {
                previewHtml = `<img src="${safeUrl}" alt="preview" style="max-width:100%; border:1px solid #e5e7eb; border-radius:8px;">`;
            } else if (ext === 'pdf') {
                previewHtml = `<iframe src="${safeUrl}" style="width:100%; height:56vh; border:1px solid #e5e7eb; border-radius:8px;"></iframe>`;
            } else if (['doc', 'docx', 'ppt', 'pptx'].includes(ext)) {
                const officeSrc = `https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(safeUrl)}`;
                previewHtml = `<iframe src="${officeSrc}" style="width:100%; height:56vh; border:1px solid #e5e7eb; border-radius:8px;"></iframe>`;
            } else if (['txt', 'text', 'md', 'csv', 'log', 'json', 'xml', 'yaml', 'yml', 'ini', 'conf', 'sql'].includes(ext)) {
                previewHtml = `<iframe src="${safeUrl}" style="width:100%; height:56vh; border:1px solid #e5e7eb; border-radius:8px;"></iframe>`;
            }

            const uniqueId = `${Date.now()}_${Math.random().toString(36).slice(2)}`;
            const previewBtnId = `trainingPreviewBtn_${uniqueId}`;
            const previewBodyId = `trainingPreviewBody_${uniqueId}`;

            containerEl.innerHTML = `
                <div style="margin-bottom:8px; font-size:14px; color:#0f172a;">
                    <strong>제출된 파일:</strong> ${safeName}
                    <button id="${previewBtnId}" type="button" style="margin-left:8px; background:#0ea5e9; color:#fff; border:none; border-radius:6px; padding:6px 10px; font-size:12px; font-weight:700; cursor:pointer;">미리보기</button>
                    <a href="${safeUrl}" target="_blank" style="margin-left:8px; color:#2563eb; text-decoration:underline;">새 창에서 열기</a>
                </div>
                <div id="${previewBodyId}" style="display:none; margin-top:8px;">${previewHtml}</div>
            `;

            const previewBtn = document.getElementById(previewBtnId);
            const previewBody = document.getElementById(previewBodyId);
            if (previewBtn && previewBody) {
                previewBtn.addEventListener('click', () => {
                    const isOpen = previewBody.style.display !== 'none';
                    previewBody.style.display = isOpen ? 'none' : 'block';
                    previewBtn.textContent = isOpen ? '미리보기' : '미리보기 닫기';
                });
            }
        }

        // 과제 파일 제출 함수 (training_portal)
        async function submitTrainingAssignment(contentId, memberId, memberName, labIdParam) {
            const fileInput = document.getElementById(`trainingAssignmentFile_${contentId}`);
            const msgEl = document.getElementById(`trainingAssignmentMsg_${contentId}`);
            const btn = document.getElementById(`trainingAssignmentBtn_${contentId}`);
            const previewEl = document.getElementById(`trainingAssignmentPreview_${contentId}`);
            if (!fileInput || !fileInput.files || fileInput.files.length === 0) {
                if (msgEl) msgEl.textContent = '제출할 파일을 선택해주세요.';
                return;
            }
            const loginInfo = getLoginInfo();
            const tKey = loginInfo ? loginInfo.training_key : '';
            const candidateLabIds = [
                labIdParam,
                window.selectedLabId,
                loginInfo ? loginInfo.currentLabId : '',
                loginInfo ? loginInfo.lab_id : ''
            ];
            let tLab = '';
            for (const candidate of candidateLabIds) {
                const text = String(candidate ?? '').trim();
                if (!text || text === 'undefined' || text === 'null') continue;
                const parsed = Number.parseInt(text, 10);
                if (Number.isInteger(parsed)) {
                    tLab = String(parsed);
                    break;
                }
            }
            if (!tLab) {
                const reason = `lab_id를 찾을 수 없습니다. 후보값: ${candidateLabIds.map(v => String(v)).join(', ')}`;
                if (msgEl) {
                    msgEl.style.color = '#dc2626';
                    msgEl.textContent = `오류: ${reason}`;
                }
                if (btn) btn.disabled = false;
                return;
            }
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('training_key', tKey);
            formData.append('lab_id', tLab);
            formData.append('content_id', contentId);
            formData.append('member_id', memberId || '');
            formData.append('member_name', memberName || memberId || '');
            if (btn) btn.disabled = true;
            if (msgEl) msgEl.textContent = '제출 중...';
            try {
                async function postSubmit(forceReplace) {
                    const fd = new FormData();
                    fd.append('file', fileInput.files[0]);
                    fd.append('training_key', tKey);
                    fd.append('lab_id', tLab);
                    fd.append('content_id', contentId);
                    fd.append('member_id', memberId || '');
                    fd.append('member_name', memberName || memberId || '');
                    fd.append('force_replace', forceReplace ? '1' : '0');
                    const resp = await fetch('/api/portal/assignment/submit', { method: 'POST', body: fd });
                    const text = await resp.text();
                    let data;
                    try { data = JSON.parse(text); } catch { data = {}; }
                    return { resp, data, text };
                }

                let { resp, data, text } = await postSubmit(false);
                if (resp.status === 409) {
                    const detail = (data && data.detail) ? data.detail : '이미 과제가 제출되었습니다. 다시 업로드 하시겠습니까?';
                    const ok = confirm(detail);
                    if (!ok) {
                        if (msgEl) { msgEl.style.color = '#b45309'; msgEl.textContent = '재업로드가 취소되었습니다.'; }
                        if (btn) btn.disabled = false;
                        return;
                    }
                    ({ resp, data, text } = await postSubmit(true));
                }

                if (!resp.ok) {
                    let detail = data.detail || data.message || text || '제출 실패';
                    if (detail && typeof detail === 'object') detail = JSON.stringify(detail);
                    throw new Error(`HTTP ${resp.status} ${resp.statusText} | ${detail}`);
                }
                if (msgEl) { msgEl.style.color = '#166534'; msgEl.textContent = `✅ 제출 완료: ${data.file_name}`; }
                renderTrainingSubmittedAssignmentPreview(previewEl, data.file_name, data.url);
            } catch (err) {
                const message = err && err.message ? err.message : String(err);
                if (msgEl) { msgEl.style.color = '#dc2626'; msgEl.textContent = `오류: ${message}`; }
                if (btn) btn.disabled = false;
            }
        }

        // 콘텐츠 새로고침 함수
        async function refreshContent() {
            try {
                const refreshBtn = document.getElementById('refreshContentBtn');
                const originalText = refreshBtn.innerHTML;
                
                // 버튼 비활성화 및 로딩 상태 표시
                refreshBtn.innerHTML = '<span style="font-size: 1.1em;">⏳</span> 새로고침 중...';
                refreshBtn.disabled = true;
                refreshBtn.style.background = '#888';
                refreshBtn.style.cursor = 'not-allowed';
                
                // 현재 선택된 랩이 있다면 콘텐츠 목록 새로고침
                if (window.selectedLabId) {
                    await loadContents(window.selectedLabId);
                    
                    // 현재 선택된 콘텐츠가 있다면 다시 로드
                    const activeContent = document.querySelector('.content-item.active');
                    if (activeContent) {
                        const contentId = activeContent.dataset.contentId;
                        if (contentId) {
                            await loadContentDetail(contentId);
                        }
                    }
                }
                
                // 성공 상태 표시
                refreshBtn.innerHTML = '<span style="font-size: 1.1em;">✅</span> 완료!';
                refreshBtn.style.background = '#4CAF50';
                
                // 2초 후 원래 상태로 복원
                setTimeout(() => {
                    refreshBtn.innerHTML = originalText;
                    refreshBtn.disabled = false;
                    refreshBtn.style.background = '#4CAF50';
                    refreshBtn.style.cursor = 'pointer';
                }, 2000);
                
                
            } catch (error) {
                
                // 오류 상태 표시
                const refreshBtn = document.getElementById('refreshContentBtn');
                refreshBtn.innerHTML = '<span style="font-size: 1.1em;">❌</span> 실패';
                refreshBtn.style.background = '#FF6B6B';
                
                // 2초 후 원래 상태로 복원
                setTimeout(() => {
                    refreshBtn.innerHTML = '<span style="font-size: 1.1em;">🔄</span> 새로고침';
                    refreshBtn.disabled = false;
                    refreshBtn.style.background = '#4CAF50';
                    refreshBtn.style.cursor = 'pointer';
                }, 2000);
            }
        }

        
        // 페이지 로드 시 실행
        document.addEventListener('DOMContentLoaded', function() {
            // URL에서 training_key 파라미터 확인
            const urlParams = new URLSearchParams(window.location.search);
            const urlTrainingKey = urlParams.get('training_key');
            
            // 권한 체크
            if (!checkUserPermission()) {
                return;
            }
            
            const loginInfo = getLoginInfo();
            
            // URL에서 전달된 training_key가 있으면 세션의 training_key를 업데이트
            if (urlTrainingKey && loginInfo) {
                loginInfo.training_key = urlTrainingKey;
                sessionStorage.setItem('loginInfo', JSON.stringify(loginInfo));
            }
            
            // 환영 메시지 업데이트
            document.querySelector('.welcome').textContent = 
                `${loginInfo.member_name}님, Training Center에 오신 것을 환영합니다!`;

            updateJjekMenuMeta();
            startJjekUnreadPolling();

            document.addEventListener('click', function(event) {
                const menuWrap = document.querySelector('.jjek-menu-wrap');
                if (menuWrap && !menuWrap.contains(event.target)) {
                    closeJjekMenu();
                }
            });

            document.addEventListener('keydown', function(event) {
                if (event.key === 'Escape') {
                    closeJjekMenu();
                }
            });
            
            loadLabs();
        });
        
        // ===== 운영자 메뉴 함수 =====
        let currentLabId = null;
        
        function openSupervisorModal(labId, labName) {
            currentLabId = null;  // 초기에는 전체 과정 보기
            document.getElementById('supervisorModal').style.display = 'block';
            
            // 랩 선택 드롭다운 채우기
            const labSelect = document.getElementById('labSelect');
            labSelect.innerHTML = '<option value="">전체 과정</option>';  // 기본값을 전체 과정으로
            
            // trainingPortal.labs 배열에서 랩 목록 가져오기
            if (window.trainingPortal && window.trainingPortal.labs && window.trainingPortal.labs.length > 0) {
                window.trainingPortal.labs.forEach(lab => {
                    const option = document.createElement('option');
                    option.value = lab.lab_id;
                    option.textContent = lab.lab_name;
                    labSelect.appendChild(option);
                });
            }
            
            // 사용자 목록 로드
            loadLabUsers();
            // 모니터링 데이터 로드 (전체 과정)
            loadLabMonitoring();
        }
        
        function changeMonitoringLab() {
            const labSelect = document.getElementById('labSelect');
            const selectedLabId = labSelect.value;
            
            // 선택값에 따라 currentLabId 설정
            if (selectedLabId === '') {
                // 전체 과정 선택
                currentLabId = null;
            } else {
                // 특정 랩 선택
                currentLabId = parseInt(selectedLabId);
            }
            
            // 모니터링 데이터 다시 로드
            loadLabMonitoring();
        }
        
        function closeSupervisorModal() {
            document.getElementById('supervisorModal').style.display = 'none';
        }
        
        function showTab(tabName) {
            document.querySelectorAll('.modal-content-section').forEach(section => {
                section.classList.remove('active');
            });
            document.querySelectorAll('.modal-tab').forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }
        
        async function loadLabUsers() {
            try {
                const loginInfo = getLoginInfo();
                const res = await fetch(`/api/admin/users/course/${loginInfo.training_key}`);
                if (!res.ok) throw new Error('사용자 목록을 불러오는데 실패했습니다.');
                
                const users = await res.json();
                const tbody = document.getElementById('userTableBody');
                tbody.innerHTML = '';
                
                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">등록된 사용자가 없습니다.</td></tr>';
                    return;
                }
                
                users.forEach(user => {
                    const tr = document.createElement('tr');
                    const lastContent = user.last_content || '활동 기록 없음';
                    const supervisorBadge = user.is_supervisor 
                        ? '<span style="background:#4CAF50; color:white; padding:2px 6px; border-radius:3px; font-size:0.8em;">운영자</span>'
                        : '-';
                    
                    tr.innerHTML = `
                        <td>${user.member_id || ''}</td>
                        <td>${user.member_name || ''}</td>
                        <td style="font-size:0.9em; color:#666;">${lastContent}</td>
                        <td style="text-align:center;">${supervisorBadge}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                const tbody = document.getElementById('userTableBody');
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#dc3545;">오류: ${error.message}</td></tr>`;
            }
        }
        
        async function loadLabMonitoring() {
            try {
                const loginInfo = getLoginInfo();
                const res = await fetch(`/api/admin/monitoring-events?training_key=${encodeURIComponent(loginInfo.training_key)}&limit=100`);
                if (!res.ok) throw new Error('모니터링 데이터를 불러오는데 실패했습니다.');
                
                const events = await res.json();
                const container = document.getElementById('monitoringContent');
                
                // currentLabId가 설정되면 해당 랩의 이벤트만 필터링, 아니면 전체 과정의 이벤트 표시
                let displayEvents = events;
                if (currentLabId !== null && currentLabId !== undefined) {
                    displayEvents = events.filter(event => {
                        if (!event.details) return false;
                        // lab_id, target_lab_id, new_lab_id 등 여러 필드 지원
                        const labId = event.details.lab_id || event.details.target_lab_id || event.details.new_lab_id;
                        return labId === currentLabId;
                    });
                }
                
                if (!displayEvents || displayEvents.length === 0) {
                    const labLabel = currentLabId ? '이 랩의' : '과정의';
                    container.innerHTML = `<div style="text-align:center; color:#999; padding:20px;">${labLabel} 활동 기록이 없습니다.</div>`;
                    return;
                }
                
                let html = '';
                displayEvents.slice().reverse().slice(0, 50).forEach(event => {
                    const timestamp = new Date(event.timestamp).toLocaleString('ko-KR');
                    const icon = getEventIcon(event.type);
                    const eventCategory = event.category || '시스템';
                    html += `
                        <div class="monitoring-item">
                            <div style="font-weight:bold;">${icon} ${event.user_name || '사용자'} - ${getEventLabel(event.type)}</div>
                            <div style="font-size:0.85em; color:#888; margin-top:3px;">카테고리: ${eventCategory}</div>
                            <div class="monitoring-time">${timestamp}</div>
                            <div style="font-size:0.9em; color:#555; margin-top:5px;">${event.description || ''}</div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch (error) {
                const container = document.getElementById('monitoringContent');
                container.innerHTML = `<div style="text-align:center; color:#dc3545; padding:20px;">오류: ${error.message}</div>`;
            }
        }
        
        function getEventIcon(type) {
            const icons = {
                // 사용자 이벤트
                'user_login': '🔐',
                'user_logout': '🚪',
                // 랩 이벤트
                'lab_add': '➕',
                'lab_edit': '✏️',
                'lab_delete': '🗑️',
                'lab_view': '👁️',
                'lab_copy': '📋',
                // 콘텐츠 이벤트
                'content_add': '📝',
                'content_edit': '✏️',
                'content_delete': '🗑️',
                'content_view': '👁️',
                'content_viewed': '👁️',
                'content_move': '🚚',
                'content_copy': '📋',
                'content_status_changed': '⚙️',
                // 감시자 이벤트
                'supervisor_assign': '👤',
                // 로그 이벤트
                'log_view': '📊',
                'default': '📝'
            };
            return icons[type] || icons['default'];
        }
        
        function getEventLabel(type) {
            const labels = {
                // 사용자 이벤트
                'user_login': '로그인',
                'user_logout': '로그아웃',
                // 랩 이벤트
                'lab_add': '랩 추가',
                'lab_edit': '랩 수정',
                'lab_delete': '랩 삭제',
                'lab_view': '랩 조회',
                'lab_copy': '랩 복사',
                // 콘텐츠 이벤트
                'content_add': '콘텐츠 추가',
                'content_edit': '콘텐츠 수정',
                'content_delete': '콘텐츠 삭제',
                'content_view': '콘텐츠 조회',
                'content_viewed': '콘텐츠 조회',
                'content_move': '콘텐츠 이동',
                'content_copy': '콘텐츠 복사',
                'content_status_changed': '콘텐츠 상태 변경',
                // 감시자 이벤트
                'supervisor_assign': '운영자 지정',
                // 로그 이벤트
                'log_view': '로그 조회',
                'default': '작업'
            };
            return labels[type] || labels['default'];
        }
        
        // 모달 외부 클릭 시 닫기
        window.onclick = function(event) {
            const modal = document.getElementById('supervisorModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }
    </script>

    <!-- 운영자 메뉴 모달 -->
    <div id="supervisorModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div style="flex:1;">
                    <h2>운영자 메뉴</h2>
                    <div style="margin-top:10px;">
                        <label for="labSelect" style="color:var(--text); font-weight:500;">모니터링 랩 선택:</label>
                        <select id="labSelect" style="margin-left:10px; padding:5px 10px; border:1px solid var(--border); border-radius:4px; background-color:var(--bg); color:var(--text); cursor:pointer;" onchange="changeMonitoringLab()">
                            <option value="">-- 랩 선택 --</option>
                        </select>
                    </div>
                </div>
                <span class="close-btn" onclick="closeSupervisorModal()">&times;</span>
            </div>
            
            <div class="modal-tabs">
                <button class="modal-tab active" onclick="showTab('users')">사용자 목록</button>
                <button class="modal-tab" onclick="showTab('monitoring')">모니터링</button>
            </div>
            
            <div id="users" class="modal-content-section active">
                <h3>랩 참여자 목록</h3>
                <table class="user-table">
                    <thead>
                        <tr>
                            <th>사용자 ID</th>
                            <th>사용자명</th>
                            <th>마지막 활동</th>
                            <th>역할</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <tr><td colspan="4" style="text-align:center; color:#999;">로딩 중...</td></tr>
                    </tbody>
                </table>
            </div>
            
            <div id="monitoring" class="modal-content-section">
                <h3>활동 모니터링</h3>
                <div id="monitoringContent" style="max-height: 400px; overflow-y: auto;">
                    <div style="text-align:center; color:#999; padding:20px;">로딩 중...</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
