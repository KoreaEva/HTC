<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Center Portal</title>
    <style>
        :root {
            --bg: #f7f8fb;
            --panel: #ffffff;
            --muted: #6b7280;
            --accent: #2563eb;
            --accent-soft: #e8f0ff;
            --text: #1f2937;
            --border: #e5e7eb;
            --hover: #f1f5f9;
            --shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; max-width:1200px; margin:0 auto; padding:20px; background:var(--bg); color:var(--text); }
        
        /* 모바일 반응형 스타일 */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .header { flex-direction: column; gap: 15px; align-items: flex-start; }
            .header-actions { width: 100%; justify-content: flex-end; }
            .labs-container { grid-template-columns: 1fr; }
            .content-layout { flex-direction: column; }
            .content-sidebar { width: 100%; margin-bottom: 20px; position: static; top: auto; max-height: none; overflow-y: visible; }
            .content-viewer { min-height: 400px; padding: 15px; }
            .lab-card { padding: 15px; }
            .content-item { padding: 12px; }
        }
        
        @media (max-width: 480px) {
            body { padding: 5px; }
            .header h1 { font-size: 1.3em; }
            .welcome { font-size: 1.2em; }
            .lab-card { padding: 12px; }
            .content-item { padding: 10px; }
            .content-viewer { padding: 12px; min-height: 300px; }
        }
        
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
        .welcome { font-size:1.5em; font-weight:600; }
        .header-actions { display:flex; align-items:center; gap:10px; position:relative; }
        .jjek-menu-wrap {
            position: relative;
        }
        .jjek-menu-btn {
            display:inline-flex;
            align-items:center;
            gap:0;
            background:#eff6ff;
            color:#1d4ed8;
            border:1px solid #bfdbfe;
            border-radius:8px;
            padding:8px 12px;
            cursor:pointer;
            font-weight:700;
            letter-spacing:0.02em;
            transition:all 0.2s ease;
        }
        .jjek-menu-badge {
            display:inline-flex;
            align-items:center;
            justify-content:center;
            min-width:20px;
            height:20px;
            padding:0 6px;
            border-radius:999px;
            background:#dc2626;
            color:#fff;
            font-size:0.72rem;
            font-weight:700;
            line-height:1;
        }
        .jjek-menu-badge[hidden] {
            display:none;
        }
        .jjek-menu-btn:hover {
            color:#1e40af;
            background:#dbeafe;
            border-color:#60a5fa;
            transform:none;
        }
        .jjek-menu-btn::after {
            content:'▾';
            font-size:0.8rem;
            color:#1d4ed8;
            margin-left:2px;
        }
        .jjek-menu-icon {
            width:30px;
            height:30px;
            border-radius:999px;
            object-fit:cover;
            background:#fff;
            border:1px solid rgba(245, 158, 11, 0.3);
        }
        .jjek-menu-panel {
            position:absolute;
            top:calc(100% + 10px);
            right:0;
            width:min(560px, calc(100vw - 24px));
            background:#f8fbff;
            border:1px solid #cfe3ff;
            border-radius:14px;
            box-shadow:0 8px 22px rgba(29, 78, 216, 0.12);
            padding:16px;
            z-index:50;
            backdrop-filter:blur(6px);
        }
        .jjek-menu-panel[hidden] {
            display:none;
        }
        .jjek-menu-top {
            display:flex;
            align-items:center;
            gap:12px;
            margin-bottom:14px;
        }
        .jjek-menu-avatar {
            width:56px;
            height:56px;
            border-radius:16px;
            object-fit:cover;
            background:#eff6ff;
            border:1px solid #bfdbfe;
            flex-shrink:0;
        }
        .jjek-menu-title {
            margin:0;
            font-size:1.05rem;
            font-weight:700;
            color:#1d4ed8;
        }
        .jjek-menu-subtitle {
            margin:4px 0 0;
            color:var(--muted);
            font-size:0.88rem;
            line-height:1.4;
        }
        .jjek-menu-status {
            margin-left:auto;
            align-self:flex-start;
            padding:6px 10px;
            border-radius:999px;
            background:#dbeafe;
            color:#1d4ed8;
            font-size:0.76rem;
            font-weight:700;
        }
        .jjek-chat-shell {
            display:flex;
            flex-direction:column;
            gap:12px;
        }
        .jjek-chat-body {
            min-height:360px;
            max-height:520px;
            overflow-y:auto;
            padding:14px;
            display:flex;
            flex-direction:column;
            gap:10px;
            background:#edf4ff;
            border:1px solid #d7e8ff;
            border-radius:10px;
        }
        .jjek-chat-row {
            display:flex;
            gap:10px;
            align-items:flex-end;
        }
        .jjek-chat-row.assistant {
            justify-content:flex-start;
        }
        .jjek-chat-row.user {
            justify-content:flex-end;
        }
        .jjek-chat-bubble {
            display:block;
            max-width:82%;
            padding:12px 14px;
            border-radius:14px;
            font-size:0.95rem;
            line-height:1.5;
            white-space:pre-wrap;
            box-shadow:0 2px 8px rgba(0, 0, 0, 0.08);
        }
        .jjek-chat-operator-badge {
            display:inline-flex;
            align-items:center;
            gap:6px;
            margin-bottom:4px;
            padding:4px 8px;
            border-radius:999px;
            background:#dbeafe;
            color:#1d4ed8;
            font-size:0.72rem;
            font-weight:700;
        }
        .jjek-chat-operator-badge img {
            width:14px;
            height:14px;
            border-radius:999px;
            object-fit:cover;
            background:#fff;
            border:1px solid #93c5fd;
        }
        .jjek-chat-row.assistant .jjek-chat-bubble {
            background:#1d4ed8;
            color:#fff;
            border-bottom-left-radius:3px;
        }
        .jjek-chat-row.user .jjek-chat-bubble {
            background:#007bff;
            color:#fff;
            border-bottom-right-radius:3px;
        }
        .jjek-chat-meta {
            font-size:0.78rem;
            color:#64748b;
            margin-top:4px;
        }
        .jjek-chat-row.user .jjek-chat-meta {
            text-align:right;
        }
        .jjek-chat-quick {
            display:flex;
            flex-wrap:wrap;
            gap:8px;
        }
        .jjek-quick-chip {
            border:none;
            border-radius:999px;
            background:#fef3c7;
            color:#92400e;
            padding:8px 12px;
            font-size:0.78rem;
            font-weight:700;
            cursor:pointer;
            transition:background 0.18s ease, transform 0.18s ease;
        }
        .jjek-quick-chip:hover {
            background:#fde68a;
            transform:translateY(-1px);
        }
        .jjek-chat-form {
            display:flex;
            gap:8px;
            align-items:flex-end;
        }
        .jjek-chat-input {
            flex:1;
            min-height:56px;
            max-height:130px;
            resize:vertical;
            border:1px solid #93c5fd;
            border-radius:8px;
            padding:12px 14px;
            font:inherit;
            color:var(--text);
            background:#fff;
        }
        .jjek-chat-input:focus {
            outline:none;
            border-color:#007bff;
            box-shadow:0 0 0 2px rgba(0, 123, 255, 0.1);
        }
        .jjek-chat-send {
            border:none;
            border-radius:8px;
            background:#007bff;
            color:#fff;
            padding:12px 20px;
            font-weight:600;
            cursor:pointer;
        }
        .jjek-chat-send:hover {
            background:#0056b3;
        }
        .jjek-menu-footer {
            margin-top:2px;
            padding-top:12px;
            border-top:1px solid var(--border);
            color:var(--muted);
            font-size:0.8rem;
        }
        @media (max-width: 768px) {
            .jjek-menu-panel {
                right:auto;
                left:0;
            }
        }
        @media (max-width: 480px) {
            .jjek-menu-panel {
                width:min(100vw - 18px, 380px);
            }
            .jjek-menu-btn {
                padding:8px 2px;
            }
            .jjek-menu-btn span {
                font-size:0.95rem;
            }
            .jjek-chat-bubble {
                max-width:88%;
            }
        }
        .logout-btn {
            display:inline-flex;
            align-items:center;
            gap:8px;
            background:transparent;
            color:#475569;
            border:1px solid #cbd5e1;
            padding:8px 10px;
            border-radius:6px;
            cursor:pointer;
            font-weight:500;
            font-size:0.92rem;
        }
        .logout-btn:hover {
            background:#f8fafc;
            color:#1f2937;
            border-color:#94a3b8;
        }
        .logout-icon { font-size:0.9rem; line-height:1; opacity:0.85; }
        .logout-text { letter-spacing:0.01em; }
        

        
        /* 랩 목록 스타일 */
        .labs-section { margin-bottom:30px; }
        .labs-header { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:15px; }
        .labs-section h2 { color:var(--accent); margin:0; }
        .labs-toggle {
            background:var(--accent);
            color:#fff;
            border:none;
            width:34px;
            height:34px;
            border-radius:999px;
            cursor:pointer;
            font-weight:600;
            display:inline-flex;
            align-items:center;
            justify-content:center;
            padding:0;
            font-size:1rem;
            line-height:1;
        }
        .labs-toggle:hover { background:#1d4ed8; }
        .labs-container { display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:15px; }
        .lab-card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:14px 16px; cursor:pointer; transition:all 0.3s ease; box-shadow: var(--shadow); }
        .lab-card:hover { border-color:var(--accent); transform:translateY(-2px); }
        .lab-card.disabled { cursor:not-allowed; opacity:0.6; }
        .lab-card.disabled:hover { border-color:var(--border); transform:none; }
        .lab-card h3 { margin:0; color:var(--accent); font-size:1.05em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .lab-card p { color:var(--muted); margin-bottom:10px; line-height:1.4; }
        .lab-card.selected { background:var(--accent-soft); border-color:var(--accent); }
        .lab-meta { display:flex; justify-content:space-between; align-items:center; margin-top:15px; }
        .lab-status { padding:4px 8px; border-radius:4px; font-size:0.8em; font-weight:600; }
        .lab-status.ready { background:#FF9800; color:white; }
        .lab-status.active { background:#4CAF50; color:white; }
        .lab-status.completed { background:#2196F3; color:white; }
        .lab-status.disabled { background:#9E9E9E; color:white; }
        .lab-status.unknown { background:#9E9E9E; color:white; }
        .lab-date { color:var(--muted); font-size:0.9em; }

        /* 접힘(리본) 상태 */
        .labs-section.collapsed .labs-container { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
        .labs-section.collapsed .lab-card {
            display:flex;
            flex-direction:row;
            align-items:center;
            gap:10px;
            padding:10px 14px;
            border-left:4px solid var(--accent);
            min-height:auto;
        }
        .labs-section.collapsed .lab-card h3 {
            flex:1;
            min-width:0;
            margin:0;
        }
        .labs-section.collapsed .lab-card p,
        .labs-section.collapsed .lab-meta { display:none; }
        
        /* 콘텐츠 목록 스타일 */
        .content-section { margin-bottom:30px; }
        .content-section h2 { color:var(--accent); margin-bottom:15px; }
        .content-layout { display:flex; gap:20px; align-items:flex-start; }
        .content-sidebar { width:300px; flex-shrink:0; position:sticky; top:20px; max-height:calc(100vh - 40px); overflow-y:auto; }
        .content-main { flex:1; }
        .content-list { background:var(--panel); border:1px solid var(--border); border-radius:12px; max-height:600px; overflow-y:auto; box-shadow: var(--shadow); }
        .content-item { padding:15px; border-bottom:1px solid var(--border); cursor:pointer; transition:all 0.3s ease; }
        .content-item:hover { background:var(--hover); }
        .content-item.active { background:var(--accent); color:white; }
        .content-item.active h4 { color:white; }
        .content-item.disabled { cursor:not-allowed; opacity:0.5; }
        .content-item.disabled:hover { background:transparent; }
        .content-item h4 { margin:0 0 5px 0; color:var(--accent); font-size:1em; }
        .content-item p { margin:0; color:var(--muted); font-size:0.9em; line-height:1.3; }
        .content-item .content-meta { display:flex; justify-content:space-between; align-items:center; margin-top:8px; }
        .content-type { padding:2px 6px; border-radius:3px; font-size:0.7em; font-weight:600; }
        .content-type.text { background:#2196F3; color:white; }
        .content-type.video { background:#FF9800; color:white; }
        .content-type.file { background:#9C27B0; color:white; }
        .choice-correct-highlight {
            border-color: #16a34a !important;
            background: #ecfdf5 !important;
            box-shadow: inset 0 0 0 1px rgba(22, 163, 74, 0.2);
        }
        .matching-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-top: 12px;
        }
        .matching-column {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
        }
        .matching-column-title {
            font-size: 13px;
            font-weight: 800;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .matching-option-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 10px;
            margin-bottom: 8px;
            background: #fff;
            cursor: grab;
            font-size: 14px;
            user-select: none;
        }
        .matching-option-card.selected {
            border-color: #2563eb;
            background: #eff6ff;
        }
        .matching-drop-zone {
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            padding: 8px 10px;
            margin-top: 8px;
            background: #fff;
            min-height: 24px;
            font-size: 14px;
            color: #475569;
        }
        .matching-drop-zone.drag-over {
            border-color: #2563eb;
            background: #eff6ff;
        }
        .matching-drop-zone.filled {
            border-style: solid;
            border-color: #94a3b8;
            background: #f8fafc;
            color: #0f172a;
        }
        .content-date { color:var(--muted); font-size:0.8em; }
        
        /* 마크다운 콘텐츠 영역 */
        .content-viewer { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:20px; min-height:600px; box-shadow: var(--shadow); }
        .content-viewer h1, .content-viewer h2, .content-viewer h3, .content-viewer h4, .content-viewer h5, .content-viewer h6 { color:var(--accent); margin-top:20px; margin-bottom:10px; }
        .content-viewer h1:first-child, .content-viewer h2:first-child, .content-viewer h3:first-child { margin-top:0; }
        .content-viewer p { line-height:1.6; margin-bottom:15px; }
        .content-viewer code { background:#f1f5f9; padding:2px 4px; border-radius:3px; font-family:monospace; }
        .content-viewer pre { background:#f1f5f9; padding:15px; border-radius:5px; overflow-x:auto; margin:15px 0; }
        .content-viewer pre code { background:none; padding:0; }
        .content-viewer blockquote { border-left:4px solid var(--accent); padding-left:15px; margin:15px 0; color:var(--muted); }
        .content-viewer ul, .content-viewer ol { padding-left:20px; margin:15px 0; }
        .content-viewer li { margin-bottom:5px; }
        .content-viewer table { width:100%; border-collapse:collapse; margin:15px 0; }
        .content-viewer th, .content-viewer td { border:1px solid var(--border); padding:8px; text-align:left; }
        .content-viewer th { background:#eff6ff; color:var(--text); }
        .content-viewer a { color:#2196F3; text-decoration:none; }
        .content-viewer a:hover { text-decoration:underline; }
        .content-viewer img { max-width:100%; height:auto; border-radius:5px; margin:10px 0; }
        
        /* 마크다운 콘텐츠 전용 스타일 */
        .markdown-content { 
            font-size: 1.05em; 
            line-height: 1.7; 
            color: var(--text); 
            max-width: 100%;
        }
        .markdown-content h1, .markdown-content h2, .markdown-content h3, .markdown-content h4, .markdown-content h5, .markdown-content h6 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
            color: var(--accent);
        }
        .markdown-content h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
        .markdown-content h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
        .markdown-content h3 { font-size: 1.25em; }
        .markdown-content p { margin-bottom: 16px; }
        .markdown-content ul, .markdown-content ol { padding-left: 2em; margin-bottom: 16px; }
        .markdown-content li { margin-bottom: 0.25em; }
        .markdown-content blockquote { 
            padding: 0 1em; 
            color: var(--muted); 
            border-left: 0.25em solid var(--accent); 
            margin: 0 0 16px 0;
        }
        .markdown-content pre { 
            background: #f1f5f9; 
            padding: 16px; 
            border-radius: 6px; 
            overflow-x: auto;
            margin-bottom: 16px;
        }
        .markdown-content code { 
            background: #f1f5f9; 
            padding: 0.2em 0.4em; 
            border-radius: 3px; 
            font-size: 85%;
            font-family: 'Courier New', monospace;
        }
        .markdown-content pre code {
            background: none;
            padding: 0;
            border-radius: 0;
        }
        .markdown-content table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 16px;
        }
        .markdown-content table th,
        .markdown-content table td {
            padding: 6px 13px;
            border: 1px solid var(--border);
        }
        .markdown-content table th {
            background-color: #eff6ff;
            font-weight: 600;
            color: var(--text);
        }
        .markdown-content img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
        }
        .markdown-content a {
            color: #2196F3;
            text-decoration: none;
        }
        .markdown-content a:hover {
            text-decoration: underline;
        }
        /* Code block styles */
        .code-block-wrapper {
            margin: 16px 0;
            border-radius: 8px;
            background: #22272e;
        }
        .code-block-wrapper pre {
            margin: 0;
            padding: 0;
            background: #22272e;
            overflow-x: auto;
        }
        .code-block-wrapper code {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
            line-height: 1.5;
            display: block;
            white-space: pre;
        }
        .code-header {
            background: #2d333b;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .code-language {
            color: #adbac7;
            font-size: 0.85em;
            font-weight: 600;
        }
        .copy-code-btn {
            background: #373e47;
            color: #adbac7;
            border: 1px solid #444c56;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.2s;
            type: button;
        }
        .copy-code-btn:hover {
            background: #444c56;
            color: #ffffff;
        }
        .copy-code-btn.copied {
            background: #238636;
            color: #ffffff;
            border-color: #238636;
        }
        .hljs {
            background: #22272e !important;
            padding: 16px !important;
            margin: 0 !important;
        }

        /* 운영자 메뉴 스타일 */
        .supervisor-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: background 0.3s;
            white-space: nowrap;
        }
        
        .supervisor-btn:hover {
            background: #218838;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.4);
        }
        
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            border-radius: 8px;
            width: 90%;
            max-width: 900px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }
        
        .modal-header h2 {
            margin: 0;
            color: #333;
        }
        
        .close-btn {
            font-size: 28px;
            font-weight: bold;
            color: #aaa;
            cursor: pointer;
        }
        
        .close-btn:hover {
            color: #000;
        }
        
        .modal-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }
        
        .modal-tab {
            padding: 10px 20px;
            background: #f0f0f0;
            border: none;
            cursor: pointer;
            border-radius: 4px 4px 0 0;
            font-weight: bold;
        }

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
    <script>
        // 0.0.0.0 접속 시 자동으로 localhost로 리다이렉트
        if (window.location.hostname === '0.0.0.0') {
            window.location.href = window.location.href.replace('0.0.0.0', 'localhost');
        }
        
        // 마크다운 파서 설정
        marked.setOptions({
            breaks: true,  // 줄바꿈을 <br>로 변환
            gfm: true,     // GitHub Flavored Markdown 지원
            sanitize: false // HTML 태그 허용 (XSS 방지는 서버에서 처리)
        });
        
        // 트레이닝 센터 코드 복사 함수
        function copyTrainingCode(button) {
            if (!button) return;
            
            try {
                // 버튼의 부모 요소(code-header)를 찾고, 그 다음 형제 요소인 pre > code를 찾기
                const codeHeader = button.parentElement;
                const codeBlockWrapper = codeHeader.parentElement;
                const preElement = codeBlockWrapper.querySelector('pre');
                const codeElement = preElement ? preElement.querySelector('code') : null;
                
                if (!codeElement) {
                    button.textContent = '✗ Failed';
                    setTimeout(() => {
                        button.textContent = 'Copy code';
                    }, 2000);
                    return;
                }
                
                // textContent를 사용하여 HTML escape된 텍스트를 자동으로 디코드
                const code = codeElement.textContent || '';
                
                if (!code.trim()) {
                    button.textContent = '✗ Failed';
                    setTimeout(() => {
                        button.textContent = 'Copy code';
                    }, 2000);
                    return;
                }
                
                // 클립보드에 복사
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(code).then(() => {
                        button.textContent = '✓ Copied!';
                        button.classList.add('copied');
                        setTimeout(() => {
                            button.textContent = 'Copy code';
                            button.classList.remove('copied');
                        }, 2000);
                    }).catch(err => {
                        fallbackCopyTraining(code, button);
                    });
                } else {
                    fallbackCopyTraining(code, button);
                }
            } catch (error) {
                button.textContent = '✗ Failed';
                setTimeout(() => {
                    button.textContent = 'Copy code';
                }, 2000);
            }
        }
        
        // 폴백 복사 메서드 (트레이닝 센터)
        function fallbackCopyTraining(text, button) {
            try {
                const textArea = document.createElement('textarea');
                textArea.value = text;
                textArea.style.position = 'fixed';
                textArea.style.left = '-9999px';
                document.body.appendChild(textArea);
                textArea.select();
                const successful = document.execCommand('copy');
                document.body.removeChild(textArea);
                
                if (successful) {
                    button.textContent = '✓ Copied!';
                    button.classList.add('copied');
                    setTimeout(() => {
                        button.textContent = 'Copy code';
                        button.classList.remove('copied');
                    }, 2000);
                } else {
                    throw new Error('Copy command failed');
                }
            } catch (err) {
                button.textContent = '✗ Failed';
                setTimeout(() => {
                    button.textContent = 'Copy code';
                }, 2000);
            }
        }
    </script>
</head>

    <script>
        let jjekChatHistory = [];
        let jjekInboxTimer = null;
        let jjekLastInboxId = 0;
        let jjekUnreadTimer = null;
        const jjekRenderedMessageIds = new Set();

        // 로그인 정보 가져오기 (세션에서)
        function getLoginInfo() {
            const loginInfo = sessionStorage.getItem('loginInfo');
            return loginInfo ? JSON.parse(loginInfo) : null;
        }

        function escapeJjekHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getJjekTimeLabel() {
            return new Date().toLocaleTimeString('ko-KR', {
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function isJjekMenuOpen() {
            const panel = document.getElementById('jjekMenuPanel');
            return Boolean(panel && !panel.hasAttribute('hidden'));
        }

        function setJjekUnreadBadge(count) {
            const badge = document.getElementById('jjekMenuUnreadBadge');
            if (!badge) {
                return;
            }

            const unreadCount = Math.max(0, Number(count) || 0);
            if (unreadCount <= 0) {
                badge.hidden = true;
                badge.textContent = '0';
                return;
            }

            badge.hidden = false;
            badge.textContent = unreadCount > 99 ? '99+' : String(unreadCount);
        }

        async function refreshJjekUnreadCount() {
            const loginInfo = getLoginInfo();
            if (!loginInfo || !loginInfo.training_key || !loginInfo.member_id) {
                setJjekUnreadBadge(0);
                return;
            }

            if (isJjekMenuOpen()) {
                setJjekUnreadBadge(0);
                return;
            }

            try {
                const params = new URLSearchParams({
                    training_key: loginInfo.training_key,
                    reader_member_id: loginInfo.member_id,
                    reader_role: 'trainee',
                });
                const response = await fetch(`/api/jjek/messages/unread-count?${params.toString()}`);
                if (!response.ok) {
                    return;
                }
                const data = await response.json();
                setJjekUnreadBadge(data.unread_count || 0);
            } catch (_error) {
                // 카운트 조회 실패는 다음 주기에 다시 시도
            }
        }

        function startJjekUnreadPolling() {
            if (jjekUnreadTimer) {
                return;
            }
            refreshJjekUnreadCount();
            jjekUnreadTimer = setInterval(refreshJjekUnreadCount, 5000);
        }

        async function markJjekMessagesRead() {
            const loginInfo = getLoginInfo();
            if (!loginInfo || !loginInfo.training_key || !loginInfo.member_id) {
                return;
            }

            setJjekUnreadBadge(0);

            try {
                await fetch('/api/jjek/messages/mark-read', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        training_key: loginInfo.training_key,
                        reader_member_id: loginInfo.member_id,
                        reader_role: 'trainee',
                    }),
                });
                refreshJjekUnreadCount();
            } catch (_error) {
                // 읽음 처리 실패는 치명적이지 않으므로 무시
            }
        }

        function renderJjekMessages() {
            const container = document.getElementById('jjekChatMessages');
            if (!container) {
                return;
            }

            container.innerHTML = jjekChatHistory.map(message => `
                <div class="jjek-chat-row ${message.role}">
                    <div>
                        ${message.showOperatorBadge ? '<div class="jjek-chat-operator-badge"><img src="/static/images/jjek-jjek.png" alt="운영자" onerror="this.style.display=\'none\'"><span>운영자</span></div>' : ''}
                        <div class="jjek-chat-bubble">${escapeJjekHtml(message.text)}</div>
                        <div class="jjek-chat-meta">${message.time}</div>
                    </div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }

        function pushJjekMessage(role, text, label, extra = {}) {
            jjekChatHistory.push({
                role,
                text,
                label,
                time: getJjekTimeLabel(),
                showOperatorBadge: Boolean(extra.showOperatorBadge),
            });
            renderJjekMessages();
        }

        function ensureJjekConversation() {
            const loginInfo = getLoginInfo();
            if (jjekChatHistory.length > 0) {
                renderJjekMessages();
                return;
            }

            const welcomeName = loginInfo && loginInfo.member_name ? loginInfo.member_name : '사용자';
            pushJjekMessage(
                'assistant',
                `${welcomeName}님, 안녕하세요. 저는 Jjek-Jjek messenger입니다.\n운영진과 채팅 메시지를 주고받을 수 있어요.`,
                'Jjek-Jjek'
            );
        }

        async function sendJjekMessageToAdmins(text) {
            const loginInfo = getLoginInfo();
            if (!loginInfo || !loginInfo.training_key || !loginInfo.member_id) {
                throw new Error('로그인 정보가 없어 메시지를 전송할 수 없습니다.');
            }

            const response = await fetch('/api/jjek/messages/send', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    training_key: loginInfo.training_key,
                    sender_member_id: loginInfo.member_id,
                    sender_name: loginInfo.member_name || '수강생',
                    sender_role: 'trainee',
                    message_text: text,
                }),
            });

            if (!response.ok) {
                const payload = await response.json().catch(() => ({}));
                throw new Error(payload.detail || '메시지 전송에 실패했습니다.');
            }

            return response.json().catch(() => ({}));
        }

        async function pollJjekInbox() {
            const loginInfo = getLoginInfo();
            if (!loginInfo || !loginInfo.training_key || !loginInfo.member_id) {
                return;
            }

            try {
                const params = new URLSearchParams({
                    training_key: loginInfo.training_key,
                    member_id: loginInfo.member_id,
                    since_id: String(jjekLastInboxId || 0),
                    limit: '100',
                });

                const response = await fetch(`/api/jjek/messages/inbox?${params.toString()}`);
                if (!response.ok) {
                    return;
                }

                const data = await response.json();
                const messages = Array.isArray(data.messages) ? data.messages : [];
                messages.forEach((msg) => {
                    if (!msg || !msg.message_text) {
                        return;
                    }
                    const idNum = Number(msg.id || 0);
                    if (idNum > 0) {
                        if (jjekRenderedMessageIds.has(idNum)) {
                            if (idNum > jjekLastInboxId) {
                                jjekLastInboxId = idNum;
                            }
                            return;
                        }
                        jjekRenderedMessageIds.add(idNum);
                    }
                    const senderMemberId = String(msg.sender_member_id || '');
                    const currentMemberId = String(loginInfo.member_id || '');
                    const isOwnMessage = senderMemberId && currentMemberId && senderMemberId === currentMemberId;
                    const senderRole = String(msg.sender_role || '').toLowerCase();
                    const messageRole = isOwnMessage ? 'user' : 'assistant';
                    const showOperatorBadge = !isOwnMessage && (senderRole === 'admin' || senderRole === 'supervisor');
                    pushJjekMessage(messageRole, msg.message_text, msg.sender_name || '관리자', {
                        showOperatorBadge,
                    });
                    if (idNum > jjekLastInboxId) {
                        jjekLastInboxId = idNum;
                    }
                });
                const panel = document.getElementById('jjekMenuPanel');
                if (panel && !panel.hasAttribute('hidden')) {
                    markJjekMessagesRead();
                } else {
                    refreshJjekUnreadCount();
                }
            } catch (_error) {
                // 폴링 실패는 다음 주기에 다시 시도
            }
        }

        function startJjekInboxPolling() {
            if (jjekInboxTimer) {
                return;
            }
            pollJjekInbox();
            jjekInboxTimer = setInterval(pollJjekInbox, 5000);
        }

        function stopJjekInboxPolling() {
            if (jjekInboxTimer) {
                clearInterval(jjekInboxTimer);
                jjekInboxTimer = null;
            }
        }

        function handleJjekInputKeydown(event) {
            if (!event) {
                return;
            }
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                submitJjekMessage();
            }
        }

        async function submitJjekMessage(event) {
            if (event) {
                event.preventDefault();
            }
            const input = document.getElementById('jjekChatInput');
            if (!input) {
                return;
            }

            const text = String(input.value || '').trim();
            if (!text) {
                input.focus();
                return;
            }

            input.value = '';

            try {
                const sendResult = await sendJjekMessageToAdmins(text);
                const sentId = Number(sendResult && sendResult.message_id ? sendResult.message_id : 0);
                if (sentId > 0) {
                    jjekRenderedMessageIds.add(sentId);
                    if (sentId > jjekLastInboxId) {
                        jjekLastInboxId = sentId;
                    }
                }
                pushJjekMessage('user', text, 'You');
                refreshJjekUnreadCount();
            } catch (error) {
                const message = error && error.message ? error.message : '메시지 전송 중 오류가 발생했습니다.';
                pushJjekMessage('assistant', `전달 실패: ${message}`, 'Jjek-Jjek');
            }
        }

        function closeJjekMenu() {
            const panel = document.getElementById('jjekMenuPanel');
            const button = document.getElementById('jjekMenuButton');
            if (!panel || panel.hasAttribute('hidden')) {
                return;
            }
            panel.setAttribute('hidden', 'hidden');
            if (button) {
                button.setAttribute('aria-expanded', 'false');
            }
            stopJjekInboxPolling();
        }

        function updateJjekMenuMeta() {
            const loginInfo = getLoginInfo();
            const subtitle = document.getElementById('jjekMenuSubtitle');
            const footer = document.getElementById('jjekMenuFooter');
            if (!subtitle || !footer) {
                return;
            }

            if (!loginInfo) {
                subtitle.textContent = '로그인 정보를 찾을 수 없습니다.';
                footer.textContent = '세션이 만료되었을 수 있습니다.';
                return;
            }

            subtitle.textContent = `${loginInfo.member_name}님과 대화하는 포털 메신저입니다.`;
            footer.textContent = `Training Key: ${loginInfo.training_key} · Member ID: ${loginInfo.member_id}`;
        }

        function toggleJjekMenu(event) {
            if (event) {
                event.stopPropagation();
            }

            const panel = document.getElementById('jjekMenuPanel');
            const button = document.getElementById('jjekMenuButton');
            if (!panel || !button) {
                return;
            }

            const isOpening = panel.hasAttribute('hidden');
            if (isOpening) {
                updateJjekMenuMeta();
                ensureJjekConversation();
                panel.removeAttribute('hidden');
                button.setAttribute('aria-expanded', 'true');
                setJjekUnreadBadge(0);
                startJjekInboxPolling();
                markJjekMessagesRead();
                const input = document.getElementById('jjekChatInput');
                if (input) {
                    setTimeout(() => input.focus(), 0);
                }
                return;
            }

            closeJjekMenu();
        }

        function goToLabsFromJjekMenu(shouldClose = true) {
            if (shouldClose) {
                closeJjekMenu();
            }
            const labsSection = document.getElementById('labsSection');
            if (labsSection) {
                labsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        async function refreshContentFromJjekMenu(shouldClose = true) {
            if (shouldClose) {
                closeJjekMenu();
            }
            await refreshContent();
        }

        function syncJjekSupervisorAction() {
            const actionButton = document.getElementById('jjekSupervisorAction');
            if (!actionButton) {
                return;
            }

            const supervisorLab = window.trainingPortal && window.trainingPortal.firstSupervisorLab
                ? window.trainingPortal.firstSupervisorLab
                : null;

            if (!supervisorLab) {
                actionButton.disabled = true;
                actionButton.textContent = '운영자 메뉴';
                return;
            }

            actionButton.disabled = false;
            actionButton.textContent = '운영자 메뉴';
        }

        function openSupervisorFromJjekMenu(shouldClose = true) {
            const supervisorLab = window.trainingPortal && window.trainingPortal.firstSupervisorLab
                ? window.trainingPortal.firstSupervisorLab
                : null;
            if (!supervisorLab) {
                alert('현재 열 수 있는 운영자 메뉴가 없습니다.');
                return;
            }
            if (shouldClose) {
                closeJjekMenu();
            }
            openSupervisorModal(supervisorLab.lab_id, supervisorLab.lab_name);
        }
        
        // 권한 체크 함수
        function checkUserPermission() {
            const loginInfo = getLoginInfo();
            if (!loginInfo) {
                alert('로그인이 필요합니다.');
                window.location.href = '/';
                return false;
            }
            
            // 관리자인 경우 관리자 포털로 리다이렉트
            if (loginInfo.role >= 100) {
                window.location.href = '/admin';
                return false;
            }
            
            return true;
        }
        
        // 로그아웃
        async function logout() {
            const loginInfo = getLoginInfo();
            
            // 로그아웃 이벤트 로그 기록
            if (loginInfo) {
                try {
                    await fetch('/api/logout', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            training_key: loginInfo.training_key,
                            member_id: loginInfo.member_id,
                            member_name: loginInfo.member_name
                        })
                    });
                } catch (error) {
                    console.error('로그아웃 로그 기록 실패:', error);
                }
            }
            
            sessionStorage.removeItem('loginInfo');
            window.location.href = '/';
        }
        
        // 랩 상태 텍스트 변환

        // 랩 열기
        async function openLab(labId) {
            const loginInfo = getLoginInfo();
            if (!loginInfo) {
                window.location.href = '/';
                return;
            }
            
            // 이전 선택 제거
            document.querySelectorAll('.lab-card.selected').forEach(card => {
                card.classList.remove('selected');

            // 현재 카드에 선택 표시

            // 선택된 랩 정보 저장

            if (window.trainingPortal && Array.isArray(window.trainingPortal.labs)) {
                const selectedLab = window.trainingPortal.labs.find(lab => Number(lab.lab_id) === Number(labId));
                window.selectedLabIsSupervisor = Boolean(selectedLab && selectedLab.is_supervisor);
            } else {
                window.selectedLabIsSupervisor = false;
            }
            
            // 랩 선택 로그 기록
            try {
                await fetch('/api/portal/log_lab_view', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        training_key: loginInfo.training_key,
                        member_id: loginInfo.member_id,
                        lab_id: parseInt(labId)
                    })
                });

                console.error('랩 선택 로그 기록 실패:', error);

            loadContents(labId);

        // 콘텐츠 목록 로드

                const loginInfo = getLoginInfo();
                if (!loginInfo) {
                    window.location.href = '/';
                    return;
                }
                
                const response = await fetch(`/api/admin/lab_contents?training_key=${loginInfo.training_key}&lab_id=${labId}`);

                    throw new Error('콘텐츠 목록을 불러올 수 없습니다.');
                }

                if (contents.length === 0) {
                    contentContainer.innerHTML = '<p style="text-align:center; color:var(--muted);">이 랩에는 콘텐츠가 없습니다.</p>';
                    return;

                let contentsHTML = '';
                contents.forEach((content, index) => {
                    const isActive = content.lab_content_status === 1;
                    const isFirst = index === 0 && isActive;

                    contentsHTML += `
                        <div class="${itemClass}" ${onClick} data-content-id="${content.content_id}">
                            <h4>${content.lab_content_subject || '제목 없음'}</h4>
                        </div>
                    `;
                });
                
                contentContainer.innerHTML = contentsHTML;
                
                // 첫 번째 활성 콘텐츠 자동 로드
                if (contents.length > 0) {
                    const firstActiveContent = contents.find(content => content.lab_content_status === 1);
                    if (firstActiveContent) {
                        const firstActiveElement = contentContainer.querySelector('.content-item:not(.disabled)');
                        if (firstActiveElement) {
                            openContent(firstActiveContent.content_id, firstActiveElement);

                    }

            } catch (error) {
                document.getElementById('contentList').innerHTML =

                document.getElementById('selectedLabInfo').innerHTML =

        // 콘텐츠 타입에 따른 CSS 클래스 반환
        function getContentTypeClass(type) {
            switch(type) {
                case 'text': return 'text';
                case 'video': return 'video';
                case 'file': return 'file';
                default: return 'text';
            }
        }
        
        // 콘텐츠 타입에 따른 텍스트 반환
        function getContentTypeText(type) {
            switch(type) {
                case 'text': return '텍스트';
                case 'video': return '비디오';
                case 'file': return '파일';
                default: return '텍스트';
            }
        }

        let trainingTestCenterState = {
            questions: [],
            index: 0,
            meta: '',
            responses: [],
            contentId: null,
            generatedTestId: null,
            startedAt: null,
            submitted: false,
            completed: false,
            completedAt: null
        };

        function getTrainingTestCompletedMessage(completedAt) {
            return completedAt
                ? `이미 완료한 테스트입니다.\n완료 시각: ${completedAt}`
                : '이미 완료한 테스트입니다.';
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function normalizeChoiceToken(value) {
            return String(value || '')
                .trim()
                .toUpperCase()
                .replace(/\.$/, '');
        }

        function normalizeAnswerTokens(answerValue) {
            const raw = String(answerValue || '').trim();
            if (!raw) {
                return [];
            }

            let normalized = [];
            if (raw.startsWith('[') && raw.endsWith(']')) {
                try {
                    const parsed = JSON.parse(raw);
                    if (Array.isArray(parsed)) {
                        normalized = parsed
                            .map(token => normalizeChoiceToken(token))
                            .filter(token => token !== '');
                    }
                } catch (error) {
                    // Fallback to delimiter parsing below.
                }
            }

            if (!normalized.length) {
                normalized = raw
                    .replace(/，/g, ',')
                    .replace(/[\[\]"']/g, ' ')
                    .split(/[\s,;|/]+/)
                    .map(normalizeChoiceToken)
                    .filter(token => token !== '');
            }

            return Array.from(new Set(normalized));
        }

        function normalizeYesNo(value) {
            const token = String(value || '').trim().toUpperCase();
            if (['Y', 'YES', 'O', 'TRUE', '1'].includes(token)) return 'YES';
            if (['N', 'NO', 'X', 'FALSE', '0'].includes(token)) return 'NO';
            return token;
        }

        function getExpectedChoiceAnswerKeys(question) {
            const options = (question && question.options && typeof question.options === 'object') ? question.options : {};
            const expectedTokens = normalizeAnswerTokens(question && question.answer ? question.answer : '');
            if (!expectedTokens.length) {
                return [];
            }

            const keyTokenMap = new Map();
            const valueTokenMap = new Map();
            Object.keys(options).forEach(rawKey => {
                const keyToken = normalizeChoiceToken(rawKey);
                const valueToken = normalizeChoiceToken(options[rawKey]);
                if (keyToken) {
                    keyTokenMap.set(keyToken, keyToken);
                }
                if (valueToken && !valueTokenMap.has(valueToken)) {
                    valueTokenMap.set(valueToken, keyToken);
                }
            });

            const mapped = expectedTokens
                .map(token => keyTokenMap.get(token) || valueTokenMap.get(token) || token)
                .filter(Boolean);

            return Array.from(new Set(mapped));
        }

        function highlightCorrectChoiceOptions(question) {
            const expectedSet = new Set(getExpectedChoiceAnswerKeys(question));
            const inputs = Array.from(document.querySelectorAll('input[data-answer-input="choice"]'));
            inputs.forEach(input => {
                const optionEl = input.closest('label');
                if (!optionEl) {
                    return;
                }
                optionEl.classList.remove('choice-correct-highlight');
                const key = normalizeChoiceToken(input.value || '');
                if (expectedSet.has(key)) {
                    optionEl.classList.add('choice-correct-highlight');
                }
            });
        }

        function initMatchingDragDrop(containerEl, question) {
            const questionType = String(question.question_type || 'multiple_choice').toLowerCase();
            if (questionType !== 'matching' || !containerEl) {
                return;
            }

            const options = Array.isArray(question.options) ? question.options : [];
            const optionCards = Array.from(containerEl.querySelectorAll('.matching-option-card'));
            const dropZones = Array.from(containerEl.querySelectorAll('.matching-drop-zone'));
            let selectedOptionIndex = null;

            const clearSelection = () => {
                selectedOptionIndex = null;
                optionCards.forEach(card => card.classList.remove('selected'));
            };

            const clearDuplicateAssignments = (optionIndex, exceptZone) => {
                dropZones.forEach(zone => {
                    if (zone === exceptZone) {
                        return;
                    }
                    const input = zone.querySelector('input[data-answer-input="matching"]');
                    const valueEl = zone.querySelector('.matching-drop-value');
                    if (input && String(input.value) === String(optionIndex)) {
                        input.value = '';
                        zone.classList.remove('filled');
                        if (valueEl) {
                            valueEl.textContent = '여기에 드롭';
                        }
                    }
                });
            };

            const assignOption = (zone, optionIndex) => {
                const normalized = Number(optionIndex);
                if (!normalized || normalized < 1 || normalized > options.length) {
                    return;
                }
                const input = zone.querySelector('input[data-answer-input="matching"]');
                const valueEl = zone.querySelector('.matching-drop-value');
                if (!input || !valueEl) {
                    return;
                }
                clearDuplicateAssignments(normalized, zone);
                input.value = String(normalized);
                valueEl.textContent = `${normalized}. ${options[normalized - 1] || ''}`;
                zone.classList.add('filled');
            };

            optionCards.forEach(card => {
                const optionIndex = Number(card.getAttribute('data-match-option-index'));
                card.setAttribute('draggable', 'true');

                card.addEventListener('dragstart', event => {
                    if (event.dataTransfer) {
                        event.dataTransfer.setData('text/plain', String(optionIndex));
                        event.dataTransfer.effectAllowed = 'move';
                    }
                });

                card.addEventListener('click', () => {
                    const wasSelected = selectedOptionIndex === optionIndex;
                    clearSelection();
                    if (!wasSelected) {
                        selectedOptionIndex = optionIndex;
                        card.classList.add('selected');
                    }
                });
            });

            dropZones.forEach(zone => {
                const input = zone.querySelector('input[data-answer-input="matching"]');
                const valueEl = zone.querySelector('.matching-drop-value');
                if (input && valueEl && input.value) {
                    const preset = Number(input.value);
                    if (preset && options[preset - 1]) {
                        valueEl.textContent = `${preset}. ${options[preset - 1]}`;
                        zone.classList.add('filled');
                    }
                }

                zone.addEventListener('dragover', event => {
                    event.preventDefault();
                    zone.classList.add('drag-over');
                });

                zone.addEventListener('dragleave', () => {
                    zone.classList.remove('drag-over');
                });

                zone.addEventListener('drop', event => {
                    event.preventDefault();
                    zone.classList.remove('drag-over');
                    const dropped = event.dataTransfer ? Number(event.dataTransfer.getData('text/plain')) : NaN;
                    assignOption(zone, dropped);
                    clearSelection();
                });

                zone.addEventListener('click', () => {
                    if (selectedOptionIndex) {
                        assignOption(zone, selectedOptionIndex);
                        clearSelection();
                        return;
                    }
                    const zoneInput = zone.querySelector('input[data-answer-input="matching"]');
                    if (!zoneInput || !zoneInput.value) {
                        return;
                    }
                    zoneInput.value = '';
                    zone.classList.remove('filled');
                    if (valueEl) {
                        valueEl.textContent = '여기에 드롭';
                    }
                });
            });
        }

        function unorderedEquals(left, right) {
            if (left.length !== right.length) {
                return false;
            }
            const leftSorted = [...left].sort();
            const rightSorted = [...right].sort();
            for (let idx = 0; idx < leftSorted.length; idx += 1) {
                if (leftSorted[idx] !== rightSorted[idx]) {
                    return false;
                }
            }
            return true;
        }

        function readCurrentTrainingResponse(question) {
            const qType = String(question.question_type || 'multiple_choice').toLowerCase();

            if (qType === 'yes_no') {
                const items = Array.isArray(question.items) ? question.items : [];
                return {
                    type: 'yes_no',
                    answers: items.map((_, idx) => {
                        const selected = document.querySelector(`input[data-answer-input="yesno"][data-item-index="${idx}"]:checked`);
                        return selected ? normalizeYesNo(selected.value) : null;
                    }),
                };
            }

            if (qType === 'matching') {
                const items = Array.isArray(question.items) ? question.items : [];
                return {
                    type: 'matching',
                    answers: items.map((_, idx) => {
                        const selected = document.querySelector(`input[data-answer-input="matching"][data-item-index="${idx}"]`);
                        const value = selected ? String(selected.value || '').trim() : '';
                        return value || null;
                    }),
                };
            }

            const selectedAnswers = Array.from(document.querySelectorAll('input[data-answer-input="choice"]:checked'))
                .map(node => normalizeChoiceToken(node.value || ''))
                .filter(Boolean);
            return {
                type: 'choice',
                answers: Array.from(new Set(selectedAnswers)),
            };
        }

        function applyStoredTrainingResponse(question, response) {
            if (!response) {
                return;
            }
            const qType = String(question.question_type || 'multiple_choice').toLowerCase();

            if (qType === 'yes_no') {
                const answers = Array.isArray(response.answers) ? response.answers : [];
                answers.forEach((answer, idx) => {
                    if (!answer) {
                        return;
                    }
                    const selector = `input[data-answer-input="yesno"][data-item-index="${idx}"][value="${answer}"]`;
                    const radio = document.querySelector(selector);
                    if (radio) {
                        radio.checked = true;
                    }
                });
                return;
            }

            if (qType === 'matching') {
                const answers = Array.isArray(response.answers) ? response.answers : [];
                const options = Array.isArray(question.options) ? question.options : [];
                answers.forEach((answer, idx) => {
                    const input = document.querySelector(`input[data-answer-input="matching"][data-item-index="${idx}"]`);
                    const zone = input ? input.closest('.matching-drop-zone') : null;
                    const valueEl = zone ? zone.querySelector('.matching-drop-value') : null;
                    if (!input || !zone || !valueEl) {
                        return;
                    }
                    if (!answer) {
                        input.value = '';
                        zone.classList.remove('filled');
                        valueEl.textContent = '여기에 드롭';
                        return;
                    }
                    input.value = String(answer);
                    const optionIndex = Number(answer);
                    valueEl.textContent = optionIndex > 0 && optionIndex <= options.length
                        ? `${optionIndex}. ${options[optionIndex - 1] || ''}`
                        : String(answer);
                    zone.classList.add('filled');
                });
                return;
            }

            const selectedSet = new Set((Array.isArray(response.answers) ? response.answers : []).map(normalizeChoiceToken));
            Array.from(document.querySelectorAll('input[data-answer-input="choice"]')).forEach(input => {
                const key = normalizeChoiceToken(input.value || '');
                input.checked = selectedSet.has(key);
            });
        }

        function isTrainingResponseAnswered(question, response) {
            if (!response) {
                return false;
            }
            const qType = String(question.question_type || 'multiple_choice').toLowerCase();

            if (qType === 'yes_no' || qType === 'matching') {
                const answers = Array.isArray(response.answers) ? response.answers : [];
                return answers.length > 0 && answers.every(item => item != null && String(item).trim() !== '');
            }

            return Array.isArray(response.answers) && response.answers.length > 0;
        }

        function isTrainingResponseCorrect(question, response) {
            if (!isTrainingResponseAnswered(question, response)) {
                return false;
            }

            const qType = String(question.question_type || 'multiple_choice').toLowerCase();

            if (qType === 'yes_no') {
                const items = Array.isArray(question.items) ? question.items : [];
                const answers = Array.isArray(response.answers) ? response.answers : [];
                if (items.length !== answers.length) {
                    return false;
                }
                for (let idx = 0; idx < items.length; idx += 1) {
                    const expected = normalizeYesNo(items[idx].answer || '');
                    if (!expected || normalizeYesNo(answers[idx]) !== expected) {
                        return false;
                    }
                }
                return true;
            }

            if (qType === 'matching') {
                const items = Array.isArray(question.items) ? question.items : [];
                const options = Array.isArray(question.options) ? question.options : [];
                const answers = Array.isArray(response.answers) ? response.answers : [];
                if (items.length !== answers.length) {
                    return false;
                }
                for (let idx = 0; idx < items.length; idx += 1) {
                    const expectedRaw = String(items[idx].answer || '').trim();
                    let expected = expectedRaw;
                    if (expectedRaw && Number.isNaN(Number(expectedRaw))) {
                        const mappedIndex = options.findIndex(option => normalizeChoiceToken(option || '') === normalizeChoiceToken(expectedRaw));
                        if (mappedIndex >= 0) {
                            expected = String(mappedIndex + 1);
                        }
                    }
                    if (!expected || String(answers[idx]).trim() !== expected) {
                        return false;
                    }
                }
                return true;
            }

            const expectedAnswers = getExpectedChoiceAnswerKeys(question);
            if (!expectedAnswers.length) {
                return false;
            }
            const selectedAnswers = Array.isArray(response.answers)
                ? response.answers.map(normalizeChoiceToken).filter(Boolean)
                : [];
            return unorderedEquals(selectedAnswers, expectedAnswers);
        }

        function storeCurrentTrainingResponse(question, index) {
            trainingTestCenterState.responses[index] = readCurrentTrainingResponse(question);
        }

        function isTrainingSupervisor() {
            return Boolean(window.selectedLabIsSupervisor);
        }

        function getTrainingQuestionAnswerHint(question) {
            const qType = String(question.question_type || 'multiple_choice').toLowerCase();

            if (qType === 'yes_no') {
                const items = Array.isArray(question.items) ? question.items : [];
                if (!items.length) {
                    return '';
                }
                return items
                    .map((item, idx) => `${idx + 1}:${normalizeYesNo(item.answer || '') || '-'}`)
                    .join(' | ');
            }

            if (qType === 'matching') {
                const options = Array.isArray(question.options) ? question.options : [];
                const items = Array.isArray(question.items) ? question.items : [];
                if (!items.length) {
                    return '';
                }
                return items
                    .map((item, idx) => {
                        const expected = String(item.answer || '').trim();
                        const expectedIdx = Number(expected) - 1;
                        const expectedText = expected && expectedIdx >= 0 && options[expectedIdx]
                            ? `${expected}. ${options[expectedIdx]}`
                            : (expected || '-');
                        return `${idx + 1}->${expectedText}`;
                    })
                    .join(' | ');
            }

            const options = (question.options && typeof question.options === 'object') ? question.options : {};
            const expectedAnswers = getExpectedChoiceAnswerKeys(question);
            if (!expectedAnswers.length) {
                return '';
            }
            return expectedAnswers
                .map(token => options[token] ? `${token}. ${options[token]}` : token)
                .join(' | ');
        }

        function buildTrainingTestCenterSummary() {
            const questions = Array.isArray(trainingTestCenterState.questions) ? trainingTestCenterState.questions : [];
            const totalQuestions = questions.length;
            let answeredQuestions = 0;
            let solvedQuestions = 0;
            const unansweredIndexes = [];

            questions.forEach((question, idx) => {
                const response = trainingTestCenterState.responses[idx];
                if (isTrainingResponseAnswered(question, response)) {
                    answeredQuestions += 1;
                    if (isTrainingResponseCorrect(question, response)) {
                        solvedQuestions += 1;
                    }
                } else {
                    unansweredIndexes.push(idx + 1);
                }
            });

            const scorePercent = totalQuestions > 0 ? (solvedQuestions / totalQuestions) * 100 : 0;
            return {
                totalQuestions,
                answeredQuestions,
                solvedQuestions,
                unansweredIndexes,
                scorePercent,
            };
        }

        async function submitTrainingTestCenterResult(summary) {
            if (trainingTestCenterState.submitted) {
                alert(getTrainingTestCompletedMessage(trainingTestCenterState.completedAt));
                return;
            }

            const loginInfo = getLoginInfo();
            if (!loginInfo) {
                alert('로그인이 필요합니다.');
                window.location.href = '/';
                return;
            }

            const payload = {
                training_key: loginInfo.training_key,
                member_id: loginInfo.member_id,
                lab_id: Number(window.selectedLabId),
                content_id: Number(trainingTestCenterState.contentId),
                generated_test_id: trainingTestCenterState.generatedTestId ? Number(trainingTestCenterState.generatedTestId) : null,
                started_at: trainingTestCenterState.startedAt || new Date().toISOString(),
                total_questions: summary.totalQuestions,
                answered_questions: summary.answeredQuestions,
                solved_questions: summary.solvedQuestions,
                score_percent: Number(summary.scorePercent.toFixed(2)),
                detail: {
                    responses: trainingTestCenterState.responses,
                },
            };

            try {
                const response = await fetch('/api/portal/test-center/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const raw = await response.text();
                let data = null;
                try {
                    data = raw ? JSON.parse(raw) : null;
                } catch (e) {
                    data = null;
                }
                if (!response.ok) {
                    const detailMessage = typeof data.detail === 'string'
                        ? data.detail
                        : (data && data.detail && data.detail.message ? data.detail.message : null);
                    throw new Error(detailMessage || raw || '점수 저장에 실패했습니다.');
                }

                trainingTestCenterState.submitted = true;
                trainingTestCenterState.completed = true;
                trainingTestCenterState.completedAt = null;
                // 테스트센터 알림 메시지가 짹짹에 즉시 반영되도록 뱃지 갱신
                setTimeout(() => refreshJjekUnreadCount(), 500);
                alert('테스트 결과가 저장되었습니다.');
                closeTrainingTestCenterModal();
            } catch (error) {
                alert(error.message || '점수 저장 중 오류가 발생했습니다.');
            }
        }

        function updateTrainingTestCenterModal() {
            const metaEl = document.getElementById('trainingTestCenterMeta');
            const bodyEl = document.getElementById('trainingTestCenterBody');
            const prevBtn = document.getElementById('trainingTestPrevBtn');
            const nextBtn = document.getElementById('trainingTestNextBtn');
            const finishBtn = document.getElementById('trainingTestFinishBtn');
            const pageEl = document.getElementById('trainingTestPageInfo');
            const questions = trainingTestCenterState.questions || [];

            if (!metaEl || !bodyEl) {
                return;
            }

            metaEl.textContent = trainingTestCenterState.meta || '';
            if (!questions.length) {
                bodyEl.innerHTML = '<p style="color:var(--muted);">표시할 문제가 없습니다.</p>';
                if (pageEl) pageEl.textContent = '문제 0 / 0';
                if (prevBtn) prevBtn.disabled = true;
                if (nextBtn) nextBtn.disabled = true;
                return;
            }

            const currentIndex = Math.max(0, Math.min(trainingTestCenterState.index, questions.length - 1));
            trainingTestCenterState.index = currentIndex;
            const currentQuestion = questions[currentIndex];
            const isLastQuestion = currentIndex >= questions.length - 1;
            bodyEl.innerHTML = `<div style="background:#fff; border:1px solid var(--border); border-radius:16px; padding:24px; box-shadow:0 10px 26px rgba(15, 23, 42, 0.08);">${buildTestCenterQuestionHtml(currentQuestion)}</div>`;
            initMatchingDragDrop(bodyEl, currentQuestion);
            applyStoredTrainingResponse(currentQuestion, trainingTestCenterState.responses[currentIndex]);

            if (pageEl) pageEl.textContent = `문제 ${currentIndex + 1} / ${questions.length}`;
            if (prevBtn) prevBtn.disabled = currentIndex <= 0;
            if (nextBtn) {
                const nextEnabled = !isLastQuestion;
                nextBtn.disabled = !nextEnabled;
                setTrainingNextButtonStyle(nextBtn, nextEnabled);
            }
            if (finishBtn) {
                finishBtn.style.display = isLastQuestion ? 'inline-block' : 'none';
            }

            if (prevBtn) {
                prevBtn.onclick = () => {
                    storeCurrentTrainingResponse(currentQuestion, currentIndex);
                    if (trainingTestCenterState.index > 0) {
                        trainingTestCenterState.index -= 1;
                        updateTrainingTestCenterModal();
                    }
                };
            }
            if (nextBtn) {
                nextBtn.onclick = () => {
                    storeCurrentTrainingResponse(currentQuestion, currentIndex);
                    if (trainingTestCenterState.index < questions.length - 1) {
                        trainingTestCenterState.index += 1;
                        updateTrainingTestCenterModal();
                    }
                };
            }
            if (finishBtn) {
                finishBtn.onclick = () => {
                    storeCurrentTrainingResponse(currentQuestion, currentIndex);
                    showTrainingTestCenterSummary();
                };
            }
        }

                try {
                    const detailRes = await fetch(`/api/admin/generated-tests/${payload.generated_test_id}`);

                    if (detailRes.ok && Array.isArray(detailData.questions)) {
                        questions = detailData.questions.map(question => {
                            const questionType = String(question.question_type || 'multiple_choice').toLowerCase();

                                id: question.id,
                                question_number: question.question_number,
                                question_type: questionType,

                                    id: item.id,
                                    text: item.text || '',
                                    answer: item.answer || ''
                                }));

                                    id: item.id,
                                    text: item.text || '',
                                    answer: item.answer || ''
                                }));
                            } else {
