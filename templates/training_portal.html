<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Center Portal</title>
    <style>
        :root {
            --bg: #f7f8fb;
            --panel: #ffffff;
            --muted: #6b7280;
            --accent: #2563eb;
            --accent-soft: #e8f0ff;
            --text: #1f2937;
            --border: #e5e7eb;
            --hover: #f1f5f9;
            --shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; max-width:1200px; margin:0 auto; padding:20px; background:var(--bg); color:var(--text); }
        
        /* 모바일 반응형 스타일 */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .header { flex-direction: column; gap: 15px; align-items: flex-start; }
            .labs-container { grid-template-columns: 1fr; }
            .content-layout { flex-direction: column; }
            .content-sidebar { width: 100%; margin-bottom: 20px; }
            .content-viewer { min-height: 400px; padding: 15px; }
            .lab-card { padding: 15px; }
            .content-item { padding: 12px; }
        }
        
        @media (max-width: 480px) {
            body { padding: 5px; }
            .header h1 { font-size: 1.3em; }
            .welcome { font-size: 1.2em; }
            .lab-card { padding: 12px; }
            .content-item { padding: 10px; }
            .content-viewer { padding: 12px; min-height: 300px; }
        }
        
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
        .welcome { font-size:1.5em; font-weight:600; }
        .logout-btn { background:#ef4444; color:white; border:none; padding:10px 20px; border-radius:6px; cursor:pointer; font-weight:600; }
        .logout-btn:hover { background:#dc2626; }
        

        
        /* 랩 목록 스타일 */
        .labs-section { margin-bottom:30px; }
        .labs-header { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:15px; }
        .labs-section h2 { color:var(--accent); margin:0; }
        .labs-toggle {
            background:var(--accent);
            color:#fff;
            border:none;
            padding:8px 12px;
            border-radius:6px;
            cursor:pointer;
            font-weight:600;
            font-size:0.9em;
        }
        .labs-toggle:hover { background:#1d4ed8; }
        .labs-container { display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:15px; }
        .lab-card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:14px 16px; cursor:pointer; transition:all 0.3s ease; box-shadow: var(--shadow); }
        .lab-card:hover { border-color:var(--accent); transform:translateY(-2px); }
        .lab-card.disabled { cursor:not-allowed; opacity:0.6; }
        .lab-card.disabled:hover { border-color:var(--border); transform:none; }
        .lab-card h3 { margin:0; color:var(--accent); font-size:1.05em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .lab-card p { color:var(--muted); margin-bottom:10px; line-height:1.4; }
        .lab-card.selected { background:var(--accent-soft); border-color:var(--accent); }
        .lab-meta { display:flex; justify-content:space-between; align-items:center; margin-top:15px; }
        .lab-status { padding:4px 8px; border-radius:4px; font-size:0.8em; font-weight:600; }
        .lab-status.ready { background:#FF9800; color:white; }
        .lab-status.active { background:#4CAF50; color:white; }
        .lab-status.completed { background:#2196F3; color:white; }
        .lab-status.disabled { background:#9E9E9E; color:white; }
        .lab-status.unknown { background:#9E9E9E; color:white; }
        .lab-date { color:var(--muted); font-size:0.9em; }

        /* 접힘(리본) 상태 */
        .labs-section.collapsed .labs-container { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
        .labs-section.collapsed .lab-card {
            display:flex;
            flex-direction:row;
            align-items:center;
            gap:10px;
            padding:10px 14px;
            border-left:4px solid var(--accent);
            min-height:auto;
        }
        .labs-section.collapsed .lab-card h3 {
            flex:1;
            min-width:0;
            margin:0;
        }
        .labs-section.collapsed .lab-card p,
        .labs-section.collapsed .lab-meta { display:none; }
        
        /* 콘텐츠 목록 스타일 */
        .content-section { margin-bottom:30px; }
        .content-section h2 { color:var(--accent); margin-bottom:15px; }
        .content-layout { display:flex; gap:20px; }
        .content-sidebar { width:300px; flex-shrink:0; }
        .content-main { flex:1; }
        .content-list { background:var(--panel); border:1px solid var(--border); border-radius:12px; max-height:600px; overflow-y:auto; box-shadow: var(--shadow); }
        .content-item { padding:15px; border-bottom:1px solid var(--border); cursor:pointer; transition:all 0.3s ease; }
        .content-item:hover { background:var(--hover); }
        .content-item.active { background:var(--accent); color:white; }
        .content-item.active h4 { color:white; }
        .content-item.disabled { cursor:not-allowed; opacity:0.5; }
        .content-item.disabled:hover { background:transparent; }
        .content-item h4 { margin:0 0 5px 0; color:var(--accent); font-size:1em; }
        .content-item p { margin:0; color:var(--muted); font-size:0.9em; line-height:1.3; }
        .content-item .content-meta { display:flex; justify-content:space-between; align-items:center; margin-top:8px; }
        .content-type { padding:2px 6px; border-radius:3px; font-size:0.7em; font-weight:600; }
        .content-type.text { background:#2196F3; color:white; }
        .content-type.video { background:#FF9800; color:white; }
        .content-type.file { background:#9C27B0; color:white; }
        .choice-correct-highlight {
            border-color: #16a34a !important;
            background: #ecfdf5 !important;
            box-shadow: inset 0 0 0 1px rgba(22, 163, 74, 0.2);
        }
        .matching-board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-top: 12px;
        }
        .matching-column {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
        }
        .matching-column-title {
            font-size: 13px;
            font-weight: 800;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .matching-option-card {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 10px;
            margin-bottom: 8px;
            background: #fff;
            cursor: grab;
            font-size: 14px;
            user-select: none;
        }
        .matching-option-card.selected {
            border-color: #2563eb;
            background: #eff6ff;
        }
        .matching-drop-zone {
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            padding: 8px 10px;
            margin-top: 8px;
            background: #fff;
            min-height: 24px;
            font-size: 14px;
            color: #475569;
        }
        .matching-drop-zone.drag-over {
            border-color: #2563eb;
            background: #eff6ff;
        }
        .matching-drop-zone.filled {
            border-style: solid;
            border-color: #94a3b8;
            background: #f8fafc;
            color: #0f172a;
        }
        .content-date { color:var(--muted); font-size:0.8em; }
        
        /* 마크다운 콘텐츠 영역 */
        .content-viewer { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:20px; min-height:600px; box-shadow: var(--shadow); }
        .content-viewer h1, .content-viewer h2, .content-viewer h3, .content-viewer h4, .content-viewer h5, .content-viewer h6 { color:var(--accent); margin-top:20px; margin-bottom:10px; }
        .content-viewer h1:first-child, .content-viewer h2:first-child, .content-viewer h3:first-child { margin-top:0; }
        .content-viewer p { line-height:1.6; margin-bottom:15px; }
        .content-viewer code { background:#f1f5f9; padding:2px 4px; border-radius:3px; font-family:monospace; }
        .content-viewer pre { background:#f1f5f9; padding:15px; border-radius:5px; overflow-x:auto; margin:15px 0; }
        .content-viewer pre code { background:none; padding:0; }
        .content-viewer blockquote { border-left:4px solid var(--accent); padding-left:15px; margin:15px 0; color:var(--muted); }
        .content-viewer ul, .content-viewer ol { padding-left:20px; margin:15px 0; }
        .content-viewer li { margin-bottom:5px; }
        .content-viewer table { width:100%; border-collapse:collapse; margin:15px 0; }
        .content-viewer th, .content-viewer td { border:1px solid var(--border); padding:8px; text-align:left; }
        .content-viewer th { background:#eff6ff; color:var(--text); }
        .content-viewer a { color:#2196F3; text-decoration:none; }
        .content-viewer a:hover { text-decoration:underline; }
        .content-viewer img { max-width:100%; height:auto; border-radius:5px; margin:10px 0; }
        
        /* 마크다운 콘텐츠 전용 스타일 */
        .markdown-content { 
            font-size: 1.05em; 
            line-height: 1.7; 
            color: var(--text); 
            max-width: 100%;
        }
        .markdown-content h1, .markdown-content h2, .markdown-content h3, .markdown-content h4, .markdown-content h5, .markdown-content h6 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
            color: var(--accent);
        }
        .markdown-content h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
        .markdown-content h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
        .markdown-content h3 { font-size: 1.25em; }
        .markdown-content p { margin-bottom: 16px; }
        .markdown-content ul, .markdown-content ol { padding-left: 2em; margin-bottom: 16px; }
        .markdown-content li { margin-bottom: 0.25em; }
        .markdown-content blockquote { 
            padding: 0 1em; 
            color: var(--muted); 
            border-left: 0.25em solid var(--accent); 
            margin: 0 0 16px 0;
        }
        .markdown-content pre { 
            background: #f1f5f9; 
            padding: 16px; 
            border-radius: 6px; 
            overflow-x: auto;
            margin-bottom: 16px;
        }
        .markdown-content code { 
            background: #f1f5f9; 
            padding: 0.2em 0.4em; 
            border-radius: 3px; 
            font-size: 85%;
            font-family: 'Courier New', monospace;
        }
        .markdown-content pre code {
            background: none;
            padding: 0;
            border-radius: 0;
        }
        .markdown-content table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 16px;
        }
        .markdown-content table th,
        .markdown-content table td {
            padding: 6px 13px;
            border: 1px solid var(--border);
        }
        .markdown-content table th {
            background-color: #eff6ff;
            font-weight: 600;
            color: var(--text);
        }
        .markdown-content img {
            max-width: 100%;
            height: auto;
            border-radius: 5px;
        }
        .markdown-content a {
            color: #2196F3;
            text-decoration: none;
        }
        .markdown-content a:hover {
            text-decoration: underline;
        }
        /* Code block styles */
        .code-block-wrapper {
            margin: 16px 0;
            border-radius: 8px;
            background: #22272e;
        }
        .code-block-wrapper pre {
            margin: 0;
            padding: 0;
            background: #22272e;
            overflow-x: auto;
        }
        .code-block-wrapper code {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
            line-height: 1.5;
            display: block;
            white-space: pre;
        }
        .code-header {
            background: #2d333b;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .code-language {
            color: #adbac7;
            font-size: 0.85em;
            font-weight: 600;
        }
        .copy-code-btn {
            background: #373e47;
            color: #adbac7;
            border: 1px solid #444c56;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.2s;
            type: button;
        }
        .copy-code-btn:hover {
            background: #444c56;
            color: #ffffff;
        }
        .copy-code-btn.copied {
            background: #238636;
            color: #ffffff;
            border-color: #238636;
        }
        .hljs {
            background: #22272e !important;
            padding: 16px !important;
            margin: 0 !important;
        }

        /* 운영자 메뉴 스타일 */
        .supervisor-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: background 0.3s;
            white-space: nowrap;
        }
        
        .supervisor-btn:hover {
            background: #218838;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.4);
        }
        
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            border-radius: 8px;
            width: 90%;
            max-width: 900px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }
        
        .modal-header h2 {
            margin: 0;
            color: #333;
        }
        
        .close-btn {
            font-size: 28px;
            font-weight: bold;
            color: #aaa;
            cursor: pointer;
        }
        
        .close-btn:hover {
            color: #000;
        }
        
        .modal-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }
        
        .modal-tab {
            padding: 10px 20px;
            background: #f0f0f0;
            border: none;
            cursor: pointer;
            border-radius: 4px 4px 0 0;
            font-weight: bold;
        }
        
        .modal-tab.active {
            background: #007bff;
            color: white;
        }
        
        .modal-content-section {
            display: none;
        }
        
        .modal-content-section.active {
            display: block;
        }
        
        .user-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        .user-table th, .user-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        .user-table th {
            background-color: #f8f9fa;
            font-weight: bold;
        }
        
        .user-table tr:hover {
            background-color: #f5f5f5;
        }
        
        .monitoring-item {
            background: #f9f9f9;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #2563eb;
            border-radius: 4px;
        }
        
        .monitoring-time {
            color: #666;
            font-size: 0.9em;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
    <script>
        // 0.0.0.0 접속 시 자동으로 localhost로 리다이렉트
        if (window.location.hostname === '0.0.0.0') {
            window.location.href = window.location.href.replace('0.0.0.0', 'localhost');
        }
        
        // 마크다운 파서 설정
        marked.setOptions({
            breaks: true,  // 줄바꿈을 <br>로 변환
            gfm: true,     // GitHub Flavored Markdown 지원
            sanitize: false // HTML 태그 허용 (XSS 방지는 서버에서 처리)
        });
        
        // 트레이닝 센터 코드 복사 함수
        function copyTrainingCode(button) {
            if (!button) return;
            
            try {
                // 버튼의 부모 요소(code-header)를 찾고, 그 다음 형제 요소인 pre > code를 찾기
                const codeHeader = button.parentElement;
                const codeBlockWrapper = codeHeader.parentElement;
                const preElement = codeBlockWrapper.querySelector('pre');
                const codeElement = preElement ? preElement.querySelector('code') : null;
                
                if (!codeElement) {
                    button.textContent = '✗ Failed';
                    setTimeout(() => {
                        button.textContent = 'Copy code';
                    }, 2000);
                    return;
                }
                
                // textContent를 사용하여 HTML escape된 텍스트를 자동으로 디코드
                const code = codeElement.textContent || '';
                
                if (!code.trim()) {
                    button.textContent = '✗ Failed';
                    setTimeout(() => {
                        button.textContent = 'Copy code';
                    }, 2000);
                    return;
                }
                
                // 클립보드에 복사
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(code).then(() => {
                        button.textContent = '✓ Copied!';
                        button.classList.add('copied');
                        setTimeout(() => {
                            button.textContent = 'Copy code';
                            button.classList.remove('copied');
                        }, 2000);
                    }).catch(err => {
                        fallbackCopyTraining(code, button);
                    });
                } else {
                    fallbackCopyTraining(code, button);
                }
            } catch (error) {
                button.textContent = '✗ Failed';
                setTimeout(() => {
                    button.textContent = 'Copy code';
                }, 2000);
            }
        }
        
        // 폴백 복사 메서드 (트레이닝 센터)
        function fallbackCopyTraining(text, button) {
            try {
                const textArea = document.createElement('textarea');
                textArea.value = text;
                textArea.style.position = 'fixed';
                textArea.style.left = '-9999px';
                document.body.appendChild(textArea);
                textArea.select();
                const successful = document.execCommand('copy');
                document.body.removeChild(textArea);
                
                if (successful) {
                    button.textContent = '✓ Copied!';
                    button.classList.add('copied');
                    setTimeout(() => {
                        button.textContent = 'Copy code';
                        button.classList.remove('copied');
                    }, 2000);
                } else {
                    throw new Error('Copy command failed');
                }
            } catch (err) {
                button.textContent = '✗ Failed';
                setTimeout(() => {
                    button.textContent = 'Copy code';
                }, 2000);
            }
        }
    </script>
</head>
<body>
    <div class="header">
        <div class="welcome">Training Center에 오신 것을 환영합니다!</div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    
    <!-- 랩 목록 -->
    <div class="labs-section collapsed" id="labsSection">
        <div class="labs-header">
            <h2>랩 목록</h2>
            <button type="button" class="labs-toggle" id="labsToggleBtn">Expand</button>
        </div>
        <div id="trainingInfo" style="margin-bottom:15px; padding:10px; background:var(--panel); border-radius:8px; border-left:4px solid var(--accent);">
            <p style="margin:0; color:var(--muted);">트레이닝 정보를 불러오는 중...</p>
        </div>
        <div id="labsList" class="labs-container">
            <p style="text-align:center; color:var(--muted);">랩 목록을 불러오는 중...</p>
        </div>
    </div>

    <!-- 콘텐츠 목록 -->
    <div id="contentSection" class="content-section" style="display:none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2 style="margin: 0;">콘텐츠 목록</h2>
            <button id="refreshContentBtn" onclick="refreshContent()" style="
                display: inline-flex;
                align-items: center;
                gap: 8px;
                background: #4CAF50;
                color: white;
                border: none;
                padding: 8px 16px;
                border-radius: 6px;
                cursor: pointer;
                font-weight: 500;
                font-size: 0.9em;
                transition: all 0.3s ease;
                box-shadow: 0 2px 4px rgba(76, 175, 80, 0.2);
            " onmouseover="this.style.background='#45a049'; this.style.transform='translateY(-1px)'" 
               onmouseout="this.style.background='#4CAF50'; this.style.transform='translateY(0)'">
                <span style="font-size: 1.1em;">🔄</span>
                새로고침
            </button>
        </div>
        <div class="content-layout">
            <div class="content-sidebar">
                <div id="contentList" class="content-list">
                    <p style="text-align:center; color:var(--muted); padding:20px;">콘텐츠를 선택하세요</p>
                </div>
            </div>
            <div class="content-main">
                <div id="contentViewer" class="content-viewer">
                    <p style="text-align:center; color:var(--muted); margin-top:50px;">왼쪽에서 콘텐츠를 선택하세요</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 로그인 정보 가져오기 (세션에서)
        function getLoginInfo() {
            const loginInfo = sessionStorage.getItem('loginInfo');
            return loginInfo ? JSON.parse(loginInfo) : null;
        }
        
        // 권한 체크 함수
        function checkUserPermission() {
            const loginInfo = getLoginInfo();
            if (!loginInfo) {
                alert('로그인이 필요합니다.');
                window.location.href = '/';
                return false;

        // 콘텐츠 타입에 따른 CSS 클래스 반환
        function getContentTypeClass(type) {
            switch(type) {
                case 'text': return 'text';

        // 콘텐츠 타입에 따른 텍스트 반환
        function getContentTypeText(type) {

        let trainingTestCenterState = {
            questions: [],
            index: 0,
            meta: '',
            solved: []
        };

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function normalizeChoiceToken(value) {
            return String(value || '')
                .trim()
                .toUpperCase()
                .replace(/\.$/, '');
        }

        function normalizeAnswerTokens(answerValue) {
            const raw = String(answerValue || '').trim();
            if (!raw) {
                return [];
            }

            let normalized = [];
            if (raw.startsWith('[') && raw.endsWith(']')) {
                try {
                    const parsed = JSON.parse(raw);
                    if (Array.isArray(parsed)) {
                        normalized = parsed
                            .map(token => normalizeChoiceToken(token))
                            .filter(token => token !== '');
                    }
                } catch (error) {
                    // Fallback to delimiter parsing below.
                }
            }

            if (!normalized.length) {
                normalized = raw
                    .replace(/，/g, ',')
                    .replace(/[\[\]"']/g, ' ')
                    .split(/[\s,;|/]+/)
                    .map(normalizeChoiceToken)
                    .filter(token => token !== '');
            }

            return Array.from(new Set(normalized));
        }

        function normalizeYesNo(value) {
            const token = String(value || '').trim().toUpperCase();
            if (['Y', 'YES', 'O', 'TRUE', '1'].includes(token)) return 'YES';
            if (['N', 'NO', 'X', 'FALSE', '0'].includes(token)) return 'NO';
            return token;
        }

        function getExpectedChoiceAnswerKeys(question) {
            const options = (question && question.options && typeof question.options === 'object') ? question.options : {};
            const expectedTokens = normalizeAnswerTokens(question && question.answer ? question.answer : '');
            if (!expectedTokens.length) {
                return [];
            }

            const keyTokenMap = new Map();
            const valueTokenMap = new Map();
            Object.keys(options).forEach(rawKey => {
                const keyToken = normalizeChoiceToken(rawKey);
                const valueToken = normalizeChoiceToken(options[rawKey]);
                if (keyToken) {
                    keyTokenMap.set(keyToken, keyToken);
                }
                if (valueToken && !valueTokenMap.has(valueToken)) {
                    valueTokenMap.set(valueToken, keyToken);
                }
            });

            const mapped = expectedTokens
                .map(token => keyTokenMap.get(token) || valueTokenMap.get(token) || token)
                .filter(Boolean);

            return Array.from(new Set(mapped));
        }

        function highlightCorrectChoiceOptions(question) {
            const expectedSet = new Set(getExpectedChoiceAnswerKeys(question));
            const inputs = Array.from(document.querySelectorAll('input[data-answer-input="choice"]'));
            inputs.forEach(input => {
                const optionEl = input.closest('label');
                if (!optionEl) {
                    return;
                }
                optionEl.classList.remove('choice-correct-highlight');
                const key = normalizeChoiceToken(input.value || '');
                if (expectedSet.has(key)) {
                    optionEl.classList.add('choice-correct-highlight');
                }
            });
        }

        function initMatchingDragDrop(containerEl, question) {
            const questionType = String(question.question_type || 'multiple_choice').toLowerCase();
            if (questionType !== 'matching' || !containerEl) {
                return;
            }

            const options = Array.isArray(question.options) ? question.options : [];
            const optionCards = Array.from(containerEl.querySelectorAll('.matching-option-card'));
            const dropZones = Array.from(containerEl.querySelectorAll('.matching-drop-zone'));
            let selectedOptionIndex = null;

            const clearSelection = () => {
                selectedOptionIndex = null;
                optionCards.forEach(card => card.classList.remove('selected'));
            };

            const clearDuplicateAssignments = (optionIndex, exceptZone) => {
                dropZones.forEach(zone => {
                    if (zone === exceptZone) {
                        return;
                    }
                    const input = zone.querySelector('input[data-answer-input="matching"]');
                    const valueEl = zone.querySelector('.matching-drop-value');
                    if (input && String(input.value) === String(optionIndex)) {
                        input.value = '';
                        zone.classList.remove('filled');
                        if (valueEl) {
                            valueEl.textContent = '여기에 드롭';
                        }
                    }
                });
            };

            const assignOption = (zone, optionIndex) => {
                const normalized = Number(optionIndex);
                if (!normalized || normalized < 1 || normalized > options.length) {
                    return;
                }
                const input = zone.querySelector('input[data-answer-input="matching"]');
                const valueEl = zone.querySelector('.matching-drop-value');
                if (!input || !valueEl) {
                    return;
                }
                clearDuplicateAssignments(normalized, zone);
                input.value = String(normalized);
                valueEl.textContent = `${normalized}. ${options[normalized - 1] || ''}`;
                zone.classList.add('filled');
            };

            optionCards.forEach(card => {
                const optionIndex = Number(card.getAttribute('data-match-option-index'));
                card.setAttribute('draggable', 'true');

                card.addEventListener('dragstart', event => {
                    if (event.dataTransfer) {
                        event.dataTransfer.setData('text/plain', String(optionIndex));
                        event.dataTransfer.effectAllowed = 'move';
                    }
                });

                card.addEventListener('click', () => {
                    const wasSelected = selectedOptionIndex === optionIndex;
                    clearSelection();
                    if (!wasSelected) {
                        selectedOptionIndex = optionIndex;
                        card.classList.add('selected');
                    }
                });
            });

            dropZones.forEach(zone => {
                const input = zone.querySelector('input[data-answer-input="matching"]');
                const valueEl = zone.querySelector('.matching-drop-value');
                if (input && valueEl && input.value) {
                    const preset = Number(input.value);
                    if (preset && options[preset - 1]) {
                        valueEl.textContent = `${preset}. ${options[preset - 1]}`;
                        zone.classList.add('filled');
                    }
                }

                zone.addEventListener('dragover', event => {
                    event.preventDefault();
                    zone.classList.add('drag-over');
                });

                zone.addEventListener('dragleave', () => {
                    zone.classList.remove('drag-over');
                });

                zone.addEventListener('drop', event => {
                    event.preventDefault();
                    zone.classList.remove('drag-over');
                    const dropped = event.dataTransfer ? Number(event.dataTransfer.getData('text/plain')) : NaN;
                    assignOption(zone, dropped);
                    clearSelection();
                });

                zone.addEventListener('click', () => {
                    if (selectedOptionIndex) {
                        assignOption(zone, selectedOptionIndex);
                        clearSelection();
                        return;
                    }
                    const zoneInput = zone.querySelector('input[data-answer-input="matching"]');
                    if (!zoneInput || !zoneInput.value) {
                        return;
                    }
                    zoneInput.value = '';
                    zone.classList.remove('filled');
                    if (valueEl) {
                        valueEl.textContent = '여기에 드롭';
                    }
                });
            });
        }

        function unorderedEquals(left, right) {
            if (left.length !== right.length) {
                return false;
            }
            const leftSorted = [...left].sort();
            const rightSorted = [...right].sort();
            for (let idx = 0; idx < leftSorted.length; idx += 1) {
                if (leftSorted[idx] !== rightSorted[idx]) {
                    return false;
                }
            }
            return true;
        }

        function isTrainingSupervisor() {
            return Boolean(window.selectedLabIsSupervisor);

        function getTrainingQuestionAnswerHint(question) {
            const qType = String(question.question_type || 'multiple_choice').toLowerCase();

            if (qType === 'yes_no') {
                const items = Array.isArray(question.items) ? question.items : [];
                if (!items.length) {
                    return '';
                }
                return items
                    .map((item, idx) => `${idx + 1}:${normalizeYesNo(item.answer || '') || '-'}`)
                    .join(' | ');
            }

            if (qType === 'matching') {
                const options = Array.isArray(question.options) ? question.options : [];
                const items = Array.isArray(question.items) ? question.items : [];
                if (!items.length) {
                    return '';
                }
                return items
                    .map((item, idx) => {
                        const expected = String(item.answer || '').trim();
                        const expectedIdx = Number(expected) - 1;
                        const expectedText = expected && expectedIdx >= 0 && options[expectedIdx]
                            ? `${expected}. ${options[expectedIdx]}`
                            : (expected || '-');
                        return `${idx + 1}->${expectedText}`;
                    })
                    .join(' | ');
            }

            const options = (question.options && typeof question.options === 'object') ? question.options : {};
            const expectedAnswers = getExpectedChoiceAnswerKeys(question);
            if (!expectedAnswers.length) {
                return '';
            }
            return expectedAnswers
                .map(token => options[token] ? `${token}. ${options[token]}` : token)
                .join(' | ');
        }

                                    </div>
                                </div>
                            `).join('') || '<div>항목 없음</div>'}
                        </div>
                    </div>
                `;
            } else if (qType === 'yes_no') {
                const items = Array.isArray(question.items) ? question.items : [];
                bodyHtml = items.map((item, idx) => `
                    <div style="border:1px solid var(--border); border-radius:10px; padding:14px; margin-top:12px; background:#fff;">

                    </div>
                `).join('') || '<div style="margin-top:14px; color:var(--muted);">문항 없음</div>';
            } else {
                const options = (question.options && typeof question.options === 'object') ? question.options : {};
                const keys = Object.keys(options);
                const inputType = isMultiAnswer ? 'checkbox' : 'radio';
                const optionHtml = keys.map(key => `
                    <label class="training-choice-option" style="display:block; border:1px solid var(--border); border-radius:10px; padding:14px 16px; margin-top:10px; background:#fff; cursor:pointer; font-size:18px; line-height:1.7;">

                        <strong>${escapeHtml(key)}.</strong> ${escapeHtml(options[key])}

                        ${optionHtml || '<div style="margin-top:10px; color:var(--muted);">보기 없음</div>'}

            return `

                    <span style="font-size:13px; font-weight:800; background:#eff6ff; color:#1d4ed8; border-radius:999px; padding:6px 12px;">문제 ${escapeHtml(number)}</span>

                <div style="line-height:1.8; white-space:pre-wrap; font-size:19px;">${escapeHtml(questionText)}</div>
                ${bodyHtml}
            `;
        }

        function isCurrentTrainingQuestionCorrect(question) {
            const qType = String(question.question_type || 'multiple_choice').toLowerCase();

            if (qType === 'yes_no') {
                const items = Array.isArray(question.items) ? question.items : [];
                if (!items.length) {
                    return false;
                }
                for (let idx = 0; idx < items.length; idx += 1) {
                    const selected = document.querySelector(`input[data-answer-input="yesno"][data-item-index="${idx}"]:checked`);
                    if (!selected) {
                        return false;
                    }
                    const expected = normalizeYesNo(items[idx].answer || '');
                    if (!expected || normalizeYesNo(selected.value) !== expected) {
                        return false;
                    }
                }
                return true;
            }

            if (qType === 'matching') {
                const items = Array.isArray(question.items) ? question.items : [];
                const options = Array.isArray(question.options) ? question.options : [];
                if (!items.length) {
                    return false;
                }
                for (let idx = 0; idx < items.length; idx += 1) {
                    const selected = document.querySelector(`input[data-answer-input="matching"][data-item-index="${idx}"]`);
                    if (!selected || !selected.value) {
                        return false;
                    }
                    const expectedRaw = String(items[idx].answer || '').trim();
                    let expected = expectedRaw;
                    if (expectedRaw && Number.isNaN(Number(expectedRaw))) {
                        const mappedIndex = options.findIndex(option => normalizeChoiceToken(option || '') === normalizeChoiceToken(expectedRaw));
                        if (mappedIndex >= 0) {
                            expected = String(mappedIndex + 1);
                        }
                    }
                    if (!expected || String(selected.value).trim() !== expected) {
                        return false;
                    }
                }
                return true;
            }

            const expectedAnswers = getExpectedChoiceAnswerKeys(question);
            if (!expectedAnswers.length) {
                return false;
            }
            const selectedAnswers = Array.from(document.querySelectorAll('input[data-answer-input="choice"]:checked'))
                .map(node => normalizeChoiceToken(node.value || ''))
                .filter(value => value !== '');

            return unorderedEquals(selectedAnswers, expectedAnswers);
        }

        function updateTrainingTestCenterModal() {
            const metaEl = document.getElementById('trainingTestCenterMeta');
            const bodyEl = document.getElementById('trainingTestCenterBody');
            const prevBtn = document.getElementById('trainingTestPrevBtn');
            const nextBtn = document.getElementById('trainingTestNextBtn');
            const pageEl = document.getElementById('trainingTestPageInfo');
            const questions = trainingTestCenterState.questions || [];

            if (!metaEl || !bodyEl) {
                return;
            }

            metaEl.textContent = trainingTestCenterState.meta || '';
            if (!questions.length) {
                bodyEl.innerHTML = '<p style="color:var(--muted);">표시할 문제가 없습니다.</p>';
                if (pageEl) pageEl.textContent = '문제 0 / 0';
                if (prevBtn) prevBtn.disabled = true;
                if (nextBtn) nextBtn.disabled = true;
                return;
            }

            const currentIndex = Math.max(0, Math.min(trainingTestCenterState.index, questions.length - 1));
            trainingTestCenterState.index = currentIndex;
            const currentQuestion = questions[currentIndex];
            bodyEl.innerHTML = `<div style="background:#fff; border:1px solid var(--border); border-radius:16px; padding:24px; box-shadow:0 10px 26px rgba(15, 23, 42, 0.08);">${buildTestCenterQuestionHtml(currentQuestion)}</div>`;
            bodyEl.innerHTML += `
                <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; margin-top:14px; flex-wrap:wrap;">
                    <button type="button" id="trainingTestCheckBtn" style="background:#0f766e; color:#fff; border:none; border-radius:10px; padding:10px 16px; font-size:15px; font-weight:700; cursor:pointer;">정답 확인</button>
                    <div id="trainingTestCheckMsg" style="font-size:14px; font-weight:700; color:var(--muted);"></div>
                </div>
            `;
            initMatchingDragDrop(bodyEl, currentQuestion);

            if (pageEl) pageEl.textContent = `문제 ${currentIndex + 1} / ${questions.length}`;
            if (prevBtn) prevBtn.disabled = currentIndex <= 0;
            if (nextBtn) {
                const nextEnabled = currentIndex < questions.length - 1;
                nextBtn.disabled = !nextEnabled;
                setTrainingNextButtonStyle(nextBtn, nextEnabled);
            }

            const checkBtn = document.getElementById('trainingTestCheckBtn');
            const checkMsg = document.getElementById('trainingTestCheckMsg');
            if (checkBtn) {
                checkBtn.onclick = () => {
                    const isCorrect = isCurrentTrainingQuestionCorrect(currentQuestion);
                    if (isCorrect) {
                        trainingTestCenterState.solved[currentIndex] = true;
                        if (checkMsg) {
                            checkMsg.textContent = '정답입니다! 다음 문제 버튼이 활성화되었습니다.';
                            checkMsg.style.color = '#0f766e';
                        }
                        highlightCorrectChoiceOptions(currentQuestion);
                        if (nextBtn) {
                            const nextEnabled = currentIndex < questions.length - 1;
                            nextBtn.disabled = !nextEnabled;
                            setTrainingNextButtonStyle(nextBtn, nextEnabled);
                        }
                        showTrainingCorrectPopup();
                    } else if (checkMsg) {
                        const wrongText = '오답입니다. 다음 문제로 계속 진행할 수 있습니다.';
                        if (isTrainingSupervisor()) {
                            const answerHint = getTrainingQuestionAnswerHint(currentQuestion);
                            checkMsg.textContent = answerHint
                                ? `${wrongText} 정답: ${answerHint}`
                                : `${wrongText} 정답 정보를 확인할 수 없습니다.`;
                        } else {
                            checkMsg.textContent = wrongText;
                        }
                        checkMsg.style.color = '#dc2626';
                    }
                };
            }
        }

        async function renderTrainingGeneratedTestCenter(payload, content, contentViewer) {
            let questions = Array.isArray(payload.questions) ? payload.questions : [];

            if (!questions.length && payload.generated_test_id) {
                try {
                    const detailRes = await fetch(`/api/admin/generated-tests/${payload.generated_test_id}`);
                    const detailData = await detailRes.json();
                    if (detailRes.ok && Array.isArray(detailData.questions)) {
                        questions = detailData.questions.map(question => {
                            const questionType = String(question.question_type || 'multiple_choice').toLowerCase();
                            const mapped = {
                                id: question.id,
                                question_number: question.question_number,
                                question_type: questionType,
                                question_title: question.question_title || '',
                                question_text: question.question_text || '',
                                question_category_name: question.question_category_name || 'None',
                                image_urls: Array.isArray(question.image_urls) ? question.image_urls : [],
                                answer: question.answer || ''
                            };

                            if (questionType === 'yes_no') {
                                mapped.items = (Array.isArray(question.items) ? question.items : []).map(item => ({
                                    id: item.id,
                                    text: item.text || '',
                                    answer: item.answer || ''
                                }));
                            } else if (questionType === 'matching') {
                                mapped.options = Array.isArray(question.options) ? question.options : [];
                                mapped.items = (Array.isArray(question.items) ? question.items : []).map(item => ({
                                    id: item.id,
                                    text: item.text || '',
                                    answer: item.answer || ''
                                }));
                            } else {
                                mapped.options = (question.options && typeof question.options === 'object') ? question.options : {};
                            }

                            return mapped;
                        });
                    }
                } catch (error) {
                }
            }

            trainingTestCenterState.questions = questions;
            trainingTestCenterState.index = 0;
            trainingTestCenterState.meta = `${payload.generated_name || content.lab_content_subject || '테스트'} | 총 ${payload.question_count || questions.length}문항`;

                    window.location.href = '/';
                    return;
                }
                
                const response = await fetch(`/api/admin/lab_contents/${contentId}?training_key=${loginInfo.training_key}&lab_id=${window.selectedLabId}`);
                if (!response.ok) {
                    throw new Error('콘텐츠를 불러올 수 없습니다.');
                }
                
                const content = await response.json();
                const contentViewer = document.getElementById('contentViewer');

                        contentViewer.innerHTML = `
                            <h1>${content.lab_content_subject || '제목 없음'}</h1>
                            <pre style="background: #f1f5f9; padding: 16px; border-radius: 6px; overflow-x: auto; color: var(--text);">${contentText}</pre>
                        `;
                    }
                } else {
                    // 기타 타입: 마크다운 텍스트인지 확인하여 자동 파싱
                    try {
                        const parsedMarkdown = marked.parse(contentText);
                        contentViewer.innerHTML = `
                            <h1>${content.lab_content_subject || '제목 없음'}</h1>
                            <div class="markdown-content">${parsedMarkdown}</div>
                        `;
                    } catch (error) {
                        // 마크다운 파싱 실패 시 기본 텍스트 처리
                        contentViewer.innerHTML = `
                            <h1>${content.lab_content_subject || '제목 없음'}</h1>
                            <pre style="background: #f1f5f9; padding: 16px; border-radius: 6px; overflow-x: auto; color: var(--text);">${contentText}</pre>
                        `;
                    }
                }
                
            } catch (error) {
                document.getElementById('contentViewer').innerHTML = `
                    <p style="text-align:center; color:#FF6B6B;">콘텐츠를 불러오는데 실패했습니다.</p>
                `;
            }
        }
        
        // 콘텐츠 새로고침 함수
        async function refreshContent() {
            try {
                const refreshBtn = document.getElementById('refreshContentBtn');
                const originalText = refreshBtn.innerHTML;
                
                // 버튼 비활성화 및 로딩 상태 표시
                refreshBtn.innerHTML = '<span style="font-size: 1.1em;">⏳</span> 새로고침 중...';
                refreshBtn.disabled = true;
                refreshBtn.style.background = '#888';
                refreshBtn.style.cursor = 'not-allowed';
                
                // 현재 선택된 랩이 있다면 콘텐츠 목록 새로고침
                if (window.selectedLabId) {
                    await loadContents(window.selectedLabId);
                    
                    // 현재 선택된 콘텐츠가 있다면 다시 로드
                    const activeContent = document.querySelector('.content-item.active');
                    if (activeContent) {
                        const contentId = activeContent.dataset.contentId;
                        if (contentId) {
                            await loadContentDetail(contentId);
                        }
                    }
                }
                
                // 성공 상태 표시
                refreshBtn.innerHTML = '<span style="font-size: 1.1em;">✅</span> 완료!';
                refreshBtn.style.background = '#4CAF50';
                
                // 2초 후 원래 상태로 복원
                setTimeout(() => {
                    refreshBtn.innerHTML = originalText;
                    refreshBtn.disabled = false;
                    refreshBtn.style.background = '#4CAF50';
                    refreshBtn.style.cursor = 'pointer';
                }, 2000);
                
                
            } catch (error) {
                
                // 오류 상태 표시
                const refreshBtn = document.getElementById('refreshContentBtn');
                refreshBtn.innerHTML = '<span style="font-size: 1.1em;">❌</span> 실패';
                refreshBtn.style.background = '#FF6B6B';
                
                // 2초 후 원래 상태로 복원
                setTimeout(() => {
                    refreshBtn.innerHTML = '<span style="font-size: 1.1em;">🔄</span> 새로고침';
                    refreshBtn.disabled = false;
                    refreshBtn.style.background = '#4CAF50';
                    refreshBtn.style.cursor = 'pointer';
                }, 2000);
            }
        }

        
        // 페이지 로드 시 실행
        document.addEventListener('DOMContentLoaded', function() {
            // URL에서 training_key 파라미터 확인
            const urlParams = new URLSearchParams(window.location.search);
            const urlTrainingKey = urlParams.get('training_key');
            
            // 권한 체크
            if (!checkUserPermission()) {
                return;
            }
            
            const loginInfo = getLoginInfo();
            
            // URL에서 전달된 training_key가 있으면 세션의 training_key를 업데이트
            if (urlTrainingKey && loginInfo) {
                loginInfo.training_key = urlTrainingKey;
                sessionStorage.setItem('loginInfo', JSON.stringify(loginInfo));
            }
            
            // 환영 메시지 업데이트
            document.querySelector('.welcome').textContent = 
                `${loginInfo.member_name}님, Training Center에 오신 것을 환영합니다!`;
            
            loadLabs();
        });
        
        // ===== 운영자 메뉴 함수 =====
        let currentLabId = null;
        
        function openSupervisorModal(labId, labName) {
            currentLabId = null;  // 초기에는 전체 과정 보기
            document.getElementById('supervisorModal').style.display = 'block';
            
            // 랩 선택 드롭다운 채우기
            const labSelect = document.getElementById('labSelect');
            labSelect.innerHTML = '<option value="">전체 과정</option>';  // 기본값을 전체 과정으로
            
            // trainingPortal.labs 배열에서 랩 목록 가져오기
            if (window.trainingPortal && window.trainingPortal.labs && window.trainingPortal.labs.length > 0) {
                window.trainingPortal.labs.forEach(lab => {
                    const option = document.createElement('option');
                    option.value = lab.lab_id;
                    option.textContent = lab.lab_name;
                    labSelect.appendChild(option);
                });
            }
            
            // 사용자 목록 로드
            loadLabUsers();
            // 모니터링 데이터 로드 (전체 과정)
            loadLabMonitoring();
        }
        
        function changeMonitoringLab() {
            const labSelect = document.getElementById('labSelect');
            const selectedLabId = labSelect.value;
            
            // 선택값에 따라 currentLabId 설정
            if (selectedLabId === '') {
                // 전체 과정 선택
                currentLabId = null;
            } else {
                // 특정 랩 선택
                currentLabId = parseInt(selectedLabId);
            }
            
            // 모니터링 데이터 다시 로드
            loadLabMonitoring();
        }
        
        function closeSupervisorModal() {
            document.getElementById('supervisorModal').style.display = 'none';
        }
        
        function showTab(tabName) {
            document.querySelectorAll('.modal-content-section').forEach(section => {
                section.classList.remove('active');
            });
            document.querySelectorAll('.modal-tab').forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }
        
        async function loadLabUsers() {
            try {
                const loginInfo = getLoginInfo();
                const res = await fetch(`/api/admin/users/course/${loginInfo.training_key}`);
                if (!res.ok) throw new Error('사용자 목록을 불러오는데 실패했습니다.');
                
                const users = await res.json();
                const tbody = document.getElementById('userTableBody');
                tbody.innerHTML = '';
                
                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">등록된 사용자가 없습니다.</td></tr>';
                    return;
                }
                
                users.forEach(user => {
                    const tr = document.createElement('tr');
                    const lastContent = user.last_content || '활동 기록 없음';
                    const supervisorBadge = user.is_supervisor 
                        ? '<span style="background:#4CAF50; color:white; padding:2px 6px; border-radius:3px; font-size:0.8em;">운영자</span>'
                        : '-';
                    
                    tr.innerHTML = `
                        <td>${user.member_id || ''}</td>
                        <td>${user.member_name || ''}</td>
                        <td style="font-size:0.9em; color:#666;">${lastContent}</td>
                        <td style="text-align:center;">${supervisorBadge}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                const tbody = document.getElementById('userTableBody');
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#dc3545;">오류: ${error.message}</td></tr>`;
            }
        }
        
        async function loadLabMonitoring() {
            try {
                const loginInfo = getLoginInfo();
                const res = await fetch(`/api/admin/monitoring-events?training_key=${encodeURIComponent(loginInfo.training_key)}&limit=100`);
                if (!res.ok) throw new Error('모니터링 데이터를 불러오는데 실패했습니다.');
                
                const events = await res.json();
                const container = document.getElementById('monitoringContent');
                
                // currentLabId가 설정되면 해당 랩의 이벤트만 필터링, 아니면 전체 과정의 이벤트 표시
                let displayEvents = events;
                if (currentLabId !== null && currentLabId !== undefined) {
                    displayEvents = events.filter(event => {
                        if (!event.details) return false;
                        // lab_id, target_lab_id, new_lab_id 등 여러 필드 지원
                        const labId = event.details.lab_id || event.details.target_lab_id || event.details.new_lab_id;
                        return labId === currentLabId;
                    });
                }
                
                if (!displayEvents || displayEvents.length === 0) {
                    const labLabel = currentLabId ? '이 랩의' : '과정의';
                    container.innerHTML = `<div style="text-align:center; color:#999; padding:20px;">${labLabel} 활동 기록이 없습니다.</div>`;
                    return;
                }
                
                let html = '';
                displayEvents.slice().reverse().slice(0, 50).forEach(event => {
                    const timestamp = new Date(event.timestamp).toLocaleString('ko-KR');
                    const icon = getEventIcon(event.type);
                    const eventCategory = event.category || '시스템';
                    html += `
                        <div class="monitoring-item">
                            <div style="font-weight:bold;">${icon} ${event.user_name || '사용자'} - ${getEventLabel(event.type)}</div>
                            <div style="font-size:0.85em; color:#888; margin-top:3px;">카테고리: ${eventCategory}</div>
                            <div class="monitoring-time">${timestamp}</div>
                            <div style="font-size:0.9em; color:#555; margin-top:5px;">${event.description || ''}</div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch (error) {
                const container = document.getElementById('monitoringContent');
                container.innerHTML = `<div style="text-align:center; color:#dc3545; padding:20px;">오류: ${error.message}</div>`;
            }
        }
        
        function getEventIcon(type) {
            const icons = {
                // 사용자 이벤트
                'user_login': '🔐',
                'user_logout': '🚪',
                // 랩 이벤트
                'lab_add': '➕',
                'lab_edit': '✏️',
                'lab_delete': '🗑️',
                'lab_view': '👁️',
                'lab_copy': '📋',
                // 콘텐츠 이벤트
                'content_add': '📝',
                'content_edit': '✏️',
                'content_delete': '🗑️',
                'content_view': '👁️',
                'content_viewed': '👁️',
                'content_move': '🚚',
                'content_copy': '📋',
                'content_status_changed': '⚙️',
                // 감시자 이벤트
                'supervisor_assign': '👤',
                // 로그 이벤트
                'log_view': '📊',
                'default': '📝'
            };
            return icons[type] || icons['default'];
        }
        
        function getEventLabel(type) {
            const labels = {
                // 사용자 이벤트
                'user_login': '로그인',
                'user_logout': '로그아웃',
                // 랩 이벤트
                'lab_add': '랩 추가',
                'lab_edit': '랩 수정',
                'lab_delete': '랩 삭제',
                'lab_view': '랩 조회',
                'lab_copy': '랩 복사',
                // 콘텐츠 이벤트
                'content_add': '콘텐츠 추가',
                'content_edit': '콘텐츠 수정',
                'content_delete': '콘텐츠 삭제',
                'content_view': '콘텐츠 조회',
                'content_viewed': '콘텐츠 조회',
                'content_move': '콘텐츠 이동',
                'content_copy': '콘텐츠 복사',
                'content_status_changed': '콘텐츠 상태 변경',
                // 감시자 이벤트
                'supervisor_assign': '운영자 지정',
                // 로그 이벤트
                'log_view': '로그 조회',
                'default': '작업'
            };
            return labels[type] || labels['default'];
        }
        
        // 모달 외부 클릭 시 닫기
        window.onclick = function(event) {
            const modal = document.getElementById('supervisorModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }
    </script>

    <!-- 운영자 메뉴 모달 -->
    <div id="supervisorModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div style="flex:1;">
                    <h2>운영자 메뉴</h2>
                    <div style="margin-top:10px;">
                        <label for="labSelect" style="color:var(--text); font-weight:500;">모니터링 랩 선택:</label>
                        <select id="labSelect" style="margin-left:10px; padding:5px 10px; border:1px solid var(--border); border-radius:4px; background-color:var(--bg); color:var(--text); cursor:pointer;" onchange="changeMonitoringLab()">
                            <option value="">-- 랩 선택 --</option>
                        </select>
                    </div>
                </div>
                <span class="close-btn" onclick="closeSupervisorModal()">&times;</span>
            </div>
            
            <div class="modal-tabs">
                <button class="modal-tab active" onclick="showTab('users')">사용자 목록</button>
                <button class="modal-tab" onclick="showTab('monitoring')">모니터링</button>
            </div>
            
            <div id="users" class="modal-content-section active">
                <h3>랩 참여자 목록</h3>
                <table class="user-table">
                    <thead>
                        <tr>
                            <th>사용자 ID</th>
                            <th>사용자명</th>
                            <th>마지막 활동</th>
                            <th>역할</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <tr><td colspan="4" style="text-align:center; color:#999;">로딩 중...</td></tr>
                    </tbody>
                </table>
            </div>
            
            <div id="monitoring" class="modal-content-section">
                <h3>활동 모니터링</h3>
                <div id="monitoringContent" style="max-height: 400px; overflow-y: auto;">
                    <div style="text-align:center; color:#999; padding:20px;">로딩 중...</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
