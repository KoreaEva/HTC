<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI Training Portal</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .container { max-width: 900px; margin: 60px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 40px; }
        
        /* 모바일 반응형 스타일 */
        @media (max-width: 768px) {
            .container { margin: 30px auto; padding: 25px; max-width: 95%; }
            .lab-list th, .lab-list td { padding: 8px 6px; font-size: 0.9em; }
            h1 { font-size: 1.8em; }
            .course-title { font-size: 1.2em; }
        }
        
        @media (max-width: 480px) {
            .container { margin: 20px auto; padding: 20px; max-width: 95%; }
            .lab-list th, .lab-list td { padding: 6px 4px; font-size: 0.8em; }
            h1 { font-size: 1.6em; }
            .course-title { font-size: 1.1em; }
        }
        h1 { color: #007bff; margin-bottom: 10px; text-align: center; }
        .course-title { font-size: 1.4em; font-weight: bold; margin-bottom: 20px; color: #333; text-align: center; }
        .lab-list { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .lab-list th, .lab-list td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        .lab-list th { background-color: #f8f9fa; font-weight: bold; }
        .lab-list tr:hover { background-color: #f5f5f5; }
        
        /* 운영자 메뉴 버튼 및 모달 스타일 */
        .supervisor-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.3s;
        }
        .supervisor-btn:hover {
            background: #218838;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.4);
        }
        
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            border-radius: 8px;
            width: 90%;
            max-width: 900px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }
        
        .modal-header h2 {
            margin: 0;
            color: #333;
        }
        
        .close-btn {
            font-size: 28px;
            font-weight: bold;
            color: #aaa;
            cursor: pointer;
        }
        
        .close-btn:hover {
            color: #000;
        }
        
        .modal-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }
        
        .modal-tab {
            padding: 10px 20px;
            background: #f0f0f0;
            border: none;
            cursor: pointer;
            border-radius: 4px 4px 0 0;
            font-weight: bold;
        }
        
        .modal-tab.active {
            background: #007bff;
            color: white;
        }
        
        .modal-content-section {
            display: none;
        }
        
        .modal-content-section.active {
            display: block;
        }
        
        .user-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        .user-table th, .user-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        .user-table th {
            background-color: #f8f9fa;
            font-weight: bold;
        }
        
        .user-table tr:hover {
            background-color: #f5f5f5;
        }
        
        .monitoring-item {
            background: #f9f9f9;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid #007bff;
            border-radius: 4px;
        }
        
        .monitoring-time {
            color: #666;
            font-size: 0.9em;
        }
        
        .logout-btn { 
            margin-top: 30px; 
            display: block;
            padding: 10px 20px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .logout-btn:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Training Portal</h1>
        <div id="courseTitle" class="course-title"></div>
        <table class="lab-list" id="labTable" style="display:none;">
            <thead>
                <tr>
                    <th>랩ID</th>
                    <th>랩명</th>
                    <th>설명</th>
                    <th>상태</th>
                    <th>생성일</th>
                    <th>관리</th>
                </tr>
            </thead>
            <tbody id="labTableBody"></tbody>
        </table>
        <div id="noLabs" style="margin-top:30px; color:#888; display:none;">등록된 랩이 없습니다.</div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <!-- 운영자 메뉴 모달 -->
    <div id="supervisorModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>운영자 메뉴: <span id="supervisorLabName"></span></h2>
                <span class="close-btn" onclick="closeSupervisorModal()">&times;</span>
            </div>
            
            <div class="modal-tabs">
                <button class="modal-tab active" onclick="showTab('users')">사용자 목록</button>
                <button class="modal-tab" onclick="showTab('monitoring')">모니터링</button>
            </div>
            
            <!-- 사용자 목록 탭 -->
            <div id="users" class="modal-content-section active">
                <h3>랩 참여자 목록</h3>
                <table class="user-table">
                    <thead>
                        <tr>
                            <th>사용자 ID</th>
                            <th>사용자명</th>
                            <th>마지막 활동</th>
                            <th>역할</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <tr><td colspan="4" style="text-align:center; color:#999;">로딩 중...</td></tr>
                    </tbody>
                </table>
            </div>
            
            <!-- 모니터링 탭 -->
            <div id="monitoring" class="modal-content-section">
                <h3>활동 모니터링</h3>
                <div id="monitoringContent" style="max-height: 400px; overflow-y: auto;">
                    <div style="text-align:center; color:#999; padding:20px;">로딩 중...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentLabId = null;
        let trainingKey = null;
        let memberId = null;

        if (!document.cookie.includes('session_id=1')) { window.location.href = '/'; }
        
        async function loadPortalInfo() {
            memberId = localStorage.getItem("member_id");
            trainingKey = localStorage.getItem("training_key");
            const res = await fetch(`/api/portal-info?member_id=${encodeURIComponent(memberId)}&training_key=${encodeURIComponent(trainingKey)}`);
            if (!res.ok) return;
            const data = await res.json();
            let courseTitle = data.course_name ? `과정명: ${data.course_name}` : '과정 정보 없음';
            if (data.course_status === 10) courseTitle += ' (준비중)';
            else if (data.course_status === 20) courseTitle += ' (실행중)';
            else if (data.course_status === 30) courseTitle += ' (완료)';
            document.getElementById('courseTitle').textContent = courseTitle;
            const labs = data.labs || [];
            const table = document.getElementById('labTable');
            const tbody = document.getElementById('labTableBody');
            const noLabs = document.getElementById('noLabs');
            tbody.innerHTML = '';
            if (data.course_status === 10) {
                table.style.display = 'none';
                noLabs.style.display = '';
                noLabs.textContent = '현재 과정은 준비중입니다. 랩이 제공되지 않습니다.';
            } else {
                table.style.display = '';
                noLabs.style.display = 'none';
                noLabs.textContent = '등록된 랩이 없습니다.';
                labs.forEach(lab => {
                    const isReady = lab.lab_status === 10;
                    const row = document.createElement('tr');
                    
                    // 운영자 메뉴 버튼
                    let supervisorButton = '';
                    if (lab.is_supervisor) {
                        supervisorButton = `<button class="supervisor-btn" onclick="openSupervisorModal(${lab.lab_id}, '${lab.lab_name}')">운영자 메뉴</button>`;
                    }
                    
                    row.innerHTML = `
                        <td>${lab.lab_id}</td>
                        <td>${isReady ? `<span style='color:#888;'>${lab.lab_name}</span>` : `<a href="/portal/lab_content?training_key=${encodeURIComponent(trainingKey)}&lab_id=${lab.lab_id}&member_id=${encodeURIComponent(memberId)}" style="color:#007bff; text-decoration:underline; font-weight:bold;">${lab.lab_name}</a>`}</td>
                        <td>${lab.lab_content || ''}</td>
                        <td>${lab.lab_status === 10 ? '준비중' : lab.lab_status === 20 ? '실행중' : lab.lab_status === 30 ? '완료' : lab.lab_status}</td>
                        <td>${lab.create_date || ''}</td>
                        <td style="text-align:center;">${supervisorButton}</td>
                    `;
                    if (isReady) {
                        row.style.color = '#aaa';
                        row.style.background = '#f5f5f5';
                        row.style.cursor = 'not-allowed';
                    } else {
                        row.style.cursor = 'pointer';
                    }
                    tbody.appendChild(row);
                });
            }
        }

        // 운영자 메뉴 모달 열기
        async function openSupervisorModal(labId, labName) {
            currentLabId = labId;
            document.getElementById('supervisorLabName').textContent = labName;
            document.getElementById('supervisorModal').style.display = 'block';
            
            // 사용자 목록 로드
            await loadLabUsers();
            // 모니터링 데이터 로드
            await loadLabMonitoring();
        }

        // 운영자 메뉴 모달 닫기
        function closeSupervisorModal() {
            document.getElementById('supervisorModal').style.display = 'none';
        }

        // 탭 전환
        function showTab(tabName) {
            // 모든 탭 숨기기
            document.querySelectorAll('.modal-content-section').forEach(section => {
                section.classList.remove('active');
            });
            document.querySelectorAll('.modal-tab').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // 선택된 탭 표시
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        // 랩 사용자 목록 로드
        async function loadLabUsers() {
            try {
                const res = await fetch(`/api/admin/users/course/${trainingKey}`);
                if (!res.ok) throw new Error('사용자 목록을 불러오는데 실패했습니다.');
                
                const users = await res.json();
                const tbody = document.getElementById('userTableBody');
                tbody.innerHTML = '';
                
                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">등록된 사용자가 없습니다.</td></tr>';
                    return;
                }
                
                users.forEach(user => {
                    const tr = document.createElement('tr');
                    const lastContent = user.last_content || '활동 기록 없음';
                    const supervisorBadge = user.is_supervisor 
                        ? '<span style="background:#4CAF50; color:white; padding:2px 6px; border-radius:3px; font-size:0.8em;">운영자</span>'
                        : '-';
                    
                    tr.innerHTML = `
                        <td>${user.member_id || ''}</td>
                        <td>${user.member_name || ''}</td>
                        <td style="font-size:0.9em; color:#666;">${lastContent}</td>
                        <td style="text-align:center;">${supervisorBadge}</td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                const tbody = document.getElementById('userTableBody');
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#dc3545;">오류: ${error.message}</td></tr>`;
            }
        }

        // 랩 모니터링 데이터 로드
        async function loadLabMonitoring() {
            try {
                const res = await fetch(`/api/admin/monitoring-events?training_key=${encodeURIComponent(trainingKey)}&limit=100`);
                if (!res.ok) throw new Error('모니터링 데이터를 불러오는데 실패했습니다.');
                
                const events = await res.json();
                const container = document.getElementById('monitoringContent');
                
                if (!events || events.length === 0) {
                    container.innerHTML = '<div style="text-align:center; color:#999; padding:20px;">활동 기록이 없습니다.</div>';
                    return;
                }
                
                let html = '';
                events.slice().reverse().slice(0, 50).forEach(event => {
                    const timestamp = new Date(event.timestamp).toLocaleString('ko-KR');
                    const icon = getEventIcon(event.type);
                    const eventCategory = event.category || '시스템';
                    html += `
                        <div class="monitoring-item">
                            <div style="font-weight:bold;">${icon} ${event.user_name || '사용자'} - ${getEventLabel(event.type)}</div>
                            <div style="font-size:0.85em; color:#888; margin-top:3px;">카테고리: ${eventCategory}</div>
                            <div class="monitoring-time">${timestamp}</div>
                            <div style="font-size:0.9em; color:#555; margin-top:5px;">${event.description || ''}</div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            } catch (error) {
                const container = document.getElementById('monitoringContent');
                container.innerHTML = `<div style="text-align:center; color:#dc3545; padding:20px;">오류: ${error.message}</div>`;
            }
        }

        // 이벤트 타입에 따른 아이콘 반환
        function getEventIcon(type) {
            const icons = {
                // 사용자 이벤트
                'user_login': '🔐',
                'user_logout': '🚪',
                // 랩 이벤트
                'lab_add': '➕',
                'lab_edit': '✏️',
                'lab_delete': '🗑️',
                'lab_view': '👁️',
                'lab_copy': '📋',
                // 콘텐츠 이벤트
                'content_add': '📝',
                'content_edit': '✏️',
                'content_delete': '🗑️',
                'content_view': '👁️',
                'content_viewed': '👁️',
                'content_move': '🚚',
                'content_copy': '📋',
                'content_status_changed': '⚙️',
                // 감시자 이벤트
                'supervisor_assign': '👤',
                // 로그 이벤트
                'log_view': '📊',
                'default': '📝'
            };
            return icons[type] || icons['default'];
        }

        // 이벤트 타입에 따른 라벨 반환
        function getEventLabel(type) {
            const labels = {
                // 사용자 이벤트
                'user_login': '로그인',
                'user_logout': '로그아웃',
                // 랩 이벤트
                'lab_add': '랩 추가',
                'lab_edit': '랩 수정',
                'lab_delete': '랩 삭제',
                'lab_view': '랩 조회',
                'lab_copy': '랩 복사',
                // 콘텐츠 이벤트
                'content_add': '콘텐츠 추가',
                'content_edit': '콘텐츠 수정',
                'content_delete': '콘텐츠 삭제',
                'content_view': '콘텐츠 조회',
                'content_viewed': '콘텐츠 조회',
                'content_move': '콘텐츠 이동',
                'content_copy': '콘텐츠 복사',
                'content_status_changed': '콘텐츠 상태 변경',
                // 감시자 이벤트
                'supervisor_assign': '운영자 지정',
                // 로그 이벤트
                'log_view': '로그 조회',
                'default': '작업'
            };
            return labels[type] || labels['default'];
        }

        // Logout 함수
        function logout() {
            document.cookie = 'session_id=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
            window.location.href = '/';
        }

        // 모달 외부 클릭 시 닫기
        window.onclick = function(event) {
            const modal = document.getElementById('supervisorModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }

        loadPortalInfo();
    </script>
</body>
</html>
